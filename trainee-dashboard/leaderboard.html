<script type="module">
import { themeManager } from '../assets/theme-manager.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js';
import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js';

const firebaseConfig = { 
  apiKey: "AIzaSyAODtfZDqeR8DH7YRaiDlRwPOBlxxMfFnY", 
  authDomain: "skillfoge-ecosystem.firebaseapp.com", 
  projectId: "skillfoge-ecosystem", 
  storageBucket: "skillfoge-ecosystem.firebasestorage.app", 
  messagingSenderId: "279055501952", 
  appId: "1:279055501952:web:e812364a6f8bcb5998f465", 
  measurementId: "G-L669WT5FZS" 
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const UNITS = {
  "Forex Synthetic Indices": "trading", "Forex Currency Pairs": "trading",
  "AI Content Creation": "digital", "Photography & Editing": "creative",
  "Graphic Design": "creative", "Digital Marketing": "digital",
  "Mobile Cinematography": "creative", "Discord Development": "digital",
  "Web Development": "digital", "Cyber Security": "digital"
};

let traineeData = null;

const uid = themeManager.uid;
if (uid) {
  onSnapshot(doc(db, 'trainees', uid), (snap) => {
    if (snap.exists()) {
      traineeData = snap.data();
      initPage();
    }
  });
}

const TELEGRAM_NODES = {
  "Forex Synthetic Indices": "https://t.me/+KWyN-sKQNMExZjg8",
  "Forex Currency Pairs": "https://t.me/+9cAdAp2Pw_FjNmJk",
  "AI Content Creation": "https://t.me/+I5vUYuIuaMw4N2Rk",
  "Photography & Editing": "https://t.me/+mkRAltkqJd41YTE0",
  "Graphic Design": "https://t.me/+PTJq2zoyz0M3ZDZk",
  "Digital Marketing": "https://t.me/+uIkOfw5x2MpmNjI0",
  "Mobile Cinematography": "https://t.me/+un1weOJ0HcsyZDdk",
  "Discord Development": "https://t.me/+Y5wcP_PIQf1kMzlk",
  "Web Development": "https://t.me/+vEJTv3fBRl43Yjlk",
  "Cyber Security": "https://t.me/+M4ZYMfz5tiYzZWVk"
};

function initPage() {
  applyCustomizations();
  
  // Update Telegram Join Link
  const tgLink = TELEGRAM_NODES[traineeData.track] || 'https://t.me/skillforgeorg';
  document.querySelectorAll('.telegram-join-target').forEach(el => {
    el.href = tgLink;
    el.classList.remove('opacity-20', 'pointer-events-none');
  });
  
  loadLeaderboard('all');
}

window.toggleSidebar = () => {
  const sidebar = document.getElementById('main-sidebar');
  sidebar.classList.toggle('-translate-x-full');
};

function applyCustomizations() {
  // Sync UI from traineeData or localStorage
  const isLight = traineeData.isLightMode || localStorage.getItem('sf_light_mode') === 'true';
  const isGlow = traineeData.controls?.glow || localStorage.getItem('sf_glow_mode') === 'true';

  if (traineeData.theme) applyThemeState(traineeData.theme);
  if (traineeData.wallpaper) applyWallpaperState(traineeData.wallpaper);
  
  if (isLight) document.body.classList.add('light');
  if (isGlow) document.body.classList.add('glow-mode');
  
  // Apply font mode
  document.body.classList.remove('font-serif-mode', 'font-mono-mode', 'font-handwriting-mode', 'font-display-mode');
  if (traineeData.fontMode && traineeData.fontMode !== 'sans') {
    document.body.classList.add(`font-${traineeData.fontMode}-mode`);
  }
}

function applyThemeState(theme) {
  if (!theme) return;
  if (theme.type === 'accent') { 
    document.documentElement.style.setProperty('--accent-color', theme.color); 
    document.body.style.background = ''; 
  }
  else if (theme.type === 'dual') { 
    document.documentElement.style.setProperty('--accent-color', theme.primary); 
    document.body.style.background = theme.secondary; 
  }
  else if (theme.type === 'gradient') { 
    document.documentElement.style.setProperty('--accent-color', theme.c1); 
    document.body.style.background = `linear-gradient(135deg, ${theme.c1}, ${theme.c2})`; 
  }
}

function applyWallpaperState(url) {
  if (url) { 
    document.body.style.backgroundImage = `url('${url}')`; 
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundAttachment = 'fixed';
    document.body.style.backgroundBlendMode = 'overlay'; 
  }
}

async function loadLeaderboard(unitFilter) {
  const body = document.getElementById('leaderboard-body');
  const q = query(collection(db, 'trainees'), orderBy('xp', 'desc'), limit(50));
  const snap = await getDocs(q);
  body.innerHTML = '';
  let rank = 1;
  snap.forEach(doc => {
    const data = doc.data();
    const unit = UNITS[data.track] || 'Other';
    if (unitFilter !== 'all' && unit !== unitFilter) return;
    const tr = document.createElement('tr');
    tr.className = "hover:bg-white/[0.02] transition-colors";
    tr.innerHTML = `<td class="px-8 py-5 font-bold text-gold-500">#${rank++}</td><td class="px-8 py-5 font-bold">${data.name}</td><td class="px-8 py-5 text-white/40 uppercase text-[9px] font-black tracking-widest">${unit}</td><td class="px-8 py-5 text-right font-mono text-gold-400">${(data.xp || 0).toLocaleString()} XP</td>`;
    body.appendChild(tr);
  });
}

window.filterLeaderboard = (unit) => {
  document.querySelectorAll('#leaderboard-filters button').forEach(b => b.classList.remove('active-filter', 'bg-gold-500/20'));
  event.target.classList.add('active-filter', 'bg-gold-500/20');
  loadLeaderboard(unit);
};

window.logout = async () => { if (!IS_TESTING) await signOut(auth); localStorage.removeItem('skillforge_mock_uid'); window.location.href = '../trainee-login/index.html'; };
</script>
