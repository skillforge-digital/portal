<script type="module">
import { themeManager } from '../assets/theme-manager.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js';
import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js';

const firebaseConfig = {"apiKey":"AIzaSyAKawPq6ggYmMIyfmaOg_wKklIunc3GyS0","authDomain":"skillforge-digital-portal.firebaseapp.com","projectId":"skillforge-digital-portal","storageBucket":"skillforge-digital-portal.firebasestorage.app","messagingSenderId":"425765825033","appId":"1:425765825033:web:9f75cb46fe58e28acde6d8","measurementId":"G-NFC9TNEK7E"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let traineeData = null;

const uid = themeManager.uid;
if (uid) {
  onSnapshot(doc(db, 'trainees', uid), (snap) => {
    if (snap.exists()) {
      traineeData = snap.data();
      initPage();
    }
  });
}

function initPage() {
  applyCustomizations();
  loadVault();
}

function applyCustomizations() {
  // Sync UI from traineeData or localStorage
  const isLight = traineeData.isLightMode || localStorage.getItem('sf_light_mode') === 'true';
  const isGlow = traineeData.controls?.glow || localStorage.getItem('sf_glow_mode') === 'true';

  if (traineeData.theme) applyThemeState(traineeData.theme);
  if (traineeData.wallpaper) applyWallpaperState(traineeData.wallpaper);
  
  if (isLight) document.body.classList.add('light');
  if (isGlow) document.body.classList.add('glow-mode');
  
  // Apply font mode
  document.body.classList.remove('font-serif-mode', 'font-mono-mode', 'font-handwriting-mode', 'font-display-mode');
  if (traineeData.fontMode && traineeData.fontMode !== 'sans') {
    document.body.classList.add(`font-${traineeData.fontMode}-mode`);
  }
}

function applyThemeState(theme) {
  if (!theme) return;
  if (theme.type === 'accent') { 
    document.documentElement.style.setProperty('--accent-color', theme.color); 
    document.body.style.background = ''; 
  }
  else if (theme.type === 'dual') { 
    document.documentElement.style.setProperty('--accent-color', theme.primary); 
    document.body.style.background = theme.secondary; 
  }
  else if (theme.type === 'gradient') { 
    document.documentElement.style.setProperty('--accent-color', theme.c1); 
    document.body.style.background = `linear-gradient(135deg, ${theme.c1}, ${theme.c2})`; 
  }
}

function applyWallpaperState(url) {
  if (url) { 
    document.body.style.backgroundImage = `url('${url}')`; 
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';
    document.body.style.backgroundAttachment = 'fixed';
    document.body.style.backgroundBlendMode = 'overlay'; 
  }
}

function loadVault() {
  const grid = document.getElementById('vault-grid');
  const completed = traineeData.completedTracks || [{ name: "Graphic Design Basics", date: "Jan 2026", badge: "silver" }];
  completed.forEach(track => {
    const card = document.createElement('div');
    card.className = "glass p-8 rounded-[40px] flex flex-col items-center text-center space-y-4 group relative overflow-hidden";
    const badgeColor = track.badge === 'gold' ? 'text-gold-500' : 'text-slate-400';
    card.innerHTML = `
      <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-30 transition-opacity"><i class="fa-solid fa-vault text-4xl"></i></div>
      <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center ${badgeColor}"><i class="fa-solid fa-certificate text-3xl"></i></div>
      <div><h3 class="font-bold text-lg">${track.name}</h3><p class="text-[9px] font-black text-white/30 uppercase tracking-widest mt-1">Completed ${track.date}</p></div>
      <div class="px-4 py-1.5 rounded-full bg-white/5 border border-white/5 text-[8px] font-black uppercase tracking-[0.2em]">${track.badge} Tier</div>
    `;
    grid.prepend(card);
  });
}

window.logout = async () => { if (!IS_TESTING) await signOut(auth); localStorage.removeItem('skillforge_mock_uid'); window.location.href = '../trainee-login/index.html'; };
</script>
