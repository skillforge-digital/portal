<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillForge — Customize Your Experience</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;700&family=Caveat:wght@400;700&family=Unbounded:wght@400;700&family=Inter:wght@400;700&family=Playfair+Display:wght@400;700&family=Outfit:wght@400;700&family=Syne:wght@400;700&family=Lexend:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { 
        grotesk: ['Space Grotesk', 'sans-serif'],
        serif: ['Instrument Serif', 'serif']
      },
      colors: {
        navy: { 950:'#040810', 900:'#070d1a', 800:'#0c1829', 700:'#112240', 600:'#1a3358' },
        gold: { 300:'#fcd34d', 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706', 700:'#b45309' },
      }
    }
  }
}
</script>
<style>
  :root { 
    --font-main: 'Space Grotesk', sans-serif;
    --accent-color: #f59e0b;
    --accent-color-rgb: 245, 158, 11;
  }
  * { font-family: var(--font-main); transition: font-family 0.3s ease; }
  body { background: #040810; color: white; min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; }
  .glass { background: rgba(12, 24, 50, 0.55); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
  .glass-strong { background: rgba(12, 24, 50, 0.75); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); }
  .sidebar-link.active { background: rgba(var(--accent-color-rgb), 0.1); color: var(--accent-color); border-right: 3px solid var(--accent-color); }
  
  .gradient-swatch { width: 100%; aspect-ratio: 1; border-radius: 20px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s ease; }
  .gradient-swatch:hover { transform: scale(1.05); }
  .gradient-swatch.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
  
  .font-card { cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
  .font-card.active { border-color: var(--accent-color); background: rgba(var(--accent-color-rgb), 0.1); }
  
  #loading-screen { position: fixed; inset: 0; background: #040810; z-index: 1000; display: flex; items-center: center; justify-content: center; transition: opacity 0.5s ease; }
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
</style>
</head>
<body class="flex flex-col md:flex-row">

<div id="loading-screen">
  <div class="flex flex-col items-center gap-4">
    <div class="w-12 h-12 border-4 border-gold-500/20 border-t-gold-500 rounded-full animate-spin"></div>
    <p class="text-[10px] font-black uppercase tracking-[0.4em] text-gold-400">Syncing Design Registry...</p>
  </div>
</div>

<!-- Mobile Header -->
<div class="md:hidden h-20 px-6 flex items-center justify-between glass sticky top-0 z-[100] border-b border-white/5">
  <div class="flex items-center gap-3">
    <button onclick="window.history.back()" class="p-2 text-white/50 hover:text-white transition-all"><i class="fa-solid fa-arrow-left text-lg"></i></button>
    <div class="w-8 h-8 rounded-lg bg-black flex items-center justify-center border border-gold-500/30 overflow-hidden">
      <img src="https://files.fm/thumb_show.php?i=sebxcfvhb7" class="w-full h-full object-cover">
    </div>
    <div class="flex flex-col leading-none">
      <span class="font-black text-sm tracking-tighter uppercase">SkillForge</span>
      <span class="text-[6px] text-gold-400 font-bold tracking-[0.2em] uppercase">Digital & Co. Ltd</span>
    </div>
  </div>
  <button onclick="toggleSidebar()" class="p-2 text-white/50 hover:text-white transition-all"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
</div>

<aside id="main-sidebar" class="w-72 glass-strong border-r border-white/5 flex flex-col fixed inset-y-0 z-50 transition-all duration-500 -translate-x-full md:translate-x-0">
  <div class="p-8 flex-1 overflow-y-auto custom-scrollbar">
    <div class="flex items-center gap-3 mb-10">
      <div class="w-10 h-10 rounded-xl bg-black flex items-center justify-center border border-gold-500/30 overflow-hidden">
        <img src="https://files.fm/thumb_show.php?i=sebxcfvhb7" class="w-full h-full object-cover">
      </div>
      <div class="flex flex-col leading-none">
        <span class="font-black text-sm tracking-tighter uppercase">SkillForge</span>
        <span class="text-[7px] text-gold-400 font-bold tracking-[0.2em] uppercase">Digital & Co. Ltd</span>
      </div>
    </div>
    <nav class="space-y-1">
      <p class="text-[8px] font-black text-white/30 uppercase tracking-[0.4em] mb-4">Academy Hub</p>
      <a href="../" class="sidebar-link w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white"><i class="fa-solid fa-layer-group w-4"></i> Overview</a>
      <a href="../dmc/" class="sidebar-link w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white"><i class="fa-solid fa-id-card w-4"></i> Membership Card</a>
      <a href="../leaderboard/" class="sidebar-link w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white"><i class="fa-solid fa-ranking-star w-4"></i> Hall of Fame</a>
      <a href="../vault/" class="sidebar-link w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white"><i class="fa-solid fa-vault w-4"></i> The Vault</a>
      <a href="./" class="sidebar-link active w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-wand-magic-sparkles w-4"></i> Customize</a>
    </nav>
  </div>
  <div class="p-8 border-t border-white/5">
    <button onclick="logout()" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-red-400/70 hover:text-red-400 hover:bg-red-400/10 transition-all">
      <i class="fa-solid fa-right-from-bracket w-4"></i> Sign Out
    </button>
  </div>
</aside>

<main class="flex-1 md:ml-72 p-6 md:p-10 pt-24 md:pt-20">
  <div class="max-w-6xl mx-auto space-y-12">
    <header>
      <p class="text-gold-400 text-sm font-medium tracking-widest uppercase">Design Studio</p>
      <h1 class="text-3xl md:text-5xl font-bold mt-1 uppercase tracking-tighter">Atmosphere Control</h1>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
      <!-- Left Column: Theme Presets -->
      <div class="lg:col-span-2 space-y-12">
        <section class="space-y-6">
          <div class="flex items-center justify-between">
            <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-white/40">Premium Atmosphere Gradients</h2>
            <span class="text-[8px] font-bold text-gold-500 uppercase px-2 py-0.5 rounded-full bg-gold-500/10">25 Presets</span>
          </div>
          <div class="grid grid-cols-3 md:grid-cols-5 gap-4" id="gradient-grid">
            <!-- Gradients injected via script -->
          </div>
        </section>

        <section class="space-y-6">
          <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-white/40">Typography Matrix</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="font-grid">
            <!-- Fonts injected via script -->
          </div>
        </section>
      </div>

      <!-- Right Column: Live Settings & Uploads -->
      <div class="space-y-8">
        <div class="glass p-8 rounded-[40px] space-y-8">
          <h3 class="text-[11px] font-black uppercase tracking-[0.4em] text-white/40">Live Matrix</h3>
          <div class="p-6 rounded-3xl bg-white/5 border border-white/5 space-y-4" id="preview-box">
            <p class="text-gold-400 text-[10px] font-black uppercase tracking-widest">Active State</p>
            <h4 class="text-2xl font-bold tracking-tight">Neural Command</h4>
            <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden"><div class="h-full bg-gold-500 w-2/3"></div></div>
          </div>
          
          <div class="space-y-4 pt-4 border-t border-white/5">
            <label class="w-full glass-strong p-5 rounded-3xl flex items-center justify-between cursor-pointer hover:bg-white/5 transition-all group">
              <div class="flex flex-col">
                <span class="text-[10px] font-black uppercase tracking-widest text-white/60">Upload Wallpaper</span>
                <span class="text-[8px] font-bold text-white/20 uppercase">JPG/PNG Atmosphere</span>
              </div>
              <div class="w-10 h-10 rounded-xl bg-gold-500/10 flex items-center justify-center text-gold-500 group-hover:bg-gold-500 group-hover:text-navy-950 transition-all">
                <i class="fa-solid fa-image"></i>
              </div>
              <input type="file" id="wallpaper-input" class="hidden" accept="image/*">
            </label>
            
            <button onclick="resetTheme()" class="w-full p-5 rounded-3xl text-[10px] font-black uppercase tracking-widest text-red-400/50 hover:text-red-400 hover:bg-red-400/10 transition-all">
              Reset Neural Atmosphere
            </button>
          </div>
        </div>

        <button onclick="commitDesign()" id="save-btn" class="w-full bg-gold-500 text-navy-950 py-6 rounded-3xl font-black uppercase text-[11px] tracking-[0.3em] shadow-2xl hover:bg-white hover:scale-[1.02] active:scale-[0.98] transition-all">
          Sync Design Matrix
        </button>
      </div>
    </div>
  </div>
</main>

<script type="module">
import { themeManager } from '../../assets/theme-manager.js';
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, updateDoc, getDoc } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const firebaseConfig = { 
  apiKey: "AIzaSyAODtfZDqeR8DH7YRaiDlRwPOBlxxMfFnY", 
  authDomain: "skillfoge-ecosystem.firebaseapp.com", 
  projectId: "skillfoge-ecosystem", 
  storageBucket: "skillfoge-ecosystem.firebasestorage.app", 
  messagingSenderId: "279055501952", 
  appId: "1:279055501952:web:e812364a6f8bcb5998f465", 
  measurementId: "G-L669WT5FZS" 
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const supabaseUrl = 'https://luxubaqztmbcpskyfgdp.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1eHViYXF6dG1iY3Bza3lmZ2RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDYzNTcsImV4cCI6MjA5MTQyMjM1N30.Kmon8jh22u5KgWWpXf-7cdZ4qxlKXuUbVm6Mh-GHd8Q';
const supabase = createClient(supabaseUrl, supabaseKey);

const uid = themeManager.uid;
let currentDesign = { type: 'gradient', c1: '#040810', c2: '#0c1829', font: 'Space Grotesk' };
let pendingWallpaper = null;

const gradients = [
  { c1: '#040810', c2: '#0c1829' }, { c1: '#0f172a', c2: '#1e293b' }, { c1: '#111827', c2: '#1f2937' },
  { c1: '#0c0a09', c2: '#1c1917' }, { c1: '#171717', c2: '#262626' }, { c1: '#020617', c2: '#0f172a' },
  { c1: '#050505', c2: '#1a1a1a' }, { c1: '#080c14', c2: '#141c2c' }, { c1: '#0a101d', c2: '#162231' },
  { c1: '#000000', c2: '#121212' }, { c1: '#1a365d', c2: '#2a4365' }, { c1: '#1c4532', c2: '#22543d' },
  { c1: '#702459', c2: '#3b122d' }, { c1: '#2d3748', c2: '#1a202c' }, { c1: '#4a5568', c2: '#2d3748' },
  { c1: '#1a202c', c2: '#000000' }, { c1: '#2c5282', c2: '#1a365d' }, { c1: '#276749', c2: '#1c4532' },
  { c1: '#9b2c2c', c2: '#742a2a' }, { c1: '#2b6cb0', c2: '#2c5282' }, { c1: '#2f855a', c2: '#276749' },
  { c1: '#c05621', c2: '#9c4221' }, { c1: '#805ad5', c2: '#6b46c1' }, { c1: '#d53f8c', c2: '#b83280' },
  { c1: '#3182ce', c2: '#2b6cb0' }
];

const fonts = [
  { name: 'Space Grotesk', class: 'font-grotesk' },
  { name: 'Instrument Serif', class: 'font-serif' },
  { name: 'JetBrains Mono', class: 'font-mono' },
  { name: 'Plus Jakarta Sans', class: 'font-jakarta' }
];

async function init() {
  const grid = document.getElementById('gradient-grid');
  gradients.forEach(g => {
    const sw = document.createElement('div');
    sw.className = 'gradient-swatch';
    sw.style.background = `linear-gradient(135deg, ${g.c1}, ${g.c2})`;
    sw.onclick = () => {
      currentDesign.c1 = g.c1; currentDesign.c2 = g.c2; currentDesign.type = 'gradient';
      updatePreview();
    };
    grid.appendChild(sw);
  });

  const fGrid = document.getElementById('font-grid');
  fonts.forEach(f => {
    const card = document.createElement('div');
    card.className = `font-card p-6 rounded-3xl ${f.class}`;
    card.innerHTML = `<p class="text-[8px] font-black uppercase tracking-widest text-white/30 mb-2">${f.name}</p><p class="text-xl font-bold">Atmosphere Font</p>`;
    card.onclick = () => { currentDesign.font = f.name; updatePreview(); };
    fGrid.appendChild(card);
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const snap = await getDoc(doc(db, 'trainees', uid));
      if (snap.exists()) {
        const data = snap.data();
        if (data.theme) {
            currentDesign = { ...currentDesign, ...data.theme };
            updatePreview();
        }
      }
      document.getElementById('loading-screen').style.opacity = '0';
      setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 500);
    } else {
      window.location.href = '../../trainee-login/';
    }
  });

  document.getElementById('wallpaper-input').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      pendingWallpaper = file;
      currentDesign.type = 'wallpaper';
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('preview-box').style.backgroundImage = `url(${ev.target.result})`;
        document.getElementById('preview-box').style.backgroundSize = 'cover';
      };
      reader.readAsDataURL(file);
    }
  };
}

function updatePreview() {
  const box = document.getElementById('preview-box');
  if (currentDesign.type === 'gradient') {
    box.style.background = `linear-gradient(135deg, ${currentDesign.c1}, ${currentDesign.c2})`;
  }
  box.style.fontFamily = currentDesign.font;
  
  document.querySelectorAll('.gradient-swatch').forEach(s => {
    const grad = `linear-gradient(135deg, ${currentDesign.c1}, ${currentDesign.c2})`;
    s.classList.toggle('active', s.style.background.replace(/\s/g, '') === grad.replace(/\s/g, ''));
  });
  
  document.querySelectorAll('.font-card').forEach(c => {
    c.classList.toggle('active', c.querySelector('.text-xl').parentElement.innerText.includes(currentDesign.font));
  });
}

window.commitDesign = async () => {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerText = "Syncing Design Matrix...";
  
  try {
    const update = { theme: currentDesign };
    if (pendingWallpaper) {
      const fileName = `${uid}_wp_${Date.now()}.jpg`;
      const { error } = await supabase.storage.from('wallpapers').upload(fileName, pendingWallpaper);
      if (error) throw error;
      const { data: { publicUrl } } = supabase.storage.from('wallpapers').getPublicUrl(fileName);
      update.theme.wallpaper = publicUrl;
      update.theme.type = 'wallpaper';
    }
    
    await updateDoc(doc(db, 'trainees', uid), update);
    alert("Design Matrix Synchronized Successfully.");
    location.reload();
  } catch (err) {
    console.error(err);
    alert("Sync Failed. Please check neural connection.");
  } finally {
    btn.disabled = false; btn.innerText = "Sync Design Matrix";
  }
};

window.resetTheme = () => {
  currentDesign = { type: 'gradient', c1: '#040810', c2: '#0c1829', font: 'Space Grotesk' };
  updatePreview();
};

window.toggleSidebar = () => document.getElementById('main-sidebar').classList.toggle('-translate-x-full');
window.logout = () => { localStorage.removeItem('skillforge_mock_uid'); window.location.href = '../../trainee-login/'; };

init();
</script>
</body>
</html>
