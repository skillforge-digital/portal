<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; img-src 'self' data: https: blob:; font-src 'self' https: data:; style-src 'self' https: 'unsafe-inline'; script-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https: wss:;">
    <title>SkillForge — Portal Redirection</title>

  <!-- Advanced SEO Search Magnets -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <meta name="description" content="SkillForge Digital Portal - Access your Mastery Dashboard, track your XP, and connect with your cohort.">
  <meta name="keywords" content="SkillForge Portal, Trainee Dashboard, Tech Academy Login, Student Portal, Mastery Hub, Digital Skills Nigeria">
  <meta name="author" content="SkillForge Digital & Co. Ltd">
  
  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://portal.skillforgedigital.com.ng/">
  <meta property="og:title" content="SkillForge Portal | Mastery Hub">
  <meta property="og:description" content="Access your SkillForge Mastery Dashboard, track your study XP, and customize your learning environment.">
  <meta property="og:image" itemprop="image" content="/assets/brand-logo.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="SkillForge Portal">
  <meta property="og:locale" content="en_US">
  
  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SkillForge Portal | Mastery Hub">
  <meta name="twitter:description" content="Access your SkillForge Mastery Dashboard, track your study XP, and customize your learning environment.">
  <meta name="twitter:image" content="/assets/brand-logo.svg">
  
  <!-- Schema.org JSON-LD for Google -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "SkillForge Portal",
    "url": "https://portal.skillforgedigital.com.ng",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://portal.skillforgedigital.com.ng/verify/?id={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

    <link rel="stylesheet" href="/assets/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #040810; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glow { box-shadow: 0 0 50px rgba(201, 168, 76, 0.2); }
        @keyframes pulse-gold { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .animate-pulse-gold { animation: pulse-gold 2s infinite; }
    </style>

    <script>window.history.scrollRestoration = "manual"; window.scrollTo(0, 0);</script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <div class="relative">
        <div class="w-32 h-32 rounded-full border-4 border-gold/10 border-t-gold animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <img src="/assets/brand-logo.svg" alt="SkillForge Digital logo" class="w-12 h-12 rounded-lg opacity-50">
        </div>
    </div>
    
    <div class="mt-12 text-center space-y-4">
        <h1 class="text-xl font-black uppercase tracking-[0.3em] text-gold animate-pulse-gold">Portal Link Established</h1>
        <p class="text-[10px] text-white/40 uppercase tracking-widest">Synchronizing credentials with Main Registry...</p>
    </div>

    <div class="mt-8 px-6 py-3 glass rounded-2xl border border-white/5 bg-white/5 text-[10px] font-bold uppercase tracking-widest text-white/60">
        Redirecting to <span class="text-gold">SkillForge Main Site</span>
    </div>

    <script type="module">
        import { auth, db } from '../assets/firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

        // Redirection Logic
        const MAIN_SITE_URL = 'https://skillforgedigital.com.ng/academy/';

        onAuthStateChanged(auth, async (user) => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetTrack = urlParams.get('track');
            
            let redirectUrl = MAIN_SITE_URL;
            
            // If a specific track is requested, adjust the base redirect URL
            if (targetTrack) {
                // Ensure trailing slash
                if (!redirectUrl.endsWith('/')) redirectUrl += '/';
                redirectUrl += targetTrack + '/';
            }

            if (user) {
                try {
                    // Try to get the trainee's PIN to pass to the gate
                    const traineeDoc = await getDoc(doc(db, 'trainees', user.uid));
                    if (traineeDoc.exists()) {
                        const data = traineeDoc.data();
                        if (data.pin) {
                            // Append Passkey for auto-gate verification on main site
                            const separator = redirectUrl.includes('?') ? '&' : '?';
                            redirectUrl += `${separator}passkey=${data.pin}`;
                        }
                    }
                } catch (err) {
                    void("System sync error:", err);
                }
            }

            // Small delay for visual effect
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1500);
        });
    </script>
</body>
</html>
