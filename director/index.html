<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Command Center • SkillForge Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --navy: #040810; --gold: #C9A84C; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--navy); color: white; min-height: 100dvh; }
        .glass { background: rgba(255,255,255,0.02); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
        input, select { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus, select:focus { border-color: var(--gold) !important; outline: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @supports not (scrollbar-width: none) {
            .no-scrollbar { overflow: -moz-scrollbars-none; }
        }
    </style>
</head>
<body class="p-6 md:p-12 selection:bg-gold selection:text-navy-950">
    <div id="auth-gate" class="fixed inset-0 z-[100] bg-[#040810] flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[40px] border-white/10 text-center space-y-8">
            <div class="w-20 h-20 bg-gold/10 rounded-[30px] flex items-center justify-center text-gold border border-gold/20 mx-auto">
                <i data-lucide="shield-lock" class="w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tighter text-gold">Director Access</h1>
            <p id="auth-status" class="text-slate-400 text-xs uppercase tracking-widest font-bold">Verification Required</p>
            
            <div id="passcode-container" class="space-y-4">
                <div class="space-y-2 text-left">
                    <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-1">Command Pass-code</label>
                    <input type="password" id="director-passcode" placeholder="••••••••••••" class="w-full p-4 rounded-2xl text-sm transition-all text-center tracking-[0.3em] font-mono">
                </div>
                <button type="button" id="verify-passcode-btn" class="w-full bg-gold text-navy-950 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-all">Verify Clearance</button>
            </div>

            <div id="auth-actions" class="space-y-4 hidden">
                <!-- Actions injected by JS -->
            </div>
        </div>
    </div>

    <div id="director-hub" class="hidden max-w-7xl mx-auto space-y-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <p class="text-gold text-xs font-black uppercase tracking-[0.4em] mb-2">Founding Admin Hub</p>
                <h1 id="director-name" class="text-4xl md:text-6xl font-black uppercase tracking-tighter">Director Center</h1>
            </div>
            <div class="flex gap-4">
                <button type="button" onclick="logoutDirector()" aria-label="Terminate Director Session" class="glass px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-red-400 hover:bg-red-400/10 transition-all">Terminate Session</button>
            </div>
        </header>

        <nav class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button type="button" data-tab="trainees" class="tab-btn active px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Trainees</button>
            <button type="button" data-tab="seasons" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Seasons</button>
            <button type="button" data-tab="tracks" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Tracks</button>
            <button type="button" data-tab="passcodes" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Pass-codes</button>
            <button type="button" data-tab="faults" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">System Faults</button>
            <button type="button" data-tab="fingerprints" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Fingerprints</button>
        </nav>

        <main id="tab-content" class="glass p-8 md:p-12 rounded-[40px] border-white/10 min-h-[600px]">
        </main>
    </div>

    <script type="module">
        import { db, auth } from '../assets/firebase-config.js';
        import { collection, query, getDocs, doc, getDoc, setDoc, deleteDoc, serverTimestamp, orderBy, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
        import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
        import { PassCodeEngine } from '../assets/pass-code-engine.js';

        let passCodeEngine = null;
        let directorData = null;
        let activeSnapshots = [];
        const MASTER_PASSCODE = 'SKILLFORGE-DIRECTOR-2026';

        function checkPasscode() {
            const stored = sessionStorage.getItem('sf_director_clearance');
            return stored === MASTER_PASSCODE;
        }

        function clearSnapshots() {
            activeSnapshots.forEach(unsub => unsub());
            activeSnapshots = [];
        }

        document.getElementById('verify-passcode-btn').onclick = () => {
            const input = document.getElementById('director-passcode').value;
            if (input === MASTER_PASSCODE) {
                sessionStorage.setItem('sf_director_clearance', MASTER_PASSCODE);
                location.reload();
            } else {
                alert("ACCESS DENIED: Invalid Command Pass-code");
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const statusEl = document.getElementById('auth-status');
            const actionsEl = document.getElementById('auth-actions');
            const passcodeContainer = document.getElementById('passcode-container');

            if (!checkPasscode()) {
                statusEl.innerText = "Clearance Required";
                passcodeContainer.classList.remove('hidden');
                actionsEl.classList.add('hidden');
                return;
            }

            passcodeContainer.classList.add('hidden');
            actionsEl.classList.remove('hidden');

            if (!user) {
                statusEl.innerText = "Authentication Required";
                actionsEl.innerHTML = `
                    <a href="../staffs/login/" class="block w-full bg-gold text-navy-950 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-all">Personnel Login</a>
                    <p class="text-[8px] text-slate-500 uppercase tracking-widest mt-4">Authorized Directors Only</p>
                `;
            } else {
                statusEl.innerText = "Verifying Authorization...";
                try {
                    // Strictly use dedicated directors collection as per founding mandate
                    const directorDoc = await getDoc(doc(db, 'directors', user.uid));
                    
                    if (directorDoc.exists()) {
                        directorData = directorDoc.data();
                        initHub();
                    } else {
                        statusEl.innerText = "Access Denied: Non-Director Identity Detected";
                        actionsEl.innerHTML = `
                            <button id="switch-account" class="w-full bg-white/5 border border-white/10 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white/10 transition-all">Switch Account</button>
                            <p class="text-[8px] text-red-400/60 uppercase tracking-widest mt-4">This account lacks command clearance.</p>
                        `;
                        document.getElementById('switch-account').onclick = () => signOut(auth).then(() => location.reload());
                    }
                } catch (err) {
                    console.error("Auth verification failed:", err);
                    statusEl.innerText = "System Error: " + err.message;
                }
            }
        });

        window.logoutDirector = function() {
            if (!confirm("Confirm authorization to terminate this director session?")) return;
            clearSnapshots();
            sessionStorage.removeItem('sf_director_clearance');
            signOut(auth).then(() => {
                location.reload();
            });
        };

        function initHub() {
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('director-hub').classList.remove('hidden');
            
            const displayName = (directorData && directorData.name) ? directorData.name : "Command";
            document.getElementById('director-name').innerText = displayName + " Center";

            // PassCodeEngine uses static methods, no instantiation needed
            
            window.showTab('trainees');
        }

        window.showTab = async function(tab) {
            clearSnapshots();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const tabBtn = document.querySelector(`[data-tab="${tab}"]`);
            if (tabBtn) tabBtn.classList.add('active');
            
            const content = document.getElementById('tab-content');
            content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';

            try {
                if (tab === 'trainees') await window.renderTrainees(content);
                else if (tab === 'seasons') await window.renderSeasons(content);
                else if (tab === 'tracks') await window.renderTracks(content);
                else if (tab === 'passcodes') await window.renderPasscodes(content);
                else if (tab === 'faults') await window.renderFaults(content);
                else if (tab === 'fingerprints') await window.renderFingerprints(content);
            } catch (err) {
                content.innerHTML = `<div class="p-12 text-center space-y-4">
                    <p class="text-red-400 font-bold uppercase tracking-widest text-xs">Registry Connection Failed</p>
                    <p class="text-slate-500 text-[10px]">${err.message}</p>
                </div>`;
            }
        };

        window.renderTrainees = async function(container) {
            const unsub = onSnapshot(collection(db, "trainees"), (snap) => {
                let html = `<div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black uppercase">Trainee Registry (${snap.size})</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-white/10">
                            <tr>
                                <th class="pb-4">Mastery Profile</th>
                                <th class="pb-4">Identity (SFID)</th>
                                <th class="pb-4">Path/Track</th>
                                <th class="pb-4">XP/Neural State</th>
                                <th class="pb-4">Contact</th>
                                <th class="pb-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">`;
                
                if (snap.empty) {
                    html += `<tr><td colspan="6" class="py-12 text-center text-white/40 italic">No trainees registered yet.</td></tr>`;
                }
                
                const docs = snap.docs.sort((a, b) => {
                    const dateA = a.data().created_at?.toDate() || new Date(0);
                    const dateB = b.data().created_at?.toDate() || new Date(0);
                    return dateB - dateA;
                });
                
                docs.forEach(d => {
                    const data = d.data();
                    html += `<tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                        <td class="py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-white/5 border border-gold/20 overflow-hidden">
                                    <img src="${data.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + d.id}" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <p class="font-bold text-white uppercase text-xs">${data.name || 'Anonymous Trainee'}</p>
                                    <p class="text-[8px] text-slate-500 uppercase tracking-widest">Joined: ${data.created_at?.toDate().toLocaleDateString() || 'N/A'}</p>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 font-mono text-[10px] text-gold">${data.sfid || 'PENDING'}</td>
                        <td class="py-4 uppercase text-[9px] font-black text-slate-300">${data.track || 'Unassigned'}</td>
                        <td class="py-4">
                            <div class="flex flex-col gap-1">
                                <p class="text-[10px] font-black text-white">${data.xp || 0} XP</p>
                                <div class="w-20 h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full bg-gold" style="width: ${Math.min((data.xp || 0) / 10, 100)}%"></div>
                                </div>
                                <p class="text-[8px] text-gold/60 uppercase font-bold">${data.tier || 'Novice'}</p>
                            </div>
                        </td>
                        <td class="py-4">
                            <p class="text-[10px] text-slate-300">${data.email || 'N/A'}</p>
                            <p class="text-[10px] text-slate-500">${data.phone || 'N/A'}</p>
                        </td>
                        <td class="py-4">
                            <div class="flex gap-2">
                                <button onclick="window.viewTrainee('${d.id}')" class="p-2 hover:text-gold transition-colors"><i data-lucide="eye" class="w-4 h-4"></i></button>
                                <button onclick="window.deleteTrainee('${d.id}')" class="p-2 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                container.innerHTML = html;
                if (window.lucide) window.lucide.createIcons();
            });
            activeSnapshots.push(unsub);
        }

        window.viewTrainee = async (uid) => {
            const snap = await getDoc(doc(db, "trainees", uid));
            if (snap.exists()) {
                const data = snap.data();
                alert(`Trainee Detail:\n\nName: ${data.name}\nSFID: ${data.sfid}\nTrack: ${data.track}\nEmail: ${data.email}\nPhone: ${data.phone}\nXP: ${data.xp}\nTier: ${data.tier}\nJoined: ${data.created_at?.toDate().toLocaleString()}`);
            }
        };

        window.deleteTrainee = async (uid) => {
            if (confirm("CRITICAL ACTION: Are you sure you want to permanently terminate this trainee's registry entry? This action cannot be undone.")) {
                try {
                    await deleteDoc(doc(db, "trainees", uid));
                    alert("Trainee registry terminated successfully.");
                } catch (err) {
                    alert("Authorization Error: " + err.message);
                }
            }
        };

        window.renderSeasons = async function(container) {
            const unsub = onSnapshot(collection(db, "seasons"), (snap) => {
                let html = `<div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black uppercase">Season Registry</h2>
                    <button onclick="window.createSeason()" class="bg-gold text-navy-950 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Initialize Season</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                
                if (snap.empty) {
                    html += '<p class="text-white/40 col-span-full text-center py-12 italic">No seasons configured yet.</p>';
                }

                snap.forEach(d => {
                    const data = d.data();
                    html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-lg uppercase">${d.id}</h3>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">${data.status || 'Inactive'}</p>
                            </div>
                            <button onclick="window.toggleSeasonStatus('${d.id}', '${data.status}')" class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${data.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-white/40'} hover:bg-gold/20 hover:text-gold transition-all">${data.status || 'Inactive'}</button>
                        </div>
                        <p class="text-[10px] text-slate-400">Trainees: ${data.traineeCount || 0}</p>
                        <div class="pt-4 border-t border-white/5 flex gap-2">
                            <button onclick="window.setCurrentSeason('${d.id}')" class="text-[8px] font-black uppercase tracking-widest text-gold hover:text-white transition-all">Set as Global Current</button>
                        </div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
                if (window.lucide) window.lucide.createIcons();
            });
            activeSnapshots.push(unsub);
        }

        window.toggleSeasonStatus = async (id, currentStatus) => {
            const nextStatus = currentStatus === 'active' ? 'inactive' : 'active';
            try {
                await updateDoc(doc(db, "seasons", id), { status: nextStatus });
            } catch (err) {
                alert("Operation Failed: " + err.message);
            }
        };

        window.setCurrentSeason = async (id) => {
            try {
                await setDoc(doc(db, "system", "config"), { 
                    currentSeason: id,
                    lastInitialized: serverTimestamp() 
                }, { merge: true });
                alert("System Config Updated: Current Season set to " + id);
            } catch (err) {
                alert("Operation Failed: " + err.message);
            }
        };

        window.createSeason = async () => {
            if (!confirm("Confirm authorization to initialize a new training season?")) return;
            
            const name = prompt("Enter Season Designation (e.g., 2026-V1):");
            if (name) {
                try {
                    await setDoc(doc(db, "seasons", name), {
                        status: 'active',
                        traineeCount: 0,
                        created_at: serverTimestamp(),
                        initializedBy: auth.currentUser.uid
                    });
                    alert("New season successfully initialized: " + name);
                } catch (err) {
                    alert("Authorization Error: " + err.message);
                }
            }
        };

        window.renderTracks = async function(container) {
            let currentSeason = '2026';
            try {
                const configSnap = await getDoc(doc(db, "system", "config"));
                if (configSnap.exists()) currentSeason = configSnap.data().currentSeason || '2026';
            } catch (e) { console.warn("Failed to fetch system config, defaulting to 2026"); }

            const unsub = onSnapshot(doc(db, "seasons", currentSeason, "artifacts", "trainees", "counters", "tracks"), (snap) => {
                let html = `<div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black uppercase">Track Registry (${currentSeason})</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
                
                if (!snap.exists()) {
                    html += `<p class="text-white/40 col-span-full text-center py-12 italic">No track enrollment data found for ${currentSeason}.</p>`;
                } else {
                    const data = snap.data();
                    Object.entries(data).forEach(([trackName, count]) => {
                        html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-2">
                            <h3 class="font-black uppercase text-xs text-slate-400">${trackName}</h3>
                            <p class="text-3xl font-black text-gold">${count}</p>
                            <p class="text-[8px] text-slate-500 uppercase tracking-widest">Enrolled Trainees</p>
                        </div>`;
                    });
                }
                html += '</div>';
                container.innerHTML = html;
            });
            activeSnapshots.push(unsub);
        }

        window.renderPasscodes = async function(container) {
            const unsub = onSnapshot(collection(db, "track_access"), (snap) => {
                let html = `<div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black uppercase">Access Pass-codes</h2>
                    <button onclick="window.generatePasscode()" class="bg-gold text-navy-950 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Generate New</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
                
                if (snap.empty) {
                    html += '<p class="text-white/40 col-span-full text-center py-12 italic">No passcodes generated yet.</p>';
                }

                snap.forEach(d => {
                    const data = d.data();
                    html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-2 relative group">
                        <button onclick="window.deletePasscode('${d.id}')" class="absolute top-4 right-4 text-white/20 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        <p class="font-mono font-black text-lg">${d.id}</p>
                        <p class="text-[10px] text-slate-400 uppercase tracking-tighter">${data.track || 'N/A'}</p>
                        <div class="flex justify-between items-center pt-2">
                            <p class="text-[10px] ${data.used ? 'text-red-400' : 'text-green-400'} uppercase tracking-widest font-black">${data.used ? 'Used' : 'Available'}</p>
                            <p class="text-[8px] text-slate-600">${data.season || 'Legacy'}</p>
                        </div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
                if (window.lucide) window.lucide.createIcons();
            });
            activeSnapshots.push(unsub);
        }

        window.deletePasscode = async (id) => {
            if (!confirm("Permanently purge this pass-code?")) return;
            try {
                await deleteDoc(doc(db, "track_access", id));
            } catch (err) {
                alert("Operation Failed: " + err.message);
            }
        };

        window.renderFaults = async function(container) {
            const unsub = onSnapshot(query(collection(db, "system_faults"), orderBy("timestamp", "desc")), (snap) => {
                let html = `<div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black uppercase">System Faults (${snap.size})</h2>
                </div>
                <div class="space-y-4">`;
                
                if (snap.empty) {
                    html += '<p class="text-white/40 text-center py-12 italic">No active system faults reported.</p>';
                }

                snap.forEach(d => {
                    const data = d.data();
                    html += `<div class="p-6 rounded-3xl glass border ${data.status === 'resolved' ? 'border-green-500/20' : 'border-red-500/20'} space-y-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest ${data.status === 'resolved' ? 'text-green-400' : 'text-red-400'}">${data.code || 'UNKNOWN_FAULT'}</p>
                                <h3 class="font-bold text-lg">${data.fault}</h3>
                                <p class="text-[8px] text-slate-500 uppercase tracking-widest">Reported by: ${data.userName} (${data.uid.substring(0,8)}...) • ${data.timestamp?.toDate().toLocaleString() || 'N/A'}</p>
                            </div>
                            <div class="flex gap-2">
                                ${data.status !== 'resolved' ? `<button onclick="window.resolveFault('${d.id}')" class="px-4 py-2 bg-green-500/10 text-green-500 rounded-xl font-black text-[8px] uppercase tracking-widest hover:bg-green-500 hover:text-white transition-all">Resolve</button>` : ''}
                                <button onclick="window.deleteFault('${d.id}')" class="p-2 text-slate-500 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div class="p-4 bg-black/20 rounded-2xl text-[9px] font-mono text-slate-400">
                            URL: ${data.context?.url}<br>
                            UA: ${data.context?.userAgent}
                        </div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
                if (window.lucide) window.lucide.createIcons();
            });
            activeSnapshots.push(unsub);
        }

        window.resolveFault = async (id) => {
            try {
                await updateDoc(doc(db, "system_faults", id), { status: 'resolved' });
            } catch (err) {
                alert("Operation Failed: " + err.message);
            }
        };

        window.deleteFault = async (id) => {
            if (!confirm("Permanently purge this fault report?")) return;
            try {
                await deleteDoc(doc(db, "system_faults", id));
            } catch (err) {
                alert("Operation Failed: " + err.message);
            }
        };

        window.generatePasscode = async () => {
            if (!confirm("Confirm authorization to generate a new unique access pass-code?")) return;
            
            const track = prompt("Assign this code to which track? (e.g., 'Web Development')");
            if (!track) return;
            
            const configSnap = await getDoc(doc(db, "system", "config"));
            const currentSeason = configSnap.exists() ? configSnap.data().currentSeason : '2026';
            const season = prompt("Enter Season Code (e.g., '2026'):", currentSeason);
            if (!season) return;

            const code = PassCodeEngine.generate();
            
            try {
                await setDoc(doc(db, "track_access", code), {
                    track,
                    pin: code,
                    used: false,
                    createdAt: serverTimestamp(),
                    generatedBy: auth.currentUser.uid,
                    season: season
                });
                alert(`Pass-code successfully encrypted and stored: ${code}\nAssigned Track: ${track}`);
            } catch (err) {
                alert("Authorization Error: " + err.message);
            }
        };

        window.renderFingerprints = async function(container) {
            let html = `<h2 class="text-2xl font-black uppercase mb-8">System Fingerprints</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
            
            const currentUid = auth.currentUser ? auth.currentUser.uid : "No Identity Found";
            
            html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                <h3 class="font-black text-gold uppercase">Portal Identity</h3>
                <div class="space-y-2 text-[10px] font-mono">
                    <p class="text-slate-400">Role: <span class="text-green-400 font-black">Founding Director</span></p>
                    <p class="text-slate-400">UID: <span class="text-white break-all">${currentUid}</span></p>
                    <p class="text-slate-400">Version: <span class="text-white">2.2.0</span></p>
                    <p class="text-slate-400">Registry: <span class="text-green-400">Active Node</span></p>
                </div>
            </div>
            <div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                <h3 class="font-black text-gold uppercase">Security Status</h3>
                <div class="space-y-2 text-[10px] font-mono">
                    <p class="text-slate-400">Auth: <span class="text-green-400">Verified Identity</span></p>
                    <p class="text-slate-400">Access: <span class="text-green-400">Master Level</span></p>
                    <p class="text-slate-400">SSL: <span class="text-green-400">Secured</span></p>
                </div>
            </div>`;
            html += '</div>';
            container.innerHTML = html;
        }

        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                window.showTab(this.getAttribute('data-tab'));
            });
        });

        if (window.lucide) window.lucide.createIcons();
    </script>
</body>
</html>
