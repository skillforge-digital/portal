<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Command Center • SkillForge Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --navy: #040810; --gold: #C9A84C; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--navy); color: white; min-height: 100dvh; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div id="auth-gate" class="fixed inset-0 z-[100] bg-navy flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[40px] border-white/10 text-center space-y-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter text-gold">Director Access</h1>
            <div class="space-y-4">
                <input type="password" id="director-pass" placeholder="Enter Command Secret" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center focus:border-gold outline-none">
                <button onclick="verifyDirector()" class="w-full bg-gold text-navy-950 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-all">Authorize</button>
            </div>
        </div>
    </div>

    <div id="director-hub" class="hidden max-w-7xl mx-auto space-y-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <p class="text-gold text-xs font-black uppercase tracking-[0.4em] mb-2">Founding Admin Hub</p>
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter">Director Center</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="logoutDirector()" class="glass px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-red-400 hover:bg-red-400/10 transition-all">Terminate Session</button>
            </div>
        </header>

        <nav class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="showTab('seasons')" class="tab-btn active px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Seasons</button>
            <button onclick="showTab('tracks')" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Tracks</button>
            <button onclick="showTab('passcodes')" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Pass-codes</button>
            <button onclick="showTab('fingerprints')" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Fingerprints</button>
        </nav>

        <main id="tab-content" class="glass p-8 md:p-12 rounded-[40px] border-white/10 min-h-[600px]">
            <!-- Content Injected via JS -->
        </main>
    </div>

    <script type="module">
        import { db } from '../assets/firebase-config.js';
        import { collection, query, getDocs, doc, setDoc, updateDoc, deleteDoc, serverTimestamp, where } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
        import { PassCodeEngine } from '../assets/pass-code-engine.js';

        window.verifyDirector = () => {
            const pass = document.getElementById('director-pass').value;
            if (pass === 'SF-ADMIN-2026') { // Mock secret
                localStorage.setItem('sf_director_auth', 'true');
                initHub();
            } else {
                alert("Unauthorized Command Attempt.");
            }
        };

        window.logoutDirector = () => {
            localStorage.removeItem('sf_director_auth');
            location.reload();
        };

        function initHub() {
            if (localStorage.getItem('sf_director_auth') === 'true') {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('director-hub').classList.remove('hidden');
                showTab('seasons');
            }
        }

        window.showTab = async (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const content = document.getElementById('tab-content');
            content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';

            try {
                if (tab === 'seasons') await renderSeasons(content);
                if (tab === 'tracks') await renderTracks(content);
                if (tab === 'passcodes') await renderPasscodes(content);
                if (tab === 'fingerprints') await renderFingerprints(content);
            } catch (err) {
                content.innerHTML = `<p class="text-red-400">Error loading registry: ${err.message}</p>`;
            }
        };

        async function renderSeasons(container) {
            const q = query(collection(db, "seasons"));
            const snap = await getDocs(q);
            let html = `<div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase">Season Registry</h2>
                <button onclick="createSeason()" class="bg-gold text-navy-950 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">New Season</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            
            snap.forEach(doc => {
                const data = doc.data();
                html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-xl font-bold">${data.name}</p>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${doc.id}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full ${data.active ? 'bg-green-500/20 text-green-500' : 'bg-red-500/20 text-red-500'} text-[8px] font-black uppercase">${data.active ? 'Active' : 'Inactive'}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleSeason('${doc.id}', ${!data.active})" class="text-[9px] font-bold uppercase text-gold">Toggle State</button>
                        <button onclick="deleteSeason('${doc.id}')" class="text-[9px] font-bold uppercase text-red-400">Delete</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        async function renderPasscodes(container) {
            const q = query(collection(db, "trainees"), where("fingerprint_locked", "==", true));
            const snap = await getDocs(q);
            let html = `<div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase">Active Pass-codes</h2>
                <div class="flex gap-2">
                    <input id="new-code-uid" placeholder="Trainee UID" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs">
                    <input id="new-code-track" placeholder="Track ID" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs">
                    <button onclick="issuePasscode()" class="bg-gold text-navy-950 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Issue Key</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-white/10">
                        <tr>
                            <th class="pb-4">Trainee</th>
                            <th class="pb-4">Track</th>
                            <th class="pb-4">Pass-code Hash</th>
                            <th class="pb-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">`;
            
            snap.forEach(doc => {
                const data = doc.data();
                Object.entries(data.activePasscodes || {}).forEach(([track, info]) => {
                    html += `<tr class="border-b border-white/5">
                        <td class="py-4 font-bold">${data.name}<br><span class="text-[8px] text-slate-500 uppercase">${doc.id}</span></td>
                        <td class="py-4 text-gold uppercase text-[10px] font-bold">${track}</td>
                        <td class="py-4 font-mono text-[9px] text-slate-400">${info.hash.substring(0, 16)}...</td>
                        <td class="py-4"><button onclick="revokePasscode('${doc.id}', '${track}')" class="text-red-400 font-bold uppercase text-[9px]">Revoke</button></td>
                    </tr>`;
                });
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
        }

        async function renderFingerprints(container) {
            const q = query(collection(db, "trainees"), where("fingerprint_locked", "==", true));
            const snap = await getDocs(q);
            let html = `<h2 class="text-2xl font-black uppercase mb-8">Fingerprint Registry</h2>
            <div class="grid grid-cols-1 gap-4">`;
            snap.forEach(doc => {
                const data = doc.data();
                html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-lg">${data.name}</p>
                        <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">UID: ${doc.id} • Track: ${data.locked_track}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-mono text-gold/60 mb-2">${data.activePasscodes?.[data.locked_track]?.fingerprint || 'N/A'}</p>
                        <button onclick="resetFingerprint('${doc.id}')" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[9px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">Reset & Unlock</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        window.issuePasscode = async () => {
            const uid = document.getElementById('new-code-uid').value;
            const track = document.getElementById('new-code-track').value;
            if (!uid || !track) return alert("UID and Track ID required.");

            const code = PassCodeEngine.generate(track, 'S26');
            const hash = await PassCodeEngine.hash(code);
            
            await updateDoc(doc(db, "trainees", uid), {
                [`activePasscodes.${track}`]: {
                    hash: hash,
                    issued_at: serverTimestamp(),
                    expiry: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) // 30 days
                }
            });
            
            alert(`Key Generated Successfully:\n\n${code}\n\nProvide this to the trainee.`);
            showTab('passcodes');
        };

        window.resetFingerprint = async (uid) => {
            if (!confirm("Confirm Registry Reset? This will unlock the trainee's fingerprint and clear their track lock.")) return;
            await updateDoc(doc(db, "trainees", uid), {
                fingerprint_locked: false,
                locked_track: null
            });
            showTab('fingerprints');
        };

        initHub();
    </script>
</body>
</html>
