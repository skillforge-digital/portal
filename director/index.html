<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Command Center • SkillForge Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --navy: #040810; --gold: #C9A84C; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--navy); color: white; min-height: 100dvh; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    </style>
</head>
<body class="p-6 md:p-12">
    <div id="auth-gate" class="fixed inset-0 z-[100] bg-navy flex items-center justify-center p-6">
        <div class="w-full max-w-md glass p-10 rounded-[40px] border-white/10 text-center space-y-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter text-gold">Director Access</h1>
            <div class="space-y-4">
                <input type="password" id="director-pass" placeholder="Enter Command Secret" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center focus:border-gold outline-none">
                <button id="auth-btn" class="w-full bg-gold text-navy-950 py-4 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-white transition-all">Authorize</button>
            </div>
        </div>
    </div>

    <div id="director-hub" class="hidden max-w-7xl mx-auto space-y-12">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
            <div>
                <p class="text-gold text-xs font-black uppercase tracking-[0.4em] mb-2">Founding Admin Hub</p>
                <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter">Director Center</h1>
            </div>
            <div class="flex gap-4">
                <button id="logout-btn" class="glass px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-red-400 hover:bg-red-400/10 transition-all">Terminate Session</button>
            </div>
        </header>

        <nav class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button data-tab="trainees" class="tab-btn active px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Trainees</button>
            <button data-tab="seasons" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Seasons</button>
            <button data-tab="tracks" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Tracks</button>
            <button data-tab="passcodes" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Pass-codes</button>
            <button data-tab="fingerprints" class="tab-btn px-6 py-3 rounded-xl border border-white/5 text-[10px] font-black uppercase tracking-widest whitespace-nowrap transition-all">Fingerprints</button>
        </nav>

        <main id="tab-content" class="glass p-8 md:p-12 rounded-[40px] border-white/10 min-h-[600px]">
        </main>
    </div>

    <script type="module">
        import { db, auth } from '../assets/firebase-config.js';
        import { collection, query, getDocs, doc, getDoc, setDoc, deleteDoc, serverTimestamp, orderBy } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
        import { onAuthStateChanged, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
        import { PassCodeEngine } from '../assets/pass-code-engine.js';

        let passCodeEngine = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                signInAnonymously(auth).catch(console.error);
            }
            if (user && passCodeEngine === null) {
                passCodeEngine = new PassCodeEngine(db, auth);
            }
        });

        window.verifyDirector = function() {
            const pass = document.getElementById('director-pass').value;
            if (pass === 'SFD-DIRECTOR-2026') { 
                localStorage.setItem('sf_director_auth', 'true');
                initHub();
            } else {
                alert("Unauthorized Command Attempt.");
            }
        };

        window.logoutDirector = function() {
            localStorage.removeItem('sf_director_auth');
            location.reload();
        };

        function initHub() {
            if (localStorage.getItem('sf_director_auth') === 'true') {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('director-hub').classList.remove('hidden');
                window.showTab('trainees');
            }
        }

        window.showTab = async function(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            const content = document.getElementById('tab-content');
            content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';

            try {
                if (tab === 'trainees') await window.renderTrainees(content);
                if (tab === 'seasons') await window.renderSeasons(content);
                if (tab === 'tracks') await window.renderTracks(content);
                if (tab === 'passcodes') await window.renderPasscodes(content);
                if (tab === 'fingerprints') await window.renderFingerprints(content);
            } catch (err) {
                content.innerHTML = `<p class="text-red-400">Error loading registry: ${err.message}</p>`;
            }
        };

        window.renderTrainees = async function(container) {
            const q = query(collection(db, "trainees"), orderBy("created_at", "desc"));
            const snap = await getDocs(q);
            
            let html = `<div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase">Trainee Registry (${snap.size})</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-white/10">
                        <tr>
                            <th class="pb-4">Mastery Profile</th>
                            <th class="pb-4">Identity (SFID)</th>
                            <th class="pb-4">Path/Track</th>
                            <th class="pb-4">XP/Neural State</th>
                            <th class="pb-4">Contact</th>
                            <th class="pb-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm">`;
            
            if (snap.empty) {
                html += `<tr><td colspan="6" class="py-12 text-center text-white/40 italic">No trainees registered yet.</td></tr>`;
            }
            
            snap.forEach(d => {
                const data = d.data();
                html += `<tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                    <td class="py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-white/5 border border-gold/20 overflow-hidden">
                                <img src="${data.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + d.id}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <p class="font-bold text-white uppercase text-xs">${data.name || 'Anonymous Trainee'}</p>
                                <p class="text-[8px] text-slate-500 uppercase tracking-widest">Joined: ${data.created_at?.toDate().toLocaleDateString() || 'N/A'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 font-mono text-[10px] text-gold">${data.sfid || 'PENDING'}</td>
                    <td class="py-4 uppercase text-[9px] font-black text-slate-300">${data.track || 'Unassigned'}</td>
                    <td class="py-4">
                        <div class="flex flex-col gap-1">
                            <p class="text-[10px] font-black text-white">${data.xp || 0} XP</p>
                            <div class="w-20 h-1 bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-gold" style="width: ${Math.min((data.xp || 0) / 10, 100)}%"></div>
                            </div>
                            <p class="text-[8px] text-gold/60 uppercase font-bold">${data.tier || 'Novice'}</p>
                        </div>
                    </td>
                    <td class="py-4">
                        <p class="text-[10px] text-slate-300">${data.email || 'N/A'}</p>
                        <p class="text-[10px] text-slate-500">${data.phone || 'N/A'}</p>
                    </td>
                    <td class="py-4">
                        <div class="flex gap-2">
                            <button onclick="window.viewTrainee('${d.id}')" class="p-2 hover:text-gold transition-colors"><i data-lucide="eye" class="w-4 h-4"></i></button>
                            <button onclick="window.deleteTrainee('${d.id}')" class="p-2 hover:text-red-400 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            html += `</tbody></table></div>`;
            container.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        }

        window.viewTrainee = async (uid) => {
            const snap = await getDoc(doc(db, "trainees", uid));
            if (snap.exists()) {
                const data = snap.data();
                alert(`Trainee Detail:\n\nName: ${data.name}\nSFID: ${data.sfid}\nTrack: ${data.track}\nEmail: ${data.email}\nPhone: ${data.phone}\nXP: ${data.xp}\nTier: ${data.tier}\nJoined: ${data.created_at?.toDate().toLocaleString()}`);
            }
        };

        window.deleteTrainee = async (uid) => {
            if (confirm("Permanently delete this trainee from the registry?")) {
                await deleteDoc(doc(db, "trainees", uid));
                alert("Trainee removed from registry.");
            }
        };

        window.renderSeasons = async function(container) {
            const snap = await getDocs(collection(db, "seasons"));
            let html = `<div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase">Season Registry</h2>
                <button onclick="window.createSeason()" class="bg-gold text-navy-950 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">New Season</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
            
            if (snap.empty) {
                html += '<p class="text-white/40 col-span-full text-center py-12 italic">No seasons configured yet.</p>';
            }

            snap.forEach(d => {
                const data = d.data();
                html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black text-lg uppercase">${d.id}</h3>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest">${data.status || 'Inactive'}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase ${data.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-white/40'}">${data.status || 'Inactive'}</span>
                    </div>
                    <p class="text-[10px] text-slate-400">Trainees: ${data.traineeCount || 0}</p>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        }

        window.createSeason = async () => {
            const name = prompt("Enter Season Name (e.g., 2026-Q2):");
            if (name) {
                await setDoc(doc(db, "seasons", name), {
                    status: 'active',
                    traineeCount: 0,
                    created_at: serverTimestamp()
                });
                alert("Season created: " + name);
                window.showTab('seasons');
            }
        };

        window.renderTracks = async function(container) {
            const snap = await getDocs(collection(db, "seasons", "2026", "artifacts", "trainees", "counters", "tracks"));
            let html = `<div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase">Track Registry</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            
            if (snap.empty) {
                html += '<p class="text-white/40 col-span-full text-center py-12 italic">No tracks enrolled yet.</p>';
            }

            snap.forEach(d => {
                html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-2">
                    <h3 class="font-black uppercase">${d.id}</h3>
                    <p class="text-3xl font-black text-gold">${d.data().count || d.data()[d.id] || 0}</p>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">Enrolled Trainees</p>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        window.renderPasscodes = async function(container) {
            const snap = await getDocs(collection(db, "track_access"));
            let html = `<div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase">Access Pass-codes</h2>
                <button onclick="window.generatePasscode()" class="bg-gold text-navy-950 px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Generate New</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
            
            if (snap.empty) {
                html += '<p class="text-white/40 col-span-full text-center py-12 italic">No passcodes generated yet.</p>';
            }

            snap.forEach(d => {
                const data = d.data();
                html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-2">
                    <p class="font-mono font-black text-lg">${d.id}</p>
                    <p class="text-[10px] text-slate-400">Track: ${data.track || 'N/A'}</p>
                    <p class="text-[10px] ${data.used ? 'text-red-400' : 'text-green-400'} uppercase tracking-widest">${data.used ? 'Used' : 'Available'}</p>
                </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            if (window.lucide) window.lucide.createIcons();
        }

        window.generatePasscode = async () => {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = 'ACADEMY-';
            for (let i = 0; i < 4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            code += '-2026';
            const track = prompt("Enter track name for this code:");
            if (!track) return;
            const uid = prompt("Enter trainee UID for this code (or leave blank to generate free code):");
            await setDoc(doc(db, "track_access", code), {
                track,
                uid: uid || null,
                used: !!uid,
                createdAt: serverTimestamp()
            });
            alert(`Passcode generated: ${code}\nTrack: ${track}`);
            window.showTab('passcodes');
        };

        window.renderFingerprints = async function(container) {
            let html = `<h2 class="text-2xl font-black uppercase mb-8">System Fingerprints</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
            
            html += `<div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                <h3 class="font-black text-gold uppercase">Portal Identity</h3>
                <div class="space-y-2 text-[10px] font-mono">
                    <p class="text-slate-400">Version: <span class="text-white">2.1.0</span></p>
                    <p class="text-slate-400">Build: <span class="text-white">Neural-Stable</span></p>
                    <p class="text-slate-400">Registry: <span class="text-green-400">Connected</span></p>
                </div>
            </div>
            <div class="p-6 rounded-2xl bg-white/5 border border-white/5 space-y-4">
                <h3 class="font-black text-gold uppercase">Security Status</h3>
                <div class="space-y-2 text-[10px] font-mono">
                    <p class="text-slate-400">Auth: <span class="text-green-400">Firebase Auth Active</span></p>
                    <p class="text-slate-400">Rules: <span class="text-green-400">v2 Compiled</span></p>
                    <p class="text-slate-400">SSL: <span class="text-green-400">Enforced</span></p>
                </div>
            </div>`;
            html += '</div>';
            container.innerHTML = html;
        }

        document.getElementById('auth-btn').addEventListener('click', window.verifyDirector);
        document.getElementById('director-pass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.verifyDirector();
        });
        document.getElementById('logout-btn').addEventListener('click', window.logoutDirector);

        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                window.showTab(this.getAttribute('data-tab'));
            });
        });

        initHub();
        if (window.lucide) window.lucide.createIcons();
    </script>
</body>
</html>
