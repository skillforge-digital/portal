<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainee Academy Center Login • SkillForge Digital & Co. Ltd</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: '#0A1931',
            gold: '#C9A84C',
            orange: '#E87722',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    :root {
      --bg-color: #0A1931;
      --text-color: #f1f5f9;
      --glass-bg: rgba(255,255,255,0.02);
      --glass-border: rgba(255,255,255,0.05);
    }
    body { font-family:'Plus Jakarta Sans',sans-serif; background: var(--bg-color); color: var(--text-color); overflow-x:hidden; transition: background 0.5s ease; min-height: 100dvh; }
    #sundust-canvas { position:fixed; inset:0; width:100%; height:100dvh; z-index:0; pointer-events:none }
    .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }
    .animate-slide-up { animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    input { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; font-size: 16px !important; }
    input:focus { border-color: #C9A84C !important; outline: none !important; background: rgba(255,255,255,0.05) !important; }
    @media (max-width: 640px) {
        .glass { p-8 !important; }
        h1 { font-size: 1.5rem !important; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">
  <canvas id="sundust-canvas"></canvas>
  
  <div class="relative z-10 w-full max-w-md animate-slide-up">
    <div class="text-center mb-8 md:mb-12 space-y-4">
        <a href="../" class="inline-flex items-center gap-2 text-gold font-black text-[10px] uppercase tracking-[0.3em] mb-6 md:mb-8 hover:text-white transition-all">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Gateway
        </a>
        <div class="flex items-center justify-center gap-3 mb-4 md:mb-6">
            <img src="https://i.postimg.cc/fRYD4HSw/Whats-App-Image-2026-01-16-at-1-20-06-PM.jpg" class="w-10 h-10 md:w-12 md:h-12 rounded-xl border border-gold/30">
            <div class="flex flex-col text-left leading-none">
                <span class="font-black text-xl md:text-2xl tracking-tighter uppercase text-white">SkillForge</span>
                <span class="text-[7px] md:text-[8px] text-gold font-bold tracking-[0.2em] uppercase">Digital & Co. Ltd</span>
            </div>
        </div>
        <h1 class="text-2xl md:text-3xl font-black text-white uppercase tracking-tighter">Academy Center</h1>
        <p class="text-slate-500 text-[10px] md:text-xs font-black uppercase tracking-[0.4em]">Secure Mastery Authentication</p>
    </div>

    <main class="glass p-8 md:p-10 rounded-[32px] md:rounded-[40px] border-white/10">
        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[9px] md:text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                <input required id="email" type="email" placeholder="trainee@skillforgedigital.com.ng" class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl text-sm focus:border-gold outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-[9px] md:text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Mastery Password</label>
                <div class="relative">
                    <input required id="password" type="password" placeholder="********" class="w-full p-3 md:p-4 rounded-xl md:rounded-2xl text-sm focus:border-gold outline-none transition-all pr-12">
                    <button type="button" onclick="togglePassword('password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-gold transition-colors">
                        <i data-lucide="eye" class="w-4 h-4" id="eye-password"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full bg-gold text-navy py-4 md:py-5 rounded-xl md:rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] shadow-2xl hover:bg-white transition-all flex items-center justify-center gap-2">
                Access Hub <i data-lucide="shield-check" class="w-4 h-4"></i>
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">New Trainee? <a href="../trainee-registration/" class="text-gold hover:text-white transition-all">Academy Registry</a></p>
        </div>
    </main>
  </div>

  <!-- Firebase SDKs -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, query, where, getDocs } from "firebase/firestore";
    import { getAuth, signInAnonymously } from "firebase/auth";

    const firebaseConfig = { 
      apiKey: "AIzaSyAODtfZDqeR8DH7YRaiDlRwPOBlxxMfFnY", 
      authDomain: "skillfoge-ecosystem.firebaseapp.com", 
      projectId: "skillfoge-ecosystem", 
      storageBucket: "skillfoge-ecosystem.firebasestorage.app", 
      messagingSenderId: "279055501952", 
      appId: "1:279055501952:web:e812364a6f8bcb5998f465", 
      measurementId: "G-L669WT5FZS" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.togglePassword = (id) => {
        const input = document.getElementById(id);
        const icon = document.getElementById(`eye-${id}`);
        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        if (window.lucide) window.lucide.createIcons();
    };

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        btn.disabled = true;
        btn.innerHTML = "Authenticating...";

        try {
            // In a real app, use auth.signInWithEmailAndPassword
            // For now, we query Firestore since we're in "remove auth guard for testing" mode
            const q = query(collection(db, "trainees"), where("email", "==", email), where("password", "==", password));
            const querySnapshot = await getDocs(q);

            if (!querySnapshot.empty) {
                const trainee = querySnapshot.docs[0].data();
                localStorage.setItem('skillforge_mock_uid', trainee.uid);
                window.location.href = "../trainee-dashboard/";
            } else {
                alert("Invalid mastery credentials. Please verify your email and password.");
            }
        } catch (err) {
            console.error(err);
            alert("Connection error. Our pages are temporarily desynced.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Access Hub <i data-lucide="shield-check" class="w-4 h-4"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    };

    // Sundust Background
    class Sundust {
      constructor() {
        this.canvas = document.getElementById('sundust-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initParticles();
        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<50;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.5+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
    if (window.lucide) window.lucide.createIcons();
  </script>
  <script src="../assets/error-reporter.js"></script>
</body>
</html>
