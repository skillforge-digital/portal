<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Access • SkillForge Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    :root { --bg-color: #0A1931; --text-color: #f1f5f9; --glass-bg: rgba(255,255,255,0.02); --glass-border: rgba(255,255,255,0.05); }
    body { font-family:'Plus Jakarta Sans',sans-serif; background: var(--bg-color); color: var(--text-color); min-height: 100dvh; display: flex; align-items: center; justify-content: center; p: 4; }
    .glass { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); }
    input { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
  </style>
</head>
<body class="p-6">
  <div class="w-full max-w-md space-y-8">
    <div class="text-center">
        <a href="./" class="inline-flex items-center gap-2 text-gold font-black text-[10px] uppercase tracking-[0.3em] mb-8 hover:text-white transition-all">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Login
        </a>
        <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Restore Access</h1>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mt-2">Request Mastery Reset</p>
    </div>

    <main class="glass p-10 rounded-[40px] border-white/10">
        <form id="forgot-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Registered Email</label>
                <input required id="reset-email" type="email" placeholder="trainee@skillforgedigital.com.ng" class="w-full p-4 rounded-2xl text-sm focus:border-gold outline-none transition-all">
            </div>
            <button type="submit" id="reset-btn" class="w-full bg-gold text-navy py-5 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] shadow-2xl hover:bg-white transition-all flex items-center justify-center gap-2">
                Send Reset Token <i data-lucide="mail" class="w-4 h-4"></i>
            </button>
        </form>
        <div id="success-msg" class="hidden text-center space-y-4">
            <div class="w-16 h-16 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="w-8 h-8"></i>
            </div>
            <p class="text-sm font-bold text-white">Reset Token Dispatched</p>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest leading-relaxed">Check your inbox. Token expires in 15 minutes. Ensure you check spam/promotions.</p>
        </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

    const firebaseConfig = { 
      apiKey: "AIzaSyAODtfZDqeR8DH7YRaiDlRwPOBlxxMfFnY", 
      authDomain: "skillfoge-ecosystem.firebaseapp.com", 
      projectId: "skillfoge-ecosystem", 
      storageBucket: "skillfoge-ecosystem.firebasestorage.app", 
      messagingSenderId: "279055501952", 
      appId: "1:279055501952:web:45e741d2e8b23af698f465", 
      measurementId: "G-YZNF8273RC" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById('forgot-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value;
        const btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.innerHTML = 'Generating Secure Token... <i class="fa-solid fa-spinner animate-spin ml-2"></i>';

        try {
            if (!auth.currentUser) await signInAnonymously(auth);
            
            // Check if user exists
            const q = query(collection(db, "trainees"), where("email", "==", email));
            const snap = await getDocs(q);

            if (!snap.empty) {
                const trainee = snap.docs[0].data();
                const rawToken = crypto.randomUUID();
                
                // Hash the token for secure storage
                const encoder = new TextEncoder();
                const data = encoder.encode(rawToken);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashedToken = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                const expiresAt = new Date(Date.now() + 15 * 60 * 1000);
                
                // Store hashed token with TTL and metadata
                await addDoc(collection(db, "password_resets"), {
                    email: email,
                    token_hash: hashedToken,
                    expires_at: expiresAt,
                    created_at: serverTimestamp(),
                    used: false,
                    metadata: {
                        ip: "LOGGED_ON_SERVER", // In a real backend, this would be the actual IP
                        ua: navigator.userAgent
                    }
                });

                // Audit Log entry
                await addDoc(collection(db, "audit_logs"), {
                    type: "PASSWORD_RESET_REQUEST",
                    email: email,
                    timestamp: serverTimestamp(),
                    ip: "CLIENT_SIDE_LOG",
                    ua: navigator.userAgent,
                    success: true
                });

                // Dispatch Email via Trigger Email extension structure
                await addDoc(collection(db, "mail"), {
                    to: email,
                    message: {
                        subject: "🔒 SkillForge Mastery: Reset Your Access Credentials",
                        text: `Mastery Access Reset Requested. Use this secure link to reset your credentials: https://portal.skillforgedigital.com.ng/trainee-login/reset-password.html?token=${rawToken}\n\nThis link expires in 15 minutes.\n\nSkillForge Digital & Co. Ltd.`,
                        html: `
                            <div style="font-family: 'Plus Jakarta Sans', sans-serif; background: #0A1931; color: #f1f5f9; padding: 40px; border-radius: 24px;">
                                <h2 style="color: #C9A84C; text-transform: uppercase; letter-spacing: 2px;">Restore Your Mastery Access</h2>
                                <p style="font-size: 14px; line-height: 1.6; color: #94a3b8;">A secure reset was requested for your trainee record. Click the button below to establish new credentials.</p>
                                <div style="margin: 32px 0;">
                                    <a href="https://portal.skillforgedigital.com.ng/trainee-login/reset-password.html?token=${rawToken}" 
                                       style="background: #C9A84C; color: #0A1931; padding: 16px 32px; border-radius: 12px; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">
                                       Reset Credentials
                                    </a>
                                </div>
                                <p style="font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 1px;">Expires in 15 minutes • One-time use only</p>
                                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 32px 0;">
                                <p style="font-size: 9px; color: #475569;">If you did not request this, please ignore this email. SkillForge Digital & Co. Ltd.</p>
                                <p style="font-size: 8px; color: #475569;"><a href="https://portal.skillforgedigital.com.ng/unsubscribe" style="color: #475569;">Unsubscribe from security alerts</a></p>
                            </div>
                        `
                    },
                    headers: {
                        "List-Unsubscribe": "<https://portal.skillforgedigital.com.ng/unsubscribe>"
                    }
                });
            } else {
                // Log failed attempt (email not found)
                await addDoc(collection(db, "audit_logs"), {
                    type: "PASSWORD_RESET_REQUEST",
                    email: email,
                    timestamp: serverTimestamp(),
                    ip: "CLIENT_SIDE_LOG",
                    ua: navigator.userAgent,
                    success: false,
                    reason: "Email not found"
                });
            }
            
            // Always show success to prevent email enumeration
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
        } catch (err) {
            console.error(err);
            alert("Registry synchronization interrupted. Please try again.");
            btn.disabled = false;
            btn.innerHTML = 'Send Reset Token <i data-lucide="mail" class="w-4 h-4"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    };
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
