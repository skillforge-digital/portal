name: Deploy to Firebase (Portal)

on:
  push:
    branches: [main]

concurrency:
  group: firebase-deploy-portal-main
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Write service account JSON
        run: |
          cat > /tmp/firebase-sa.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SKILLFOGE_ECOSYSTEM }}
          EOF
          chmod 600 /tmp/firebase-sa.json

      - name: Deploy Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: npx firebase-tools deploy --only firestore:rules --project skillfoge-ecosystem

      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SKILLFOGE_ECOSYSTEM }}
          projectId: skillfoge-ecosystem
          channelId: live
          entryPoint: .
