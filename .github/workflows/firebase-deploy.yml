name: Deploy to Firebase (Portal)

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: firebase-deploy-portal-main
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Write service account JSON
        run: |
          cat > /tmp/firebase-sa.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SKILLFOGE_ECOSYSTEM }}
          EOF
          chmod 600 /tmp/firebase-sa.json

      - name: Validate service account JSON
        run: |
          python - <<'PY'
          import base64, json
          p = "/tmp/firebase-sa.json"
          raw = open(p, "rb").read().strip()
          try:
            json.loads(raw.decode("utf-8"))
            print("service account json ok")
          except Exception:
            try:
              dec = base64.b64decode(raw)
              json.loads(dec.decode("utf-8"))
              open(p, "wb").write(dec)
              print("service account json ok (base64-decoded)")
            except Exception as e:
              raise SystemExit("invalid FIREBASE_SERVICE_ACCOUNT_SKILLFOGE_ECOSYSTEM secret format") from e
          PY

      - name: Deploy Firestore Rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: npx --yes firebase-tools@latest deploy --only firestore:rules --project skillfoge-ecosystem --non-interactive

      - name: Deploy Firestore Indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: npx --yes firebase-tools@latest deploy --only firestore:indexes --project skillfoge-ecosystem --non-interactive

      - name: Deploy Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: npx --yes firebase-tools@latest deploy --only hosting --project skillfoge-ecosystem --non-interactive
