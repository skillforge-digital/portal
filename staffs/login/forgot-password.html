    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    :root { --bg-color: #0A1931; --text-color: #f1f5f9; --glass-bg: rgba(255,255,255,0.02); --glass-border: rgba(255,255,255,0.05); }

</head>
<body class="p-6">
  <div class="w-full max-w-md space-y-8">
    <div class="text-center">
        <a aria-label="Action button" href="./" class="inline-flex items-center gap-2 text-gold font-black text-[10px] uppercase tracking-[0.3em] mb-8 hover:text-white transition-all"><i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Login
        </a>
        <h1 class="text-2xl font-black text-white uppercase tracking-tighter">Restore Access</h1>
        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.4em] mt-2">Request Registry Reset</p>
    </div>

    <main class="glass p-10 rounded-[40px] border-white/10">
        <div id="reset-error" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-500 text-[10px] font-black uppercase tracking-widest text-center">
            <!-- Error message injected here -->
        </div>
        <form id="forgot-form" class="space-y-6">
            <div class="space-y-2">
                <label for="reset-email" class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Registered Email</label>
                <input required id="reset-email" type="email" placeholder="trainee@skillforgedigital.com.ng" class="w-full p-4 rounded-2xl text-sm focus:border-gold outline-none transition-all" aria-label="trainee@skillforgedigital.com.ng">
            </div>
            <button type="submit" id="reset-btn" class="w-full bg-gold text-navy py-5 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] shadow-2xl hover:bg-white transition-all flex items-center justify-center gap-2">
                Send Reset Token <i data-lucide="mail" class="w-4 h-4"></i></button>
        </form>
        <div id="success-msg" class="hidden text-center space-y-4">
            <div class="w-16 h-16 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check-circle" class="w-8 h-8"></i>
            </div>
            <p class="text-sm font-bold text-white">Reset Token Dispatched</p>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest leading-relaxed">Check your inbox. Token expires in 15 minutes. Ensure you check spam/promotions.</p>
        </div>
    </main>
  </div>

  <script type="module">
    import { db, auth } from '../assets/firebase-config.js';
    import { collection, query, where, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

    function showResetError(msg) {
        const errEl = document.getElementById('reset-error');
        if (errEl) {
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
        }
    }

    function clearResetError() {
        const errEl = document.getElementById('reset-error');
        if (errEl) errEl.classList.add('hidden');
    }

    document.getElementById('forgot-form').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('reset-email').value.trim();
        const btn = document.getElementById('reset-btn');
        btn.disabled = true;
        btn.innerHTML = 'Dispatching Reset Link... <i class="fa-solid fa-spinner animate-spin ml-2"></i>';
        clearResetError();

        try {
            void("[Reset] Verifying registry entry for:", email);
            // Step 1: Check if user exists in our registry first
            const q = query(collection(db, "staffs"), where("email", "==", email));
            const snap = await getDocs(q);

            if (snap.empty) {
                void("[Reset] Registry mismatch: Identity not found in trainees collection.");
                showResetError("Identity Registry Error: No such email exists in the SkillForge database. Please verify your email or register again.");
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Token <i data-lucide="mail" class="w-4 h-4"></i>';
                if (window.lucide) window.lucide.createIcons();
                return;
            }

            void("[Reset] Identity verified. Dispatching master link via Auth service...");
            // Step 2: Use official Firebase Auth reset
            await sendPasswordResetEmail(auth, email);

            // Step 3: Audit Log entry
            await addDoc(collection(db, "audit_logs"), {
                type: "PASSWORD_RESET_REQUEST",
                email: email,
                timestamp: serverTimestamp(),
                success: true,
                method: "FIREBASE_AUTH"
            });
            
            // Step 4: Show Success
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
        } catch (err) {
            void("[Reset] Node failure:", err);
            let msg = "Registry synchronization interrupted.";
            
            if (err.code === 'auth/user-not-found') {
                msg = "Identity Registry Error: This email is not associated with an active master link. Please register.";
            } else if (err.code === 'auth/too-many-requests') {
                msg = "Registry locked due to too many requests. Please try again later.";
            } else if (err.message) {
                msg = "System Error: " + err.message;
            }
            
            showResetError(msg);
            btn.disabled = false;
            btn.innerHTML = 'Send Reset Token <i data-lucide="mail" class="w-4 h-4"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    };
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
