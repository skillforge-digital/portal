<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Portal — SkillForge Command Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#040810',
            gold: '#C9A84C',
            orange: '#E87722',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#040810; color:#f1f5f9; overflow-x:hidden; min-height: 100dvh; }
    #sundust-canvas { position:fixed; inset:0; width:100%; height:100dvh; z-index:0; pointer-events:none }
    .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4">
  <canvas id="sundust-canvas"></canvas>

  <div class="relative z-10 max-w-lg w-full text-center space-y-12">
    <header class="space-y-4 animate-slide-up">
        <div class="w-20 h-20 bg-gold/10 rounded-3xl flex items-center justify-center mx-auto border border-gold/20 mb-8">
            <i data-lucide="shield-check" class="w-10 h-10 text-gold"></i>
        </div>
        <h1 class="text-4xl md:text-5xl font-black text-white uppercase tracking-tighter">Staff Portal</h1>
        <p class="text-slate-500 text-[10px] md:text-xs font-black uppercase tracking-[0.4em]">SkillForge Command Registry</p>
    </header>

    <div class="grid grid-cols-1 gap-4 animate-slide-up" style="animation-delay: 0.2s;">
        <a href="./login/" class="glass p-8 rounded-[32px] border-white/5 hover:border-gold/30 hover:bg-gold/5 transition-all group flex items-center justify-between">
            <div class="text-left">
                <h2 class="text-xl font-black text-white uppercase">Personnel Login</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Authorized Access Only</p>
            </div>
            <i data-lucide="arrow-right" class="w-6 h-6 text-slate-500 group-hover:text-gold group-hover:translate-x-1 transition-all"></i>
        </a>
        
        <a href="./registration/" class="glass p-8 rounded-[32px] border-white/5 hover:border-orange/30 hover:bg-orange/5 transition-all group flex items-center justify-between">
            <div class="text-left">
                <h2 class="text-xl font-black text-white uppercase">Secure Onboarding</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Personnel Registration</p>
            </div>
            <i data-lucide="user-plus" class="w-6 h-6 text-slate-500 group-hover:text-orange group-hover:translate-x-1 transition-all"></i>
        </a>
    </div>

    <footer class="text-center pt-12 animate-slide-up" style="animation-delay: 0.4s;">
        <a href="../" class="text-[10px] font-black text-slate-500 uppercase tracking-widest hover:text-gold transition-all">
            <i data-lucide="home" class="w-3 h-3 inline-block mb-1 mr-1"></i> Return to Main Gateway
        </a>
    </footer>
  </div>

  <script>
    class Sundust {
      constructor() {
        this.canvas = document.getElementById('sundust-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initParticles();
        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
