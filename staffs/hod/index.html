  <script type="module">
    import { db } from '../../assets/firebase-config.js';
    import '../../assets/theme-manager.js';
    import { collection, query, getDocs, doc, getDoc, addDoc, deleteDoc, serverTimestamp, orderBy, limit } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { logStaffActivity } from '../../assets/staff-activity.js';

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        showTab(tab);
      });
    });
    
    document.getElementById('logout-btn').addEventListener('click', () => {
      if (window.staffCore) window.staffCore.logout();
    });

    async function showTab(tab) {
      // Role Switcher Logic
      if (window.staffCore && window.staffCore.profile && window.staffCore.profile.roles && window.staffCore.profile.roles.length > 1) {
          const switcher = document.getElementById('role-switcher');
          const rolePaths = {
              'Director': '/staffs/director/',
              'HOD': '/staffs/hod/',
              'Specialist': '/staffs/specialist/',
              'Digital Marketing': '/staffs/marketing/',
              'Support Staff': '/staffs/support/'
          };

          switcher.innerHTML = window.staffCore.profile.roles.map(role => {
              const path = rolePaths[role];
              if (!path) return '';
              const isActive = window.location.pathname.includes(path);
              return `
                  <a href="${path}" class="px-2 py-1 rounded-lg text-[7px] font-black uppercase tracking-widest transition-all ${isActive ? 'bg-purple-500 text-white' : 'text-slate-500 hover:text-white'}">
                      ${role.charAt(0)}
                  </a>
              `;
          }).join('');
          switcher.classList.remove('hidden');
      }

      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-purple-400', 'bg-purple-400/10', 'border-r-4', 'border-purple-400'));
      const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
      if (activeBtn) activeBtn.classList.add('active', 'text-purple-400', 'bg-purple-400/10', 'border-r-4', 'border-purple-400');
      
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-purple-400/20 border-t-purple-400 rounded-full animate-spin"></div></div>';
      
      switch(tab) {
        case 'design-studio': window.location.href = '/staffs/hod/customize/'; break;
              case 'overview': await renderOverview(content); break;
        case 'announcements': await renderAnnouncements(content); break;
        case 'trainees': await renderTrainees(content); break;
        case 'staff': await renderStaff(content); break;
        case 'logs': await renderLogs(content); break;
        case 'profile': await renderProfile(content); break;
        default: await renderOverview(content);
      }
      
      if (window.lucide) window.lucide.createIcons();
    }

    async function renderLogs(container) {
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-purple-400 text-xs font-black tracking-[0.4em] uppercase">Unit Ledger</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Activity Logs</h1>
          </div>
        </header>

        <div class="glass-strong rounded-[40px] p-8 border border-white/5 space-y-6">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex gap-2 p-1.5 glass rounded-[24px]">
              <button id="hod-log-unit" class="tab-btn active" onclick="window.setHodLogMode('unit')">HOD Unit</button>
              <button id="hod-log-global" class="tab-btn" onclick="window.setHodLogMode('global')">Global</button>
            </div>
          </div>
          <div id="hod-logs-container" class="max-h-[700px] overflow-y-auto custom-scrollbar"></div>
        </div>
      `;
      window.setHodLogMode('unit');
    }

    window.setHodLogMode = async (mode) => {
      const unitBtn = document.getElementById('hod-log-unit');
      const globalBtn = document.getElementById('hod-log-global');
      if (unitBtn) unitBtn.classList.toggle('active', mode === 'unit');
      if (globalBtn) globalBtn.classList.toggle('active', mode === 'global');
      const container = document.getElementById('hod-logs-container');
      if (!container) return;
      container.innerHTML = '<div class="flex items-center justify-center h-48"><div class="w-10 h-10 border-4 border-purple-400/20 border-t-purple-400 rounded-full animate-spin"></div></div>';
      const q = mode === 'global'
        ? query(collection(db, 'staff_activity_global'), orderBy('timestamp', 'desc'), limit(200))
        : query(collection(db, 'staff_activity_units', 'hod', 'entries'), orderBy('timestamp', 'desc'), limit(200));
      const snap = await getDocs(q);
      if (snap.empty) {
        container.innerHTML = '<p class="text-center text-white/40 py-12 italic uppercase font-bold tracking-widest">No activity recorded yet.</p>';
        return;
      }
      container.innerHTML = snap.docs.map(d0 => {
        const d = d0.data() || {};
        return `<div class="py-6 border-b border-white/5 hover:bg-white/[0.02] transition-colors px-4 rounded-2xl">
          <div class="flex justify-between items-center mb-3 gap-4">
            <span class="px-3 py-1 rounded-full bg-purple-400/10 text-purple-300 text-[7px] font-black uppercase tracking-widest border border-purple-400/20">${d.action || 'EVENT'}</span>
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${d.timestamp?.toDate().toLocaleString() || 'N/A'}</span>
          </div>
          <p class="text-sm text-white font-black uppercase tracking-tight">${d.actorName || 'System'} <span class="text-white/30">•</span> ${d.actorRole || 'Staff'}</p>
          <p class="text-[10px] text-slate-400 mt-2 font-mono bg-black/30 p-3 rounded-xl border border-white/5 leading-relaxed">${d.details || ''}</p>
        </div>`;
      }).join('');
    };
    
    window.toggleControl = async (feature) => {
      const uid = auth.currentUser ? auth.currentUser.uid : localStorage.getItem('skillforge_mock_uid');
      if (!uid) return;
      
      try {
        const userRef = doc(db, 'staffs', uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) return;
        const data = userSnap.data();
        if (!data) return;
        
        if (feature === 'light') {
            const newVal = !data.isLightMode;
            await updateDoc(userRef, { isLightMode: newVal });
            if (newVal) document.documentElement.classList.add('light-mode');
            else document.documentElement.classList.remove('light-mode');
            
            document.querySelectorAll('.ctrl-light-btn').forEach(b => {
                if (newVal) b.classList.replace('bg-white/20', 'bg-gold-500');
                else b.classList.replace('bg-gold-500', 'bg-white/20');
                b.querySelector('div').style.transform = newVal ? 'translateX(16px)' : 'translateX(0)';
            });
        } else if (feature === 'glow') {
            const controls = data.controls || {};
            const newVal = !controls.glow;
            await updateDoc(userRef, { 'controls.glow': newVal });
            if (newVal) document.documentElement.classList.add('glow-enabled');
            else document.documentElement.classList.remove('glow-enabled');
            
            document.querySelectorAll('.ctrl-glow-btn').forEach(b => {
                if (newVal) b.classList.replace('bg-white/20', 'bg-gold-500');
                else b.classList.replace('bg-gold-500', 'bg-white/20');
                b.querySelector('div').style.transform = newVal ? 'translateX(16px)' : 'translateX(0)';
            });
        }
      } catch (err) { void(err); }
    };

    window.showTab = showTab;

    async function renderProfile(container) {
        const profile = window.staffCore.profile;
        container.innerHTML = `
            <header class="animate-slide-up">
                <p class="text-purple-400 text-xs font-black tracking-[0.4em] uppercase">Personnel Registry</p>
                <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">My Profile</h1>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-slide-up" style="animation-delay: 0.1s">
                <!-- ID Card -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass p-8 rounded-[40px] border border-white/10 text-center space-y-6">
                        <div class="w-24 h-24 rounded-3xl bg-purple-400/10 border border-purple-400/20 mx-auto flex items-center justify-center text-purple-400 text-3xl font-black">
                            ${profile.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="text-xl font-black uppercase tracking-tight text-white">${profile.name}</h3>
                            <p class="text-[10px] text-purple-400 font-bold uppercase tracking-widest mt-1">${profile.primaryRole}</p>
                        </div>
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Personnel ID</p>
                            <p class="text-lg font-black text-white tracking-[0.2em]">${profile.sfid || 'PENDING'}</p>
                        </div>
                    </div>
                </div>

                <!-- Social Registry Management -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-strong p-10 rounded-[40px] border border-white/10 space-y-8">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="text-xl font-black text-white uppercase tracking-tight">Social Registry</h2>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Manage your digital connections</p>
                            </div>
                            <button onclick="addSocialRow()" aria-label="Add Social Handle" class="px-4 py-2 bg-purple-400/10 border border-purple-400/20 text-purple-400 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-400 hover:text-white transition-all">
                                Add Handle
                            </button>
                        </div>

                        <form id="social-registry-form" class="space-y-4">
                            <div id="social-handles-container" class="space-y-4">
                                ${(profile.socialMatrix || []).map((s, i) => `
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 social-row items-end">
                                        <div class="space-y-2">
                                            <label for="platform-${i}" class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Platform</label>
                                            <select id="platform-${i}" name="socialPlatform[]" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                                                <option value="Instagram" ${s.platform === 'Instagram' ? 'selected' : ''}>Instagram</option>
                                                <option value="Twitter" ${s.platform === 'Twitter' ? 'selected' : ''}>X (Twitter)</option>
                                                <option value="LinkedIn" ${s.platform === 'LinkedIn' ? 'selected' : ''}>LinkedIn</option>
                                                <option value="Facebook" ${s.platform === 'Facebook' ? 'selected' : ''}>Facebook</option>
                                                <option value="TikTok" ${s.platform === 'TikTok' ? 'selected' : ''}>TikTok</option>
                                                <option value="Discord" ${s.platform === 'Discord' ? 'selected' : ''}>Discord</option>
                                                <option value="Telegram" ${s.platform === 'Telegram' ? 'selected' : ''}>Telegram</option>
                                            </select>
                                        </div>
                                        <div class="relative space-y-2">
                                            <label for="handle-${i}" class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Handle</label>
                                            <div class="flex gap-2">
                                                <input id="handle-${i}" name="socialHandle[]" type="text" value="${s.handle}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white" aria-label="socialHandle[]">
                                                <button type="button" onclick="this.closest('.social-row').remove()" aria-label="Remove Social Handle" class="p-4 text-red-400 hover:bg-red-400/10 rounded-2xl transition-all">
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>

    async function updateSocialRegistry(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const originalText = btn.innerText;
        
        btn.innerText = "SYNCHRONIZING REGISTRY...";
        btn.disabled = true;

        const platforms = Array.from(e.target.querySelectorAll('select[name="socialPlatform[]"]')).map(s => s.value);
        const handles = Array.from(e.target.querySelectorAll('input[name="socialHandle[]"]')).map(i => i.value);
        
        const matrix = platforms.map((p, i) => ({
            platform: p,
            handle: handles[i]
        })).filter(s => s.platform && s.handle);

        try {
            const { updateDoc } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');
            const userRef = doc(db, 'hods', window.staffCore.user.uid);
            await updateDoc(userRef, {
                socialMatrix: matrix
            });

            window.staffCore.profile.socialMatrix = matrix;
            btn.innerText = "REGISTRY UPDATED";
            btn.style.background = "#10b981";
        } catch (err) {
            void(err);
            btn.innerText = "SYNC FAILED";
            btn.style.background = "#ef4444";
        } finally {
            setTimeout(() => {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style.background = "";
            }, 2000);
        }
    }

      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(168,85,247,\${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
  </script>
</body>
</html>
