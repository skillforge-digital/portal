function openWallpaperPreviewModal(w) {
  const url = String(w && w.url ? w.url : '').trim();
  if (!url) return;

  const prior = document.getElementById('sf-wallpaper-modal');
  if (prior) prior.remove();

  const backdrop = document.createElement('div');
  backdrop.className = 'sf-wp-modal-backdrop';
  backdrop.id = 'sf-wallpaper-modal';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');

  const modal = document.createElement('div');
  modal.className = 'sf-wp-modal';
  modal.onclick = (e) => e.stopPropagation();

  const preview = document.createElement('div');
  preview.className = 'sf-wp-modal-preview';
  preview.style.backgroundImage = `url("${url.replace(/"/g, '\\"')}")`;

  const actions = document.createElement('div');
  actions.className = 'sf-wp-modal-actions';

  const cancel = document.createElement('button');
  cancel.type = 'button';
  cancel.className = 'sf-wp-btn';
  cancel.textContent = 'Cancel';
  cancel.onclick = () => backdrop.remove();

  const apply = document.createElement('button');
  apply.type = 'button';
  apply.className = 'sf-wp-btn sf-wp-btn-apply';
  apply.textContent = 'Apply';
  apply.onclick = async () => {
    apply.disabled = true;
    try {
      await applyWallpaperSelection(url);
      backdrop.remove();
    } catch {
      apply.disabled = false;
      alert('Could not apply wallpaper. Please try again.');
    }
  };

  actions.append(cancel, apply);
  modal.append(preview, actions);
  backdrop.appendChild(modal);
  backdrop.onclick = () => backdrop.remove();

  document.body.appendChild(backdrop);
}

async function applyWallpaperSelection(url) {
  const nextUrl = String(url || '').trim();
  if (!nextUrl) return;

  pendingFile = null;
  currentDesign.type = 'wallpaper';
  currentDesign.wallpaper = nextUrl;

  document.body.style.backgroundImage = `url("${nextUrl.replace(/"/g, '\\"')}")`;
  document.documentElement.style.setProperty('--sf-wallpaper', `url("${nextUrl.replace(/"/g, '\\"')}")`);

  updatePreview();
  renderWallpaperUI();

  if (!profileRef) return;
  await updateDoc(profileRef, { 'settings.wallpaper': nextUrl, 'theme.wallpaper': nextUrl });
  void logStaffActivity({ action: 'wallpaper_change', meta: { url: nextUrl } });
}

function renderWallpaperUI() {
  const wGrid = document.getElementById('wallpaper-grid');
  if (!wGrid) return;
  const host = wGrid.parentElement;
  if (!host) return;
  let bar = document.getElementById('wallpaper-category-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'wallpaper-category-bar';
    bar.className = 'flex flex-wrap gap-2 items-center mb-5';
    host.insertBefore(bar, wGrid);
  }
  bar.innerHTML = '';
  const cats = [{ id: 'all', name: 'All' }, ...(Array.isArray(WALLPAPER_CATEGORIES) ? WALLPAPER_CATEGORIES.map((c) => ({ id: c.id, name: c.name })) : [])];
  cats.forEach((c) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = `px-4 py-2 rounded-full border text-[10px] font-black uppercase tracking-[0.35em] transition-all ${activeWallpaperCategory === c.id ? 'bg-purple-500 text-navy-950 border-purple-300 shadow-lg' : 'bg-white/5 text-white/60 border-white/10 hover:bg-white/10 hover:text-white'}`;
    b.textContent = c.name;
    b.onclick = () => { activeWallpaperCategory = c.id; renderWallpaperUI(); };
    bar.appendChild(b);
  });
  wGrid.innerHTML = '';
  const list = getWallpapers(activeWallpaperCategory);
  list.forEach((w, idx) => {
    const sw = document.createElement('div');
    sw.className = 'wallpaper-swatch';
    sw.setAttribute('role', 'button');
    sw.setAttribute('tabindex', '0');
    sw.setAttribute('aria-label', `Apply wallpaper ${idx + 1} — ${w.name}`);
    sw.dataset.url = w.url;
    sw.style.backgroundImage = `url("${String(w.thumb || w.url).replace(/"/g, '\\"')}")`;
    const select = () => openWallpaperPreviewModal(w);
    sw.onclick = select;
    sw.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } };
    wGrid.appendChild(sw);
  });
}
 
function showNetworkFault() {
  const loader = document.getElementById('loading-screen');
  if (!loader) return;
  const lines = loader.querySelectorAll('p');
  if (lines[0]) lines[0].innerText = 'Network Unstable';
  if (lines[1]) lines[1].innerText = 'Check connection and refresh.';
}
 
onAuthStateChanged(auth, async (user) => {
  try {
    if (user) {
      hodUid = user.uid;
      const staffRef = doc(db, 'staffs', hodUid);
      const hodRef = doc(db, 'hods', hodUid);
      const [staffDoc, hodDoc] = await Promise.all([
        getDoc(staffRef).catch(() => null),
        getDoc(hodRef).catch(() => null)
      ]);
      if (!staffDoc || !hodDoc) {
        showNetworkFault();
        return;
      }
      const snap = staffDoc.exists() ? staffDoc : hodDoc;
      profileRef = staffDoc.exists() ? staffRef : hodRef;
      if (snap.exists()) {
        const data = snap.data();
        document.getElementById('user-name').innerText = data.name || 'HOD';
        document.getElementById('user-role').innerText = data.primaryRole || 'HOD';
        document.getElementById('user-initials').innerText = (data.name || 'H').charAt(0).toUpperCase();
        if (data.theme) currentDesign = { ...currentDesign, ...data.theme };
        if (data.settings && data.settings.wallpaper) {
          currentDesign.wallpaper = data.settings.wallpaper;
          currentDesign.type = 'wallpaper';
        }
        applyControlUI({ canvasDaily: localStorage.getItem('sf_canvas_enabled') !== 'false' });
        updatePreview();
      }
      hideLoading();
      return;
    }
    window.location.href = '/staffs/login/';
  } catch (err) {
    void(err);
    showNetworkFault();
  }
});
 
function hideLoading() {
  const loader = document.getElementById('loading-screen');
  if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.classList.add('hidden'), 500); }
}
 
function init() {
  const dGrid = document.getElementById('dual-grid');
  if (dGrid) {
    dualColors.forEach(d => {
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.setAttribute('role', 'button');
      sw.setAttribute('tabindex', '0');
      sw.setAttribute('aria-label', `Apply color theme: ${d.p} and ${d.s}`);
      sw.dataset.p = d.p;
      sw.dataset.s = d.s;
      sw.innerHTML = `<div class="dual-inner"><div class="dual-1" style="background:${d.p}"></div><div class="dual-2" style="background:${d.s}"></div></div>`;
      sw.onclick = () => { currentDesign.primary = d.p; currentDesign.secondary = d.s; currentDesign.type = 'solid-pair'; updatePreview(); };
      sw.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); sw.click(); } };
      dGrid.appendChild(sw);
    });
  }
  const gGrid = document.getElementById('gradient-grid');
  if (gGrid) {
    gradients.forEach(g => {
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.setAttribute('role', 'button');
      sw.setAttribute('tabindex', '0');
      sw.setAttribute('aria-label', `Apply gradient theme: ${g.c1} to ${g.c2}`);
      sw.dataset.c1 = g.c1;
      sw.dataset.c2 = g.c2;
      sw.style.background = `linear-gradient(135deg, ${g.c1}, ${g.c2})`;
      sw.onclick = () => { currentDesign.c1 = g.c1; currentDesign.c2 = g.c2; currentDesign.type = 'gradient'; updatePreview(); };
      sw.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); sw.click(); } };
      gGrid.appendChild(sw);
    });
  }
  const wGrid = document.getElementById('wallpaper-grid');
  if (wGrid) renderWallpaperUI();
  const fGrid = document.getElementById('font-grid');
  if (fGrid) {
    preloadDesignStudioFonts();
    fonts.forEach(f => {
      const card = document.createElement('div');
      card.className = 'font-card';
      card.setAttribute('aria-label', `Apply typography: ${f.name}`);
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.dataset.family = f.family;
      card.style.fontFamily = f.family;
      card.innerHTML = `<p class="text-[8px] font-black uppercase tracking-widest text-white/30 mb-3">${f.name}</p><p class="text-xl font-black tracking-tight mb-2">SkillForge Command Center</p><p class="text-[9px] text-white/40 mb-3">Aa Bb Cc — 0123456789</p><p class="text-[9px] text-white/40">${f.desc}</p>`;
      card.onclick = () => { currentDesign.fontFamily = f.family; currentDesign.fontName = f.name; updatePreview(); };
      card.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); } };
      fGrid.appendChild(card);
    });
  }
  const wpUpload = document.getElementById('wallpaper-upload');
  if (wpUpload) {
    wpUpload.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        pendingFile = file;
        currentDesign.type = 'wallpaper';
        const reader = new FileReader();
        reader.onload = (ev) => {
          const dataUrl = ev.target?.result ? String(ev.target.result) : '';
          if (dataUrl) currentDesign.wallpaper = dataUrl;
          const box = document.getElementById('preview-box');
          if (box) { box.style.background = `url(${dataUrl})`; box.style.backgroundSize = 'cover'; }
          updatePreview();
          renderWallpaperUI();
        };
        reader.readAsDataURL(file);
      }
    };
  }
  setTimeout(hideLoading, 5000);
}
 
function updatePreview() {
  const box = document.getElementById('preview-box');
  const text = document.getElementById('preview-text');
  const bar = document.getElementById('preview-bar');
  if (!box || !text || !bar) return;
  document.querySelectorAll('.swatch, .wallpaper-swatch, .font-card').forEach(el => {
    el.classList.remove('active');
    el.setAttribute('aria-selected', 'false');
  });
  const esc = (v) => (window.CSS && CSS.escape ? CSS.escape(String(v)) : String(v));
  try {
    if (currentDesign.type === 'solid-pair' || currentDesign.type === 'dual') {
      const p = currentDesign.primary || currentDesign.c1;
      const s = currentDesign.secondary || currentDesign.c2;
      box.style.background = p; box.style.backgroundImage = 'none';
      bar.style.backgroundColor = s;
      document.documentElement.style.setProperty('--accent-color', s);
      document.documentElement.style.setProperty('--accent-color-rgb', hexToRgb(s));
      const active = document.querySelector(`#dual-grid .swatch[data-p="${esc(p)}"][data-s="${esc(s)}"]`);
      if (active) { active.classList.add('active'); active.setAttribute('aria-selected', 'true'); }
    } else if (currentDesign.type === 'gradient') {
      box.style.background = `linear-gradient(135deg, ${currentDesign.c1}, ${currentDesign.c2})`;
      box.style.backgroundImage = 'none';
      bar.style.backgroundColor = currentDesign.c1;
      document.documentElement.style.setProperty('--accent-color', currentDesign.c1);
      document.documentElement.style.setProperty('--accent-color-rgb', hexToRgb(currentDesign.c1));
      const active = document.querySelector(`#gradient-grid .swatch[data-c1="${esc(currentDesign.c1)}"][data-c2="${esc(currentDesign.c2)}"]`);
      if (active) { active.classList.add('active'); active.setAttribute('aria-selected', 'true'); }
    } else if (currentDesign.type === 'wallpaper') {
      box.style.background = '';
      scheduleBackgroundHydration(box, currentDesign.wallpaper || '', { intervalMs: 1600, maxAttempts: 14 });
      box.style.backgroundSize = 'cover'; box.style.backgroundPosition = 'center';
      bar.style.backgroundColor = '#a855f7';
      document.documentElement.style.setProperty('--accent-color', '#a855f7');
      document.documentElement.style.setProperty('--accent-color-rgb', '168, 85, 247');
      const active = currentDesign.wallpaper ? document.querySelector(`.wallpaper-swatch[data-url="${esc(currentDesign.wallpaper)}"]`) : null;
      if (active) { active.classList.add('active'); active.setAttribute('aria-selected', 'true'); }
    }
    if (currentDesign.fontFamily) text.style.fontFamily = currentDesign.fontFamily;
    if (currentDesign.fontFamily) {
      const active = document.querySelector(`.font-card[data-family="${esc(currentDesign.fontFamily)}"]`);
      if (active) { active.classList.add('active'); active.setAttribute('aria-selected', 'true'); }
    }
  } catch (err) { void('[Design Studio] Preview update failed:', err); }
}
 
function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '168, 85, 247';
}
 
window.setTab = (tab) => {
  ['colors', 'wallpapers', 'fonts'].forEach(t => {
    document.getElementById(`section-${t}`).classList.toggle('hidden', t !== tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
};
 
window.toggleCanvas = () => {
  const isEnabled = localStorage.getItem('sf_canvas_enabled') !== 'false';
  localStorage.setItem('sf_canvas_enabled', !isEnabled);
  applyControlUI({ canvasDaily: !isEnabled });
};
 
function applyControlUI(controls) {
  const toggle = document.getElementById('canvas-toggle');
  if (!toggle) return;
  const isEnabled = controls.canvasDaily !== false;
  toggle.classList.toggle('bg-purple-500', isEnabled);
  toggle.querySelector('div').style.left = isEnabled ? '1.75rem' : '0.25rem';
}
 
window.saveDesign = async () => {
  const btn = document.getElementById('save-btn');
  if (btn.disabled || !hodUid) return;
  btn.disabled = true; btn.innerText = "Saving Atmosphere Matrix...";
  try {
    if (pendingFile) {
      btn.innerText = "Uploading Atmosphere...";
      const fileName = `wallpapers/${hodUid}_${Date.now()}.jpg`;
      const { error } = await supabase.storage.from('avatars').upload(fileName, pendingFile);
      if (error) throw error;
      const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(fileName);
      currentDesign.wallpaper = cloudinaryFetch(publicUrl);
      currentDesign.type = 'wallpaper';
      pendingFile = null;
    }
 
    const finalTheme = {
      type: currentDesign.type || 'solid-pair',
      primary: currentDesign.primary || currentDesign.c1 || '#040810',
      secondary: currentDesign.secondary || currentDesign.c2 || '#a855f7',
      c1: currentDesign.c1 || currentDesign.primary || '#040810',
      c2: currentDesign.c2 || currentDesign.secondary || '#a855f7',
      wallpaper: currentDesign.wallpaper || '',
      fontFamily: currentDesign.fontFamily || "'Space Grotesk', sans-serif",
      fontName: currentDesign.fontName || 'Space Grotesk'
    };
    await updateDoc(doc(db, 'hods', hodUid), { theme: finalTheme });
    await updateDoc(profileRef || doc(db, 'hods', hodUid), { theme: finalTheme });
    await logStaffActivity({ action: 'THEME_COMMIT', details: 'Theme commit', scope: 'global' });
    window.dispatchEvent(new CustomEvent('sf:theme_updated', { detail: finalTheme }));
    btn.innerText = "Atmosphere Saved";
    setTimeout(() => { btn.innerText = "Save Atmosphere Matrix"; btn.disabled = false; }, 2000);
    alert("Atmosphere Saved. Your command center matrix is now active.");
  } catch (err) {
    void('[Design Studio] Save failed:', err);
    btn.innerText = "Save Interrupted"; btn.disabled = false;
    alert("Save failed. Portal sync interrupted.");
  }
};
 
window.restoreDefaults = async () => {
  if (!confirm("Restore default atmosphere? This will reset your colors and fonts.")) return;
  currentDesign = { type: 'solid-pair', primary: '#040810', secondary: '#a855f7', fontFamily: 'Space Grotesk', fontName: 'Space Grotesk', wallpaper: '' };
  updatePreview();
  await saveDesign();
};
 
window.toggleSidebar = () => {
  const sidebar = document.getElementById('main-sidebar');
  if (sidebar) sidebar.classList.toggle('-translate-x-full');
};
 
init();
window.addEventListener('load', () => { if (window.lucide) window.lucide.createIcons(); });
