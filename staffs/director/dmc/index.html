  <script>

    async function showTab(tab) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold');
      
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      
      switch(tab) {
        case 'overview': content.innerHTML = await renderOverview(); break;
        case 'profile': content.innerHTML = await renderProfile(); break;
        case 'customize': content.innerHTML = await renderCustomize(); break;
        default: content.innerHTML = await renderProfile();
      }
      
      if (window.lucide) window.lucide.createIcons();
    }

                    <p class="card-meta-value text-green-400">Active</p>
                  </div>
                  <div class="card-meta-item">
                    <p class="card-meta-label">Joined</p>
                    <p class="card-meta-value">${p.created_at ? new Date(p.created_at).toLocaleDateString() : 'N/A'}</p>

                <div class="card-qr">
                  <img loading="lazy" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=skillforge://staff/${p.uid || 'unknown'}" alt="QR">

          <!-- Card Controls -->
          <div class="space-y-8">
            <div class="glass p-8 rounded-[32px] border border-white/5">
              <h3 class="text-lg font-black uppercase mb-6">Card Customization</h3>
              
              <div class="space-y-4">
                <div>
                  <label for="card-name-input" class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Display Name</label>

    }

    function renderCustomize() {
      return `
        <header class="mb-12">
          <p class="text-gold text-xs font-black tracking-[0.4em] uppercase mb-2">Personal Settings</p>
          <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter">Customize Profile</h1>

    window.updateCardPreview = function() {
      const name = document.getElementById('card-name-input')?.value;
      const photo = document.getElementById('card-photo-input')?.value;
      
      const nameEl = document.getElementById('card-name');
      const photoEl = document.getElementById('card-photo');
      
      if (nameEl && name) nameEl.textContent = name.toUpperCase();
      if (photoEl && photo) photoEl.src = photo;
    };

    window.exportCard = async function(format) {
      const card = document.getElementById('staff-card-preview');
      if (!card) return;
      
      try {
        const canvas = await html2canvas(card, { scale: 3, useCORS: true, backgroundColor: null });
        
        if (format === 'jpg') {
          const link = document.createElement('a');
          link.download = 'staff-id-card.jpg';
          link.href = canvas.toDataURL('image/jpeg', 0.95);
          link.click();
        } else {
          const link = document.createElement('a');
          link.download = 'staff-id-card.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        }
      } catch (err) {
        void('Export failed:', err);
        alert('Export failed. Please try again.');
      }
    };

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      const check = setInterval(() => {
        if (window.staffCore?.profile) {
          clearInterval(check);
          const p = window.staffCore.profile;
          document.getElementById('user-name').textContent = p.name || 'DIRECTOR';
          document.getElementById('user-role').textContent = p.primaryRole || 'Staff';
          document.getElementById('user-initials').textContent = (p.name || 'D').charAt(0);
          showTab('profile');
        }
      }, 100);
    });
  </script>

  <script type="module">
    import StaffCore from '../../assets/staff-core.js';
    import { db } from '../../assets/firebase-config.js';
    import { collection, query, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

    // Sundust Background
    class Sundust {
      constructor() {
        this.canvas = document.getElementById('sundust-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initParticles();
        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
  </script>
</body>
