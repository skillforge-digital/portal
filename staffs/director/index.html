  <script type="module">
    import { staffCommand } from '../../assets/staff-command.js';
    import { ROLES, PERMISSIONS } from '../../assets/rbac-config.js';
    import { db, auth } from '../../assets/firebase-config.js';
    import { 
        collection, query, getDocs, doc, getDoc, setDoc, addDoc, 
        deleteDoc, updateDoc, serverTimestamp, orderBy, onSnapshot, writeBatch, limit, where 
    } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

    // Global state
    let currentTab = 'overview';
    let currentTabUnsub = null;
    const __arm = new Map();
    const __ARM_WINDOW_MS = 5000;

    function requireArm(key, firstClickMessage) {
      const now = Date.now();
      const last = __arm.get(key) || 0;
      if (now - last < __ARM_WINDOW_MS) {
        __arm.delete(key);
        return true;
      }
      __arm.set(key, now);
      alert(firstClickMessage || 'Click again to confirm.');
      return false;
    }

    function requireTypedConfirm(promptText, requiredWord) {
      const value = prompt(promptText || 'Type APPROVE to continue');
      return (value || '').trim().toUpperCase() === (requiredWord || 'APPROVE');
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '../login/'; return; }
      
      const success = await staffCommand.init(user.uid);
      if (!success) {
          void("Staff authorization failed.");
          window.location.href = '../login/?error=unauthorized';
          return;
      }

      // Sync user info
      document.getElementById('user-name').textContent = staffCommand.userData.name || 'DIRECTOR';
      document.getElementById('user-role').textContent = (staffCommand.userData.roles || []).join(' | ');
      document.getElementById('user-initials').textContent = (staffCommand.userData.name || 'D').charAt(0);
      
      loadNewsTicker();
      showTab('overview');
    });

    async function loadNewsTicker() {
      const ticker = document.getElementById('news-ticker-content');
      if (!ticker) return;

      try {
        const q = query(collection(db, 'announcements'), orderBy('timestamp', 'desc'), limit(5));
        const snap = await getDocs(q);
        
        let messages = [];
        if (snap.empty) {
          messages = [
            "Welcome to SkillForge Season 2026. Portal Registry is Active.",
            "New Mastery Track: AI Content Creation now live in the Academy.",
            "Specialist Command Center is now accepting Silver Badge requests.",
            "Daily Pulse check: 1 XP per minute of active study time.",
            "Join our global Discord for elite technical support and networking."
          ];
        } else {
          snap.forEach(doc => {
            const d = doc.data();
            messages.push(d.message || d.title || "New Announcement");
          });
        }

        ticker.innerHTML = messages.map(m => `<span class="text-[9px] font-bold text-white/60 uppercase tracking-widest flex items-center gap-4"><div class="w-1 h-1 rounded-full bg-gold"></div> ${m}</span>`).join('');
        ticker.innerHTML += ticker.innerHTML;
      } catch (err) {
        void("[Dashboard] News Ticker failed to load registry data.");
      }
    }

    // --- NAVIGATION ---
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        window.showTab(tab);
      });
    });
    
    document.getElementById('logout-btn').addEventListener('click', async () => {
        await auth.signOut();
        window.location.href = '../login/';
    });

    
    window.toggleControl = async (feature) => {
      const uid = auth.currentUser ? auth.currentUser.uid : localStorage.getItem('skillforge_mock_uid');
      if (!uid) return;
      
      try {
        const userRef = doc(db, 'staffs', uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) return;
        const data = userSnap.data();
        if (!data) return;
        
        if (feature === 'light') {
            const newVal = !data.isLightMode;
            await updateDoc(userRef, { isLightMode: newVal });
            if (newVal) document.documentElement.classList.add('light-mode');
            else document.documentElement.classList.remove('light-mode');
            
            document.querySelectorAll('.ctrl-light-btn').forEach(b => {
                if (newVal) b.classList.replace('bg-white/20', 'bg-gold-500');
                else b.classList.replace('bg-gold-500', 'bg-white/20');
                b.querySelector('div').style.transform = newVal ? 'translateX(16px)' : 'translateX(0)';
            });
        } else if (feature === 'glow') {
            const controls = data.controls || {};
            const newVal = !controls.glow;
            await updateDoc(userRef, { 'controls.glow': newVal });
            if (newVal) document.documentElement.classList.add('glow-enabled');
            else document.documentElement.classList.remove('glow-enabled');
            
            document.querySelectorAll('.ctrl-glow-btn').forEach(b => {
                if (newVal) b.classList.replace('bg-white/20', 'bg-gold-500');
                else b.classList.replace('bg-gold-500', 'bg-white/20');
                b.querySelector('div').style.transform = newVal ? 'translateX(16px)' : 'translateX(0)';
            });
        }
      } catch (err) { void(err); }
    };

    window.showTab = async function(tab) {
      if (currentTabUnsub) { currentTabUnsub(); currentTabUnsub = null; }
      currentTab = tab;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold'));
      const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
      if (activeBtn) activeBtn.classList.add('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold');
      
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      
      try {
          switch(tab) {
            case 'design-studio': window.location.href = '/staffs/director/customize/'; break;
              case 'overview': await renderOverview(content); break;
            case 'trainees': await renderTrainees(content); break;
            case 'staff': await renderStaff(content); break;
            case 'approvals': await renderApprovals(content); break;
            case 'faults': await renderFaults(content); break;
            case 'announcements': await renderAnnouncements(content); break;
            case 'seasons': await renderSeasons(content); break;
            case 'codes': await renderCodes(content); break;
            case 'audit': await renderAudit(content); break;
            case 'profile': await renderProfile(content); break;
            default: await renderOverview(content);
          }
      } catch (e) {
          content.innerHTML = `<div class="p-10 glass text-center text-red-400 font-bold uppercase tracking-widest">System Connection Interrupted: ${e.message}</div>`;
      }
      
      if (window.lucide) window.lucide.createIcons();
    }

    window.renderProfile = async function(container) {
        const profile = staffCommand.userData;
        container.innerHTML = `
            <header class="animate-slide-up">
                <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Director Registry</p>
                <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Command Profile</h1>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-slide-up" style="animation-delay: 0.1s">
                <!-- ID Card -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass p-8 rounded-[40px] border border-white/10 text-center space-y-6">
                        <div class="w-24 h-24 rounded-3xl bg-gold/10 border border-gold/20 mx-auto flex items-center justify-center text-gold text-3xl font-black">
                            ${profile.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="text-xl font-black uppercase tracking-tight text-white">${profile.name}</h3>
                            <p class="text-[10px] text-gold font-bold uppercase tracking-widest mt-1">EXECUTIVE DIRECTOR</p>
                        </div>
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Personnel ID</p>
                            <p class="text-lg font-black text-white tracking-[0.2em]">${profile.sfid || 'PENDING'}</p>
                        </div>
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Master Passkey</p>
                            <p class="text-lg font-black text-gold tracking-[0.2em]">${profile.roleCode || 'XXXXXX'}</p>
                        </div>
                    </div>
                </div>

                <!-- Social Matrix Management -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-strong p-10 rounded-[40px] border border-white/10 space-y-8">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="text-xl font-black text-white uppercase tracking-tight">Social Matrix</h2>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Manage your digital connections</p>
                            </div>
                            <button onclick="addSocialRow()" aria-label="Add Social Handle" class="px-4 py-2 bg-gold/10 border border-gold/20 text-gold rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-gold hover:text-navy transition-all">
                                Add Handle
                            </button>
                        </div>

                        <form id="social-matrix-form" class="space-y-4">
                            <div id="social-handles-container" class="space-y-4">
                                ${(profile.socialMatrix || []).map((s, i) => `
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 social-row items-end">
                                        <div class="space-y-2">
                                            <label for="platform-${i}" class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Platform</label>
                                            <select id="platform-${i}" name="socialPlatform[]" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                                                <option value="Instagram" ${s.platform === 'Instagram' ? 'selected' : ''}>Instagram</option>
                                                <option value="Twitter" ${s.platform === 'Twitter' ? 'selected' : ''}>X (Twitter)</option>
                                                <option value="LinkedIn" ${s.platform === 'LinkedIn' ? 'selected' : ''}>LinkedIn</option>
                                                <option value="Facebook" ${s.platform === 'Facebook' ? 'selected' : ''}>Facebook</option>
                                                <option value="TikTok" ${s.platform === 'TikTok' ? 'selected' : ''}>TikTok</option>
                                                <option value="Discord" ${s.platform === 'Discord' ? 'selected' : ''}>Discord</option>
                                                <option value="Telegram" ${s.platform === 'Telegram' ? 'selected' : ''}>Telegram</option>
                                            </select>
                                        </div>
                                        <div class="relative space-y-2">

    async function updateSocialRegistry(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = 'Syncing...';

        const formData = new FormData(e.target);
        const platforms = formData.getAll('socialPlatform[]');
        const handles = formData.getAll('socialHandle[]');
        
        const matrix = platforms.map((p, i) => ({
            platform: p,
            handle: handles[i]
        })).filter(s => s.handle);

        try {
            const { updateDoc } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');
            await updateDoc(doc(db, 'staffs', auth.currentUser.uid), {
                socialMatrix: matrix
            });
            alert("Social Registry Updated Successfully.");
            staffCommand.userData.socialMatrix = matrix;
            showTab('profile');
        } catch (err) {
            void(err);
            alert("Update Failed: Registry link interrupted.");
        } finally {
            btn.disabled = false;
            btn.innerText = 'Update Social Registry';
        }
    }

            const rolesRef = doc(db, 'system', 'roles');
            const snap = await getDoc(rolesRef);
            let roles = [];
            if (snap.exists()) {
                roles = snap.data().roles || [];
            }
            if (!roles.includes(roleName)) {
                roles.push(roleName);
                await setDoc(rolesRef, { roles: roles }, { merge: true });
            }
            
            document.getElementById('role-manager-modal').remove();
            await manageUserRoles(uid);
        } catch (error) {
            void("Failed to create custom role:", error);
            alert("Error creating custom role");
        }
    };

        if (!requireArm(`approve:${uid}`, 'Click Approve again to confirm clearance activation.')) return;
        try {
            const staffRef = doc(db, "staffs", uid);
            const staffSnap = await getDoc(staffRef);
            if (!staffSnap.exists()) return;
            
            const data = staffSnap.data();
            
            // 1. Update Staff Status
            await updateDoc(staffRef, { status: 'active' });
            
            // 2. Update Role Code status
            if (data.roleCode) {
                await setDoc(doc(db, "role_codes", data.roleCode), { status: 'active' }, { merge: true });
                
                // 3. Update Track Access status
                await setDoc(doc(db, "track_access", data.roleCode), { status: 'active' }, { merge: true });
            }
            
            alert("Personnel clearance activated successfully.");
        } catch (err) {
            alert("Approval Failed: " + err.message);
        }
    };

    window.rejectStaff = async (uid) => {
        if (!requireTypedConfirm("CRITICAL: Type APPROVE to reject and purge this personnel application.", "APPROVE")) return;
        try {
            const staffRef = doc(db, "staffs", uid);
            const staffSnap = await getDoc(staffRef);
            if (staffSnap.exists()) {
                const data = staffSnap.data();
                if (data.roleCode) {
                    // Reset role code to unused
                    await setDoc(doc(db, "role_codes", data.roleCode), { used: false, usedBy: null, status: 'available' }, { merge: true });
                    await deleteDoc(doc(db, "track_access", data.roleCode));
                }
            }
            await deleteDoc(staffRef);
            alert("Personnel application rejected and purged.");
        } catch (err) {
            alert("Operation Failed: " + err.message);
        }
    };

          <span class="px-4 py-2 rounded-xl ${d.used ? 'bg-red-500/10 text-red-400' : 'bg-green-500/10 text-green-400'} text-[8px] font-black uppercase tracking-widest border ${d.used ? 'border-red-500/20' : 'border-green-500/20'}">
            ${d.used ? 'Claimed' : 'Available'}
          </span>
        </div>`;
      }).join('');
    }

    window.generateRoleCode = async function() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'SKF-';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      
      const rolesInput = prompt('Enter unit roles (comma-separated):\nDirector, HOD, Specialist, Digital Marketing, Support Team');
      if (!rolesInput) return;
      
      const roleList = rolesInput.split(',').map(r => r.trim()).filter(r => r);
      
      await setDoc(doc(db, 'role_codes', code), {
        roles: roleList,
        used: false,
        createdBy: staffCommand.userData.name,
        createdAt: serverTimestamp()
      });
      
      alert(`Authorization Key Generated: ${code}`);
      loadRoleCodes();
    };

    window.renderAudit = async function(container) {
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Security Ledger</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Audit Logs</h1>
          </div>
        </header>

        <div class="glass-strong rounded-[40px] p-8 border border-white/5 space-y-6">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex gap-2 p-1.5 glass rounded-[24px]">
              <button id="log-mode-activity" class="tab-btn active" onclick="window.setLogMode('activity')">Staff Activity</button>
              <button id="log-mode-audit" class="tab-btn" onclick="window.setLogMode('audit')">System Audit</button>
            </div>
            <div id="staff-log-filters" class="flex items-center gap-3">
              <span class="text-[8px] font-black text-white/30 uppercase tracking-[0.4em]">View</span>
              <select id="staff-log-scope" class="bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-[10px] font-black uppercase tracking-widest text-white/70">
                <option value="global">Global</option>
                <option value="director">Director</option>
                <option value="hod">HOD</option>
                <option value="specialist">Specialist</option>
                <option value="marketing">Marketing</option>
                <option value="support">Support</option>
              </select>
            </div>
          </div>

          <div id="logs-container" class="max-h-[700px] overflow-y-auto custom-scrollbar"></div>
        </div>
      `;

      const scopeSel = document.getElementById('staff-log-scope');
      if (scopeSel) scopeSel.onchange = () => window.renderStaffActivity(scopeSel.value);
      window.setLogMode('activity');
    }

    window.setLogMode = async (mode) => {
      const aBtn = document.getElementById('log-mode-activity');
      const sBtn = document.getElementById('log-mode-audit');
      const filters = document.getElementById('staff-log-filters');
      if (aBtn) aBtn.classList.toggle('active', mode === 'activity');
      if (sBtn) sBtn.classList.toggle('active', mode === 'audit');
      if (filters) filters.classList.toggle('hidden', mode !== 'activity');
      if (mode === 'audit') {
        await window.renderSystemAudit();
      } else {
        const scopeSel = document.getElementById('staff-log-scope');
        await window.renderStaffActivity(scopeSel ? scopeSel.value : 'global');
      }
    };

    window.renderStaffActivity = async (scopeKey) => {
      const container = document.getElementById('logs-container');
      if (!container) return;
      container.innerHTML = '<div class="flex items-center justify-center h-48"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      const baseQuery = scopeKey && scopeKey !== 'global'
        ? query(collection(db, 'staff_activity_units', scopeKey, 'entries'), orderBy('timestamp', 'desc'), limit(200))
        : query(collection(db, 'staff_activity_global'), orderBy('timestamp', 'desc'), limit(200));
      const snap = await getDocs(baseQuery);
      if (snap.empty) {
        container.innerHTML = '<p class="text-center text-white/40 py-12 italic uppercase font-bold tracking-widest">No activity recorded yet.</p>';
        return;
      }
      container.innerHTML = snap.docs.map(d0 => {
        const d = d0.data() || {};
        return `<div class="py-6 border-b border-white/5 hover:bg-white/[0.02] transition-colors px-4 rounded-2xl">
          <div class="flex justify-between items-center mb-3 gap-4">
            <span class="px-3 py-1 rounded-full bg-gold/10 text-gold text-[7px] font-black uppercase tracking-widest border border-gold/20">${d.action || 'EVENT'}</span>
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${d.timestamp?.toDate().toLocaleString() || 'N/A'}</span>
          </div>
          <p class="text-sm text-white font-black uppercase tracking-tight">${d.actorName || 'System'} <span class="text-white/30">•</span> ${d.actorRole || 'Staff'}</p>
          <p class="text-[10px] text-slate-400 mt-2 font-mono bg-black/30 p-3 rounded-xl border border-white/5 leading-relaxed">${d.details || ''}</p>
        </div>`;
      }).join('');
    };

    window.renderSystemAudit = async () => {
      const container = document.getElementById('logs-container');
      if (!container) return;
      container.innerHTML = '<div class="flex items-center justify-center h-48"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      const snap = await getDocs(query(collection(db, 'audit_logs'), orderBy('timestamp', 'desc'), limit(150)));
      if (snap.empty) {
        container.innerHTML = '<p class="text-center text-white/40 py-12 italic uppercase font-bold tracking-widest">Ledger is empty.</p>';
        return;
      }
      container.innerHTML = snap.docs.map(d0 => {
        const d = d0.data() || {};
        return `<div class="py-6 border-b border-white/5 hover:bg-white/[0.02] transition-colors px-4 rounded-2xl">
          <div class="flex justify-between items-center mb-3 gap-4">
            <span class="px-3 py-1 rounded-full bg-gold/10 text-gold text-[7px] font-black uppercase tracking-widest border border-gold/20">${d.action}</span>
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${d.timestamp?.toDate().toLocaleString() || 'N/A'}</span>
          </div>
          <p class="text-sm text-white font-black uppercase tracking-tight">${d.performedBy || 'System'}</p>
          <p class="text-[10px] text-slate-400 mt-2 font-mono bg-black/30 p-3 rounded-xl border border-white/5 leading-relaxed">${d.details || ''}</p>
        </div>`;
      }).join('');
    };

    // Trainee Actions
    window.viewTrainee = async function(uid) {
      const snap = await getDoc(doc(db, 'trainees', uid));
      if (!snap.exists()) return;
      const d = snap.data();
      alert(`Registry ID: ${d.sfid || 'Pending'}\nName: ${d.name}\nUnit: ${d.track}\nXP: ${d.xp || 0}\nStatus: ${d.status || 'Active'}`);
    };
    
    window.deleteTrainee = async function(uid) {
      if (!confirm('CRITICAL: Purge this trainee from the registry permanently?')) return;
      await deleteDoc(doc(db, 'trainees', uid));
      window.showTab('trainees');
    };

    window.closeAnnouncementModal = function() {
      document.getElementById('announcement-modal').classList.add('hidden');
    };
    
    window.showNewAnnouncementModal = function() {
      document.getElementById('announcement-modal').classList.remove('hidden');
    };

    // --- BACKGROUND ---
    class Sundust {
      constructor() {
        this.canvas = document.getElementById('sundust-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initParticles();
        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.15,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
  </script>
</body>
