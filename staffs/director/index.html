  <script type="module">
    import { staffCommand } from '../../assets/staff-command.js';
    import '../../assets/theme-manager.js';
    import '../../assets/staff-master-access.js';
    import { ROLES, PERMISSIONS } from '../../assets/rbac-config.js';
    import { db, auth } from '../../assets/firebase-config.js';
    import { buildResetTicketCode, buildResetWhatsappMessage, buildWhatsappLink, normalizePhone, TRACK_TELEGRAM_NODES } from '../../assets/registry-utils.js';
    import { 
        collection, query, getDocs, doc, getDoc, setDoc, addDoc, 
        deleteDoc, updateDoc, serverTimestamp, orderBy, onSnapshot, writeBatch, limit, where, Timestamp 
    } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

    // Global state
    let currentTab = 'overview';
    let currentTabUnsub = null;
    const registryAdminState = {
      scope: 'trainees',
      items: [],
      filtered: [],
      search: '',
      selectedId: null,
      selectedDoc: null
    };
    const __arm = new Map();
    const __ARM_WINDOW_MS = 5000;

    function requireArm(key, firstClickMessage) {
      const now = Date.now();
      const last = __arm.get(key) || 0;
      if (now - last < __ARM_WINDOW_MS) {
        __arm.delete(key);
        return true;
      }
      __arm.set(key, now);
      alert(firstClickMessage || 'Click again to confirm.');
      return false;
    }

    function requireTypedConfirm(promptText, requiredWord) {
      const value = prompt(promptText || 'Type APPROVE to continue');
      return (value || '').trim().toUpperCase() === (requiredWord || 'APPROVE');
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '../login/'; return; }
      
      const success = await staffCommand.init(user.uid);
      if (!success) {
          void("Staff authorization failed.");
          window.location.href = '../login/?error=unauthorized';
          return;
      }

      // Sync user info
      const myRoles = normalizeRoles(staffCommand.userData);
      document.getElementById('user-name').textContent = staffCommand.userData.name || 'DIRECTOR';
      document.getElementById('user-role').textContent = myRoles.join(' | ');
      document.getElementById('user-initials').textContent = (staffCommand.userData.name || 'D').charAt(0);

      const switchBtn = document.getElementById('switch-role-btn');
      if (switchBtn && myRoles.length > 1) {
        switchBtn.classList.remove('hidden');
      }

      const registryAdminBtn = document.querySelector('[data-tab="registry-admin"]');
      const registryLogsBtn = document.querySelector('[data-tab="registry-logs"]');
      const isDirector = myRoles.includes('Director') || staffCommand.userData.primaryRole === 'Director';
      if (registryAdminBtn && !isDirector) registryAdminBtn.classList.add('hidden');
      if (registryLogsBtn && !isDirector) registryLogsBtn.classList.add('hidden');
      
      loadNewsTicker();
      showTab('overview');
    });

    async function loadNewsTicker() {
      const ticker = document.getElementById('news-ticker-content');
      if (!ticker) return;

      try {
        const q = query(collection(db, 'announcements'), orderBy('timestamp', 'desc'), limit(5));
        const snap = await getDocs(q);
        
        let messages = [];
        if (snap.empty) {
          messages = [
            "Welcome to SkillForge Season 2026. Portal Registry is Active.",
            "New Mastery Track: AI Content Creation now live in the Academy.",
            "Specialist Command Center is now accepting Silver Badge requests.",
            "Daily Pulse check: 1 XP per minute of active study time.",
            "Join our global Discord for elite technical support and networking."
          ];
        } else {
          snap.forEach(doc => {
            const d = doc.data();
            const title = String(d?.title || '').trim();
            const body = String(d?.message || d?.content || '').trim();
            const text = body ? (title && title !== body ? `${title}: ${body}` : body) : (title || 'New Announcement');
            messages.push(text);
          });
        }

        ticker.innerHTML = messages.map(m => `<span class="text-[9px] font-bold text-white/60 uppercase tracking-widest flex items-center gap-4"><div class="w-1 h-1 rounded-full bg-gold"></div> ${escapeHtml(m)}</span>`).join('');
        ticker.innerHTML += ticker.innerHTML;
      } catch (err) {
        void("[Dashboard] News Ticker failed to load registry data.");
      }
    }

    // --- NAVIGATION ---
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        window.showTab(tab);
      });
    });
    
    document.getElementById('logout-btn').addEventListener('click', async () => {
        await auth.signOut();
        window.location.href = '../login/';
    });

    
    window.toggleControl = async (feature) => {
      const uid = auth.currentUser ? auth.currentUser.uid : localStorage.getItem('skillforge_mock_uid');
      if (!uid) return;
      
      try {
        const userRef = doc(db, 'staffs', uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) return;
        const data = userSnap.data();
        if (!data) return;
        
        if (feature === 'light') {
            const newVal = !data.isLightMode;
            await updateDoc(userRef, { isLightMode: newVal });
            if (newVal) document.documentElement.classList.add('light-mode');
            else document.documentElement.classList.remove('light-mode');
            
            document.querySelectorAll('.ctrl-light-btn').forEach(b => {
                if (newVal) b.classList.replace('bg-white/20', 'bg-gold-500');
                else b.classList.replace('bg-gold-500', 'bg-white/20');
                b.querySelector('div').style.transform = newVal ? 'translateX(16px)' : 'translateX(0)';
            });
        } else if (feature === 'glow') {
            const controls = data.controls || {};
            const newVal = !controls.glow;
            await updateDoc(userRef, { 'controls.glow': newVal });
            if (newVal) document.documentElement.classList.add('glow-enabled');
            else document.documentElement.classList.remove('glow-enabled');
            
            document.querySelectorAll('.ctrl-glow-btn').forEach(b => {
                if (newVal) b.classList.replace('bg-white/20', 'bg-gold-500');
                else b.classList.replace('bg-gold-500', 'bg-white/20');
                b.querySelector('div').style.transform = newVal ? 'translateX(16px)' : 'translateX(0)';
            });
        }
      } catch (err) { void(err); }
    };

    window.showTab = async function(tab) {
      if (currentTabUnsub) { currentTabUnsub(); currentTabUnsub = null; }
      currentTab = tab;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold'));
      const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
      if (activeBtn) activeBtn.classList.add('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold');
      
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      
      try {
          switch(tab) {
            case 'design-studio': window.location.href = '/staffs/director/customize/'; break;
              case 'overview': await renderOverview(content); break;
            case 'trainees': window.location.href = '/staffs/registry/'; break;
            case 'staff': await renderStaff(content); break;
            case 'registry-admin':
              if (!((staffCommand.userData.roles || []).includes('Director') || staffCommand.userData.primaryRole === 'Director')) {
                content.innerHTML = `<div class="p-10 glass text-center text-red-400 font-bold uppercase tracking-widest">Access Denied: Director clearance required.</div>`;
              } else {
                await renderRegistryAdmin(content);
              }
              break;
            case 'registry-logs':
              if (!((staffCommand.userData.roles || []).includes('Director') || staffCommand.userData.primaryRole === 'Director')) {
                content.innerHTML = `<div class="p-10 glass text-center text-red-400 font-bold uppercase tracking-widest">Access Denied: Director clearance required.</div>`;
              } else {
                await renderRegistryLogs(content);
              }
              break;
            case 'approvals': await renderApprovals(content); break;
            case 'faults': await renderFaults(content); break;
            case 'announcements': await renderAnnouncements(content); break;
            case 'seasons': await renderSeasons(content); break;
            case 'codes': await renderCodes(content); break;
            case 'reset-tickets': await renderResetTickets(content); break;
            case 'audit': await renderAudit(content); break;
            case 'profile': await renderProfile(content); break;
            default: await renderOverview(content);
          }
      } catch (e) {
          content.innerHTML = `<div class="p-10 glass text-center text-red-400 font-bold uppercase tracking-widest">System Connection Interrupted: ${e.message}</div>`;
      }
      
      if (window.lucide) window.lucide.createIcons();
    }

    window.renderProfile = async function(container) {
        const profile = staffCommand.userData;
        container.innerHTML = `
            <header class="animate-slide-up">
                <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Director Registry</p>
                <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Command Profile</h1>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-slide-up" style="animation-delay: 0.1s">
                <!-- ID Card -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass p-8 rounded-[40px] border border-white/10 text-center space-y-6">
                        <div class="w-24 h-24 rounded-3xl bg-gold/10 border border-gold/20 mx-auto flex items-center justify-center text-gold text-3xl font-black">
                            ${profile.name.charAt(0)}
                        </div>

    async function updateSocialRegistry(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = 'Syncing...';

        const formData = new FormData(e.target);
        const platforms = formData.getAll('socialPlatform[]');
        const handles = formData.getAll('socialHandle[]');
        
        const matrix = platforms.map((p, i) => ({
            platform: p,
            handle: handles[i]
        })).filter(s => s.handle);

        try {
            const { updateDoc } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');
            await updateDoc(doc(db, 'staffs', auth.currentUser.uid), {
                socialMatrix: matrix
            });
            alert("Social Registry Updated Successfully.");
            staffCommand.userData.socialMatrix = matrix;
            showTab('profile');
        } catch (err) {
            void(err);
            alert("Update Failed: Registry link interrupted.");
        } finally {
            btn.disabled = false;
            btn.innerText = 'Update Social Registry';
        }
    }

    window.createCustomRole = async function(uid) {
        const input = document.getElementById('new-custom-role');
        const roleName = input.value.trim();
        if (!roleName) return;

        try {
            const rolesRef = doc(db, 'system', 'roles');
            const snap = await getDoc(rolesRef);
            let roles = [];
            if (snap.exists()) {
                roles = snap.data().roles || [];
            }
            if (!roles.includes(roleName)) {
                roles.push(roleName);
                await setDoc(rolesRef, { roles: roles }, { merge: true });
            }
            
            document.getElementById('role-manager-modal').remove();
            await manageUserRoles(uid);
        } catch (error) {
            void("Failed to create custom role:", error);
            alert("Error creating custom role");
        }
    };

    window.postAnnouncement = async function() {
        const title = String(document.getElementById('ann-title')?.value || '').trim();
        const content = String(document.getElementById('ann-content')?.value || '').trim();
        const target = String(document.getElementById('ann-target')?.value || 'Global').trim() || 'Global';
        const errEl = document.getElementById('ann-error');
        const btn = document.getElementById('ann-submit-btn');

        if (errEl) {
          errEl.classList.add('hidden');
          errEl.textContent = '';
        }

        if (!title || !content) {
          if (errEl) {
            errEl.textContent = 'Title and message are required.';
            errEl.classList.remove('hidden');
          }
          return;
        }

        if (btn) {
          btn.disabled = true;
          btn.textContent = 'Broadcasting...';
        }

        const res = await staffCommand.broadcastAnnouncement(title, content, target);
        if (res.success) {
            closeAnnouncementModal();
            window.showTab('announcements');
        } else {
            if (errEl) {
              errEl.textContent = String(res.error || 'Broadcast failed.');
              errEl.classList.remove('hidden');
            } else {
              alert(res.error);
            }
        }

        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Broadcast';
        }
    };

            // 1. Update Staff Status

        try {

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                ${roleOptions.map(r => `
                  <label class="flex items-center justify-between gap-4 p-4 rounded-2xl bg-white/5 border border-white/10 cursor-pointer hover:bg-white/10 transition-all">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white/70">${r}</span>
                    <input type="checkbox" class="w-5 h-5 accent-gold" name="roles" value="${r}">
                  </label>
                `).join('')}
              </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-2">
              <button id="rc-generate-btn" type="submit" class="flex-1 bg-gold text-navy-950 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white transition-all shadow-4K">
                Generate Key
              </button>
              <button type="button" onclick="document.getElementById('role-code-modal')?.remove()" class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white/10 transition-all">
                Cancel
              </button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modal);
      if (window.lucide) window.lucide.createIcons();

      const form = document.getElementById('role-code-form');
      form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('rc-generate-btn');
        if (btn) {
          btn.disabled = true;
          btn.innerText = 'Generating...';
        }

        const name = String(document.getElementById('rc-name')?.value || '').trim().toUpperCase();
        const position = String(document.getElementById('rc-position')?.value || '').trim().toUpperCase();
        const roleList = Array.from(form.querySelectorAll('input[name="roles"]:checked')).map(x => x.value).filter(Boolean);

        try {
          if (!name) throw new Error('Full name is required.');
          if (roleList.length === 0) throw new Error('Select at least one role grant.');

          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
          let code = '';
          for (let attempt = 0; attempt < 8; attempt++) {
            let candidate = 'SKF-';
            for (let i = 0; i < 6; i++) candidate += chars.charAt(Math.floor(Math.random() * chars.length));
            const existing = await getDoc(doc(db, 'role_codes', candidate));
            if (!existing.exists()) {
              code = candidate;
              break;
            }
          }
          if (!code) throw new Error('Unable to generate a unique code. Retry.');

          await setDoc(doc(db, 'role_codes', code), {
            code,
            name,
            position,
            roles: roleList,
            used: false,
            usedBy: null,
            status: 'available',
            created_by_uid: auth.currentUser?.uid || staffCommand.uid || null,
            created_by: staffCommand.userData?.name || 'DIRECTOR',
            created_at: serverTimestamp()
          }, { merge: true });

          try { await navigator.clipboard.writeText(code); } catch (e2) { void(e2); }
          alert(`Authorization Key Generated: ${code}`);
          document.getElementById('role-code-modal')?.remove();
          loadRoleCodes();
        } catch (err) {
          alert(`Failed to generate code: ${err?.message || 'Unknown error'}`);
        } finally {
          if (btn) {
            btn.disabled = false;
            btn.innerText = 'Generate Key';
          }
        }
      };
    };

    function escapeHtml(input) {
      return String(input ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalizeRoles(data) {
      const roles = data?.roles;
      const out = [];
      if (Array.isArray(roles)) {
        roles.forEach((r) => {
          const v = String(r || '').trim();
          if (v) out.push(v);
        });
      } else if (typeof roles === 'string') {
        roles.split(',').forEach((r) => {
          const v = String(r || '').trim();
          if (v) out.push(v);
        });
      }
      const legacy = typeof data?.role === 'string' ? String(data.role || '').trim() : '';
      if (legacy) out.push(legacy);
      return [...new Set(out)];
    }

    function getPhoneFromProfile(profile) {
      const raw = profile?.phone || profile?.whatsapp || profile?.whatsApp || profile?.phoneNumber || profile?.mobile || profile?.contact || '';
      return String(raw || '').trim();
    }

    function toJsonText(input) {
      return JSON.stringify(input ?? {}, (key, value) => {
        if (value && typeof value.toMillis === 'function' && value?.seconds != null && value?.nanoseconds != null) {
          return { __type: 'timestamp', ms: value.toMillis() };
        }
        return value;
      }, 2);
    }

    function parseJsonText(text) {
      return JSON.parse(text, (key, value) => {
        if (value && value.__type === 'timestamp' && typeof value.ms === 'number') {
          return Timestamp.fromMillis(value.ms);
        }
        return value;
      });
    }

    const registryLogsState = {

      const direct = entry?.collection || entry?.targetCollection || entry?.target_collection;

        const metaColl = meta.collection || meta.targetCollection || meta.origin_target_collection;

      const accountType = String(entry?.accountType || '').toLowerCase();
      if (accountType === 'staff') return 'staffs';
      if (accountType === 'trainee') return 'trainees';
      return '';

    function normalizeRegistryLogTimestamp(entry) {
      return entry?.timestamp || entry?.created_at || entry?.createdAt || entry?.createdAtUtc || null;
    }

        return `

              <div class="space-y-2">

              </div>
              <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${escapeHtml(stampText)}</p>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
              <details class="bg-black/30 border border-white/10 rounded-2xl p-4">
                <summary class="cursor-pointer text-[9px] font-black uppercase tracking-[0.35em] text-white/60">Before</summary>

    async function logRegistryAdminAction({ action, accountType, targetId, before, after, meta }) {
      const actorId = staffCommand.uid;
      const actorName = staffCommand.userData?.name || null;
      const normalizedAccount = String(accountType || '').toLowerCase();
      const collectionName = normalizedAccount === 'staff' ? 'staffs' : (normalizedAccount === 'trainee' ? 'trainees' : null);
      const payload = {
        action: String(action || '').trim().toUpperCase(),
        accountType,
        collection: collectionName,
        targetId,
        before: before ?? null,
        after: after ?? null,
        meta: meta ?? null,
        actorId,
        actorName,
        timestamp: serverTimestamp(),
        created_at: serverTimestamp(),
        page: '/staffs/director/'
      };
      await addDoc(collection(db, 'registry_admin_logs'), payload);
      await addDoc(collection(db, 'audit_logs'), {
        type: `REGISTRY_ADMIN_${payload.action}`,
        accountType,
        collection: collectionName,
        targetId,
        actorId,
        actorName,
        before: before ?? null,
        after: after ?? null,
        meta: meta ?? null,
        timestamp: serverTimestamp(),
        page: '/staffs/director/'
      });
    }

    async function fetchRegistryAdminItems(scope) {
      const coll = scope === 'staff' ? 'staffs' : 'trainees';
      try {
        const snap = await getDocs(query(collection(db, coll), orderBy('created_at', 'desc'), limit(200)));
        return snap.docs.map((d0) => ({ id: d0.id, data: d0.data() || {} }));
      } catch (err) {
        const snap = await getDocs(query(collection(db, coll), limit(200)));
        return snap.docs.map((d0) => ({ id: d0.id, data: d0.data() || {} }));
      }
    }

    function computeRegistryAdminFilter(scope, items, search) {
      const term = String(search || '').trim().toLowerCase();
      if (!term) return items.slice();
      return items.filter(({ id, data }) => {
        const name = String(data?.name || data?.fullName || data?.full_name || '').toLowerCase();
        const email = String(data?.email || '').toLowerCase();
        const sfid = String(data?.sfid || data?.SFID || '').toLowerCase();
        const phone = String(getPhoneFromProfile(data) || '').toLowerCase();
        const roles = Array.isArray(data?.roles) ? data.roles.join(' ').toLowerCase() : '';
        const track = String(data?.track || '').toLowerCase();
        const idMatch = String(id || '').toLowerCase();
        if (scope === 'staff') {
          return [name, email, sfid, phone, roles, idMatch].some((v) => v.includes(term));
        }
        return [name, email, sfid, phone, track, idMatch].some((v) => v.includes(term));
      });
    }

      const commonName = String(before?.name || before?.fullName || before?.full_name || '').trim();
      const commonEmail = String(before?.email || '').trim();
      const commonPhone = String(getPhoneFromProfile(before) || '').trim();
      const commonSfid = String(before?.sfid || before?.SFID || '').trim();
      const commonTrack = String(before?.track || '').trim();
      const commonRoles = Array.isArray(before?.roles) ? before.roles.join(', ') : '';
      const commonStatus = String(before?.status || '').trim();

      const modal = document.createElement('div');
      modal.id = modalId;
      modal.className = 'fixed inset-0 z-[350] bg-navy/95 flex items-center justify-center p-6 backdrop-blur-xl';
      modal.innerHTML = `
        <div class="glass-strong p-8 md:p-10 rounded-[48px] border border-white/10 w-full max-w-4xl max-h-[92vh] overflow-y-auto custom-scrollbar space-y-8">
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
            <div>
              <p class="text-[8px] font-black text-gold uppercase tracking-[0.4em]">Registry Admin</p>
              <h2 class="text-3xl font-black uppercase tracking-tighter">Edit Profile</h2>
              <p class="text-[10px] text-white/40 font-black uppercase tracking-widest mt-2">${escapeHtml(coll)} • ${escapeHtml(id)}</p>
            </div>
            <button type="button" onclick="document.getElementById('${modalId}').remove()" class="p-3 rounded-xl bg-white/5 hover:text-red-400 transition-all" aria-label="Close">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-5 space-y-5">
              <div class="space-y-2">
                <label for="registry-admin-name" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">Name</label>
                <input id="registry-admin-name" type="text" value="${escapeHtml(commonName)}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
              </div>
              <div class="space-y-2">
                <label for="registry-admin-email" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">Email</label>
                <input id="registry-admin-email" type="email" value="${escapeHtml(commonEmail)}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
              </div>
              <div class="space-y-2">
                <label for="registry-admin-phone" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">Phone / WhatsApp</label>
                <input id="registry-admin-phone" type="text" value="${escapeHtml(commonPhone)}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
              </div>
              <div class="space-y-2">
                <label for="registry-admin-sfid" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">SFID</label>
                <input id="registry-admin-sfid" type="text" value="${escapeHtml(commonSfid)}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
              </div>
              ${scope === 'staff'
                ? `
                  <div class="space-y-2">
                    <label for="registry-admin-roles" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">Roles (comma-separated)</label>
                    <input id="registry-admin-roles" type="text" value="${escapeHtml(commonRoles)}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                  </div>
                `
                : `
                  <div class="space-y-2">
                    <label for="registry-admin-track" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">Track</label>
                    <input id="registry-admin-track" type="text" value="${escapeHtml(commonTrack)}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                  </div>
                `
              }
              <div class="space-y-2">
                <label for="registry-admin-status-input" class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] ml-1">Status</label>
                <input id="registry-admin-status-input" type="text" value="${escapeHtml(commonStatus)}" placeholder="active" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white placeholder:text-white/20">
              </div>
              <div class="flex flex-col gap-3 pt-2">
                <button type="button" id="registry-admin-save-btn" class="w-full py-4 rounded-2xl bg-gold text-navy font-black uppercase tracking-widest text-[10px] hover:bg-white transition-all">Save Changes</button>
                <button type="button" id="registry-admin-reset-btn" class="w-full py-4 rounded-2xl bg-gold/10 border border-gold/20 text-gold font-black uppercase tracking-widest text-[10px] hover:bg-gold hover:text-navy transition-all">Create Reset Ticket</button>
                <button type="button" id="registry-admin-delete-btn" class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-red-300/80 font-black uppercase tracking-widest text-[10px] hover:bg-red-500/15 hover:text-red-300 transition-all">Delete Profile</button>
              </div>
              <div id="registry-admin-editor-status" class="hidden p-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest text-white/60"></div>
            </div>
            <div class="lg:col-span-7 space-y-3">
              <div class="flex items-end justify-between gap-4">
                <div>
                  <p class="text-[10px] font-black uppercase tracking-widest text-white/40">Raw JSON</p>
                  <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">Timestamp encoding: {"{__type:'timestamp',ms}"}</p>
                </div>
              </div>
              <textarea id="registry-admin-json" rows="22" class="w-full p-5 rounded-3xl bg-black/30 border border-white/10 text-[11px] font-mono text-white/80 leading-relaxed">${escapeHtml(toJsonText(before))}</textarea>
              <p class="text-[9px] text-white/25 font-black uppercase tracking-[0.35em]">Save uses updateDoc (merge). Deleted keys are not removed.</p>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      if (window.lucide) window.lucide.createIcons();

      const statusEl = document.getElementById('registry-admin-editor-status');
      const jsonEl = document.getElementById('registry-admin-json');

      const syncJson = () => {
        if (!jsonEl) return;
        let current;
        try {
          current = parseJsonText(jsonEl.value);
        } catch (e) {
          return;
        }
        const nameEl = document.getElementById('registry-admin-name');
        const emailEl = document.getElementById('registry-admin-email');
        const phoneEl = document.getElementById('registry-admin-phone');
        const sfidEl = document.getElementById('registry-admin-sfid');
        const rolesEl = document.getElementById('registry-admin-roles');
        const trackEl = document.getElementById('registry-admin-track');
        const statusField = document.getElementById('registry-admin-status-input');
        if (nameEl) current.name = nameEl.value.trim();
        if (emailEl) current.email = emailEl.value.trim().toLowerCase();
        if (phoneEl) current.phone = phoneEl.value.trim();
        if (sfidEl) current.sfid = sfidEl.value.trim();
        if (trackEl && scope !== 'staff') current.track = trackEl.value.trim();
        if (rolesEl && scope === 'staff') {
          const roles = rolesEl.value.split(',').map((r) => r.trim()).filter(Boolean);
          current.roles = roles;
        }
        if (statusField && statusField.value.trim()) current.status = statusField.value.trim();
        jsonEl.value = toJsonText(current);
      };

      const inputs = ['registry-admin-name', 'registry-admin-email', 'registry-admin-phone', 'registry-admin-sfid', 'registry-admin-roles', 'registry-admin-track', 'registry-admin-status-input'];
      inputs.forEach((id0) => {
        const el = document.getElementById(id0);
        if (!el) return;
        el.addEventListener('input', () => syncJson());
      });

      if (jsonEl) {
        jsonEl.addEventListener('input', () => {
          try {
            parseJsonText(jsonEl.value);
            jsonEl.classList.remove('border-red-500/30');
          } catch (e) {
            jsonEl.classList.add('border-red-500/30');
          }
        });
      }

      const saveBtn = document.getElementById('registry-admin-save-btn');
      const resetBtn = document.getElementById('registry-admin-reset-btn');
      const deleteBtn = document.getElementById('registry-admin-delete-btn');

      const setEditorStatus = (msg, tone = 'neutral') => {
        if (!statusEl) return;
        statusEl.classList.remove('hidden', 'border-red-500/30', 'bg-red-500/10', 'text-red-300', 'border-gold/30', 'bg-gold/10', 'text-gold');
        statusEl.textContent = msg;
        if (tone === 'error') statusEl.classList.add('border-red-500/30', 'bg-red-500/10', 'text-red-300');
        if (tone === 'warn') statusEl.classList.add('border-gold/30', 'bg-gold/10', 'text-gold');
      };

      if (saveBtn) {
        saveBtn.addEventListener('click', async () => {
          if (!jsonEl) return;
          let payload;
          try {
            payload = parseJsonText(jsonEl.value);
          } catch (e) {
            setEditorStatus('Invalid JSON. Fix syntax before saving.', 'error');
            return;
          }
          saveBtn.setAttribute('disabled', 'disabled');
          saveBtn.textContent = 'Saving...';
          try {
            await updateDoc(ref, payload);
            const afterSnap = await getDoc(ref);
            const after = afterSnap.exists() ? (afterSnap.data() || {}) : payload;
            await logRegistryAdminAction({
              action: 'PROFILE_UPDATED',
              accountType: scope === 'staff' ? 'staff' : 'trainee',
              targetId: id,
              before,
              after
            });
            setEditorStatus('Saved successfully.', 'warn');
            registryAdminState.selectedDoc.before = after;
            jsonEl.value = toJsonText(after);
            await refreshRegistryAdminList();
          } catch (err) {
            setEditorStatus(`Save failed: ${err.message}`, 'error');
          } finally {
            saveBtn.removeAttribute('disabled');
            saveBtn.textContent = 'Save Changes';
          }
        });
      }

      if (resetBtn) {
        resetBtn.addEventListener('click', async () => {
          await window.createRegistryAdminResetTicket(scope, id);
        });
      }

      if (deleteBtn) {
        deleteBtn.addEventListener('click', async () => {
          await window.deleteRegistryAdminProfile(scope, id);
          if (document.getElementById(modalId)) document.getElementById(modalId).remove();
        });
      }
    };

    window.deleteRegistryAdminProfile = async function(scope, id) {
      const coll = scope === 'staff' ? 'staffs' : 'trainees';
      if (!requireArm(`registry-admin-delete:${coll}:${id}`, 'Click Delete again to confirm permanent purge.')) return;

      const ref = doc(db, coll, id);
      const snap = await getDoc(ref);
      const before = snap.exists() ? (snap.data() || {}) : null;

      await deleteDoc(ref);
      await logRegistryAdminAction({
        action: 'PROFILE_DELETED',
        accountType: scope === 'staff' ? 'staff' : 'trainee',
        targetId: id,
        before,
        after: null
      });

      if (registryAdminState.selectedId === id) registryAdminState.selectedId = null;
      await refreshRegistryAdminList();
      alert('Profile deleted.');
    };

    window.createRegistryAdminResetTicket = async function(scope, id) {
      const coll = scope === 'staff' ? 'staffs' : 'trainees';
      const ref = doc(db, coll, id);
      const snap = await getDoc(ref);
      if (!snap.exists()) { alert('Profile not found.'); return; }
      const profile = snap.data() || {};
      const email = String(profile.email || '').trim().toLowerCase();
      const rawPhone = getPhoneFromProfile(profile);
      const phone = normalizePhone(rawPhone);
      if (!email) { alert('Profile is missing an email.'); return; }
      if (!/^\d{10,15}$/.test(phone)) { alert('Profile is missing a valid phone / WhatsApp number.'); return; }

      const ticketCode = buildResetTicketCode();
      const accountType = scope === 'staff' ? 'staff' : 'trainee';
      const ticketPayload = {
        ticketCode,
        email,
        phone,
        accountType,
        status: 'requested',
        created_at: serverTimestamp()
      };
      await addDoc(collection(db, 'password_resets'), ticketPayload);

      await addDoc(collection(db, 'audit_logs'), {
        type: 'PASSWORD_RESET_TICKET_REQUESTED',
        email,
        phone,
        accountType,
        ticketCode,
        timestamp: serverTimestamp(),
        origin: 'registry_admin',
        origin_target_id: id,
        origin_target_collection: coll
      });

      await logRegistryAdminAction({
        action: 'RESET_TICKET_CREATED',
        accountType,
        targetId: id,
        before: profile,
        after: ticketPayload
      });

      const text = buildResetWhatsappMessage({ email, ticketCode, accountType });
      const url = buildWhatsappLink({ phone, text });
      const opened = window.open(url, '_blank', 'noopener');
      if (!opened) {
        try {
          await navigator.clipboard.writeText(text);
          alert(`Reset ticket created: ${ticketCode}\nWhatsApp message copied to clipboard.`);
        } catch (e) {
          alert(`Reset ticket created: ${ticketCode}\nUnable to open WhatsApp automatically.`);
        }
      }
    };

    window.editSpecialistTrack = async function(uid) {
      const tracks = Object.keys(TRACK_TELEGRAM_NODES || {}).sort((a, b) => a.localeCompare(b));
      if (tracks.length === 0) {
        alert('Track registry unavailable.');
        return;
      }

      const staffRef = doc(db, 'staffs', uid);
      const specRef = doc(db, 'specialists', uid);
      const [staffSnap, specSnap] = await Promise.all([
        getDoc(staffRef).catch(() => null),
        getDoc(specRef).catch(() => null)
      ]);

      const staffData = staffSnap && staffSnap.exists() ? (staffSnap.data() || {}) : null;
      const specData = specSnap && specSnap.exists() ? (specSnap.data() || {}) : null;
      const current = String(staffData?.assignedTrack || specData?.assignedTrack || '').trim();
      const name = String(staffData?.name || specData?.name || 'SPECIALIST').trim();

      document.querySelectorAll('#specialist-track-modal').forEach((el) => el.remove());
      const modal = document.createElement('div');
      modal.id = 'specialist-track-modal';
      modal.className = 'fixed inset-0 bg-navy/90 flex items-center justify-center p-6 backdrop-blur-xl';
      modal.style.position = 'fixed';
      modal.style.inset = '0';
      modal.style.zIndex = '9999';
      modal.style.display = 'flex';
      modal.style.alignItems = 'center';
      modal.style.justifyContent = 'center';
      modal.style.padding = '24px';
      modal.style.background = 'rgba(4, 8, 16, 0.9)';
      modal.style.backdropFilter = 'blur(18px)';
      modal.style.webkitBackdropFilter = 'blur(18px)';
      modal.style.pointerEvents = 'auto';
      modal.innerHTML = `
        <div class="glass-strong p-10 rounded-[48px] border border-white/10 max-w-md w-full">
          <div class="flex justify-between items-start gap-4 mb-8">
            <div>
              <p class="text-[8px] font-black text-gold uppercase tracking-[0.4em]">Specialist Track</p>
              <h2 class="text-2xl font-black uppercase tracking-tighter">${name || 'SPECIALIST'}</h2>
              <p class="text-[10px] text-white/40 uppercase tracking-widest mt-2">Director override</p>
            </div>
            <button aria-label="Action button" type="button" onclick="document.querySelectorAll('#specialist-track-modal').forEach((el) => el.remove())" class="w-10 h-10 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>

          <div class="space-y-4">
            <label class="text-[9px] font-black uppercase tracking-widest text-white/50">Assigned Track</label>
            <select id="spec-track-select" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm">
              <option value="">Select track...</option>
              ${tracks.map(t => `<option value="${t.replace(/"/g, '&quot;')}" ${t === current ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
          </div>

          <div class="flex flex-col sm:flex-row gap-3 pt-8">
            <button id="spec-track-save" class="flex-1 bg-gold text-navy-950 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white transition-all shadow-4K">
              Save Track
            </button>
            <button type="button" onclick="document.querySelectorAll('#specialist-track-modal').forEach((el) => el.remove())" class="flex-1 bg-white/5 border border-white/10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white/10 transition-all">
              Cancel
            </button>
          </div>
        </div>
      `;
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
      });
      document.body.appendChild(modal);
      if (window.lucide) window.lucide.createIcons();

      modal.querySelector('#spec-track-save')?.addEventListener('click', async () => {
        const btn = modal.querySelector('#spec-track-save');
        const select = modal.querySelector('#spec-track-select');
        const selected = String(select?.value || '').trim();
        if (!selected) { alert('Select a track.'); return; }
        btn.disabled = true;
        btn.textContent = 'Saving...';
        try {
          const updates = { assignedTrack: selected, updated_at: serverTimestamp() };
          const writes = [];
          if (staffSnap && staffSnap.exists()) writes.push(updateDoc(staffRef, updates));
          if (specSnap && specSnap.exists()) writes.push(updateDoc(specRef, updates));
          if (writes.length === 0) writes.push(setDoc(staffRef, updates, { merge: true }));
          await Promise.all(writes);
          alert('Specialist track updated.');
          modal.remove();
        } catch (e) {
          alert(`Update failed: ${e?.message || 'Unknown error'}`);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save Track';
        }
      });
    };

    // Trainee Actions
    window.viewTrainee = async function(uid) {
      const snap = await getDoc(doc(db, 'trainees', uid));
      if (!snap.exists()) return;
      const d = snap.data();
      const created = d.created_at?.toDate ? d.created_at.toDate().toLocaleString() : 'N/A';
      alert(`Registry ID: ${d.sfid || 'Pending'}\nName: ${d.name}\nUnit: ${d.track}\nRegistered: ${created}\nXP: ${d.xp || 0}\nStatus: ${d.status || 'Active'}`);
    };
    
    window.deleteTrainee = async function(uid) {
      if (!confirm('CRITICAL: Purge this trainee from the registry permanently?')) return;
      await deleteDoc(doc(db, 'trainees', uid));
      window.showTab('trainees');
    };

    window.closeAnnouncementModal = function() {
      const modal = document.getElementById('announcement-modal');
      if (modal) modal.classList.add('hidden');
      const title = document.getElementById('ann-title');
      const content = document.getElementById('ann-content');
      const target = document.getElementById('ann-target');
      const errEl = document.getElementById('ann-error');
      const btn = document.getElementById('ann-submit-btn');
      if (title) title.value = '';
      if (content) content.value = '';
      if (target) target.value = 'Global';
      if (errEl) {
        errEl.classList.add('hidden');
        errEl.textContent = '';
      }
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Broadcast';
      }
    };
    
    window.showNewAnnouncementModal = function() {
      const modal = document.getElementById('announcement-modal');
      if (!modal) return;
      modal.classList.remove('hidden');
      if (!modal.dataset.bound) {
        modal.dataset.bound = '1';
        modal.addEventListener('click', (e) => {
          if (e.target === modal) closeAnnouncementModal();
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') closeAnnouncementModal();
        });
      }
    };

    // --- BACKGROUND ---
    class Sundust {
      constructor() {
        this.canvas = document.getElementById('sundust-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initParticles();
        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.15,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
  </script>
