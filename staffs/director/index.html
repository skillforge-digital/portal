<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director Command Hub — SkillForge Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#040810',
            gold: '#C9A84C',
            orange: '#E87722',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#040810; color:#f1f5f9; overflow-x:hidden; min-height: 100dvh; }
    #sundust-canvas { position:fixed; inset:0; width:100%; height:100dvh; z-index:0; pointer-events:none }
    .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    .glass-strong { background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); }
    @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
    .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
  </style>
</head>
<body class="flex flex-col md:flex-row">
  <canvas id="sundust-canvas"></canvas>

  <!-- Sidebar -->
  <aside class="w-72 glass-strong border-r border-white/5 flex flex-col fixed inset-y-0 z-50 transition-all duration-500 md:translate-x-0 -translate-x-full" id="sidebar">
    <div class="p-8 flex-1 overflow-y-auto">
      <div class="flex items-center gap-3 mb-12">
        <div class="w-12 h-12 rounded-2xl bg-gold/10 flex items-center justify-center text-gold border border-gold/20">
          <i data-lucide="shield-check" class="w-6 h-6"></i>
        </div>
        <div class="flex flex-col leading-none">
          <span class="font-black text-sm tracking-tighter uppercase">SkillForge</span>
          <span class="text-[8px] text-gold font-bold tracking-[0.3em] uppercase">Director Forge</span>
        </div>
      </div>

      <nav class="space-y-1">
        <p class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] mb-4">Command Nodes</p>
        <button data-tab="overview" class="nav-btn active w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Global Overview
        </button>
        <button data-tab="trainees" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="users" class="w-4 h-4"></i> Trainee Registry
        </button>
        <button data-tab="design-studio" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="palette" class="w-4 h-4"></i> Design Studio
        </button>
        <button data-tab="staff" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="user-check" class="w-4 h-4"></i> Personnel Registry
        </button>
        <button data-tab="announcements" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="megaphone" class="w-4 h-4"></i> Announcements
        </button>
        <button data-tab="seasons" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="calendar" class="w-4 h-4"></i> Season Management
        </button>
        <button data-tab="codes" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="key" class="w-4 h-4"></i> Access Codes
        </button>
        <button data-tab="audit" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="scroll-text" class="w-4 h-4"></i> Audit Logs
        </button>
      </nav>
    </div>

    <div class="p-8 border-t border-white/5">
        <div class="flex items-center gap-4 mb-6 p-4 rounded-2xl bg-white/5 border border-white/5">
            <div class="w-10 h-10 rounded-xl bg-gold/10 flex items-center justify-center text-gold font-black text-xs" id="user-initials">D</div>
            <div class="min-w-0">
                <p class="text-[10px] font-black text-white uppercase truncate" id="user-name">Loading...</p>
                <p class="text-[8px] text-gold font-bold uppercase tracking-widest truncate" id="user-role">Director Access</p>
            </div>
        </div>
        <button id="logout-btn" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-red-400/70 hover:text-red-400 hover:bg-red-400/10 transition-all">
            <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
        </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 md:ml-72 p-6 md:p-12 pt-24 md:pt-20">
    <div id="tab-content" class="max-w-6xl mx-auto space-y-12 animate-slide-up">
      <!-- Content loaded dynamically -->
    </div>
  </main>

  <script type="module">
    import StaffCore from '../../assets/staff-core.js';
    import { db, auth } from '../../assets/firebase-config.js';
    import { collection, query, getDocs, doc, getDoc, setDoc, addDoc, deleteDoc, serverTimestamp, orderBy, onSnapshot, writeBatch, limit } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
    import { SeasonEngine } from '../../assets/season-engine.js';

    // Global state
    let currentTab = 'overview';
    let seasonEngine = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = '../../trainee-login/'; return; }
      seasonEngine = new SeasonEngine(user.uid);
      showTab('overview');
    });

    window.confirmSeasonTransition = async function() {
      const seasonName = document.getElementById('new-season-name').value.trim();
      if (!seasonName) { alert("Please enter a season name."); return; }
      
      const btn = document.querySelector('#season-warning-modal button.bg-orange');
      btn.disabled = true;
      btn.innerText = "Processing Neural Shift...";
      
      const result = await seasonEngine.startNewSeason(seasonName);
      if (result.success) {
        alert(`Success! ${result.archived} trainees archived. New season ${seasonName} is now live.`);
        location.reload();
      } else {
        alert("Shift failed: " + result.error);
        btn.disabled = false;
        btn.innerText = "Confirm Global Reset";
      }
    };
    
    // Navigation
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        window.showTab(tab);
      });
    });
    
    document.getElementById('logout-btn').addEventListener('click', () => {
      window.staffCore.logout();
    });

    window.showTab = async function(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold');
      
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      
      switch(tab) {
        case 'overview': await renderOverview(content); break;
        case 'trainees': await renderTrainees(content); break;
        case 'staff': await renderStaff(content); break;
        case 'announcements': await renderAnnouncements(content); break;
        case 'seasons': await renderSeasons(content); break;
        case 'codes': await renderCodes(content); break;
        case 'audit': await renderAudit(content); break;
        default: await renderOverview(content);
      }
      
      if (window.lucide) window.lucide.createIcons();
    }

    window.renderOverview = async function(container) {
      const traineeSnap = await getDocs(collection(db, 'trainees'));
      const staffSnap = await getDocs(collection(db, 'staffs'));
      const configSnap = await getDoc(doc(db, 'system', 'config'));
      const config = configSnap.exists() ? configSnap.data() : {};
      const currentSeason = config.activeSeason || '2026';
      
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Director Forge Node</p>
            <h1 class="text-4xl md:text-6xl font-black mt-2 uppercase tracking-tighter">Global Hub</h1>
          </div>
          <div class="flex gap-4">
            <div class="glass px-6 py-3 rounded-2xl border border-white/5">
              <p class="text-[8px] font-black text-white/30 uppercase tracking-widest">Active Season</p>
              <p class="text-xl font-bold text-gold">${currentSeason}</p>
            </div>
          </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="glass p-8 rounded-[40px] border border-white/5">
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-4">Total Trainees</p>
            <p class="text-5xl font-black text-gold">${traineeSnap.size}</p>
          </div>
          <div class="glass p-8 rounded-[40px] border border-white/5">
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-4">Command Personnel</p>
            <p class="text-5xl font-black text-gold">${staffSnap.size}</p>
          </div>
          <div class="glass p-8 rounded-[40px] border border-white/5">
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-4">Registry Health</p>
            <p class="text-5xl font-black text-green-400">100%</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <!-- Quick Actions -->
          <div class="glass-strong rounded-[40px] p-10 border border-white/5">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-white/40 mb-8">Quick Actions</h2>
            <div class="grid grid-cols-2 gap-4">
              <button onclick="showTab('announcements')" class="p-6 rounded-2xl bg-gold/10 border border-gold/20 text-left hover:bg-gold/20 transition-all">
                <i data-lucide="megaphone" class="w-8 h-8 text-gold mb-4"></i>
                <p class="font-black uppercase text-xs">Broadcast</p>
              </button>
              <button onclick="showTab('seasons')" class="p-6 rounded-2xl bg-orange/10 border border-orange/20 text-left hover:bg-orange/20 transition-all">
                <i data-lucide="calendar" class="w-8 h-8 text-orange mb-4"></i>
                <p class="font-black uppercase text-xs">Seasons</p>
              </button>
            </div>
          </div>

          <!-- God Mode Toggles -->
          <div class="glass-strong rounded-[40px] p-10 border border-gold/20">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-gold/60 mb-8">System God Mode</h2>
            <div class="space-y-4">
              <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/5">
                <div>
                  <p class="text-[10px] font-black uppercase tracking-widest">Maintenance Lock</p>
                  <p class="text-[8px] text-white/40">Prevents all registrations</p>
                </div>
                <button onclick="toggleSystemFlag('maintenance')" class="w-12 h-6 rounded-full ${config.maintenance ? 'bg-gold' : 'bg-white/10'} relative transition-all">
                  <div class="absolute top-1 ${config.maintenance ? 'right-1' : 'left-1'} w-4 h-4 rounded-full bg-white transition-all"></div>
                </button>
              </div>
              <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/5">
                <div>
                  <p class="text-[10px] font-black uppercase tracking-widest">Global XP Boost</p>
                  <p class="text-[8px] text-white/40">2x Multiplier for all students</p>
                </div>
                <button onclick="toggleSystemFlag('xpBoost')" class="w-12 h-6 rounded-full ${config.xpBoost ? 'bg-gold' : 'bg-white/10'} relative transition-all">
                  <div class="absolute top-1 ${config.xpBoost ? 'right-1' : 'left-1'} w-4 h-4 rounded-full bg-white transition-all"></div>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    window.toggleSystemFlag = async function(flag) {
      const configRef = doc(db, 'system', 'config');
      const snap = await getDoc(configRef);
      const current = snap.exists() ? !!snap.data()[flag] : false;
      await setDoc(configRef, { [flag]: !current }, { merge: true });
      window.showTab('overview');
    };

    window.renderTrainees = async function(container) {
      const snap = await getDocs(query(collection(db, 'trainees'), orderBy('created_at', 'desc')));
      
      let html = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Registry Control</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Trainee Registry</h1>
          </div>
          <div class="flex gap-4">
            <div class="glass px-6 py-3 rounded-2xl border border-white/5">
              <p class="text-[8px] font-black text-white/30 uppercase tracking-widest">Total</p>
              <p class="text-xl font-bold text-gold">${snap.size}</p>
            </div>
          </div>
        </header>

        <div class="glass-strong rounded-[40px] p-8 border border-white/5 overflow-x-auto">
          <table class="w-full text-left">
            <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-white/10">
              <tr>
                <th class="pb-4">Profile</th>
                <th class="pb-4">SFID</th>
                <th class="pb-4">Track</th>
                <th class="pb-4">XP/Tier</th>
                <th class="pb-4">Contact</th>
                <th class="pb-4">Actions</th>
              </tr>
            </thead>
            <tbody class="text-sm">`;
      
      if (snap.empty) {
        html += `<tr><td colspan="6" class="py-12 text-center text-white/40 italic">No trainees registered yet.</td></tr>`;
      }
      
      snap.forEach(doc => {
        const d = doc.data();
        html += `<tr class="border-b border-white/5 hover:bg-white/[0.02]">
          <td class="py-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-full bg-white/5 overflow-hidden">
                <img src="${d.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + doc.id}" class="w-full h-full object-cover">
              </div>
              <div>
                <p class="font-bold text-white uppercase text-xs">${d.name || 'Anonymous'}</p>
                <p class="text-[8px] text-slate-500 uppercase">Joined: ${d.created_at?.toDate().toLocaleDateString() || 'N/A'}</p>
              </div>
            </div>
          </td>
          <td class="py-4 font-mono text-[10px] text-gold">${d.sfid || 'PENDING'}</td>
          <td class="py-4 uppercase text-[9px] font-black text-slate-300">${d.track || 'Unassigned'}</td>
          <td class="py-4">
            <p class="text-[10px] font-black">${d.xp || 0} XP</p>
            <p class="text-[8px] text-gold/60 uppercase">${d.tier || 'Novice'}</p>
          </td>
          <td class="py-4 text-[10px] text-slate-300">${d.email || 'N/A'}</td>
          <td class="py-4">
            <button onclick="viewTrainee('${doc.id}')" class="p-2 hover:text-gold"><i data-lucide="eye" class="w-4 h-4"></i></button>
            <button onclick="deleteTrainee('${doc.id}')" class="p-2 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </td>
        </tr>`;
      });
      
      html += `</tbody></table></div>`;
      container.innerHTML = html;
    }

    window.renderStaff = async function(container) {
      const snap = await getDocs(query(collection(db, 'staffs'), orderBy('created_at', 'desc')));
      
      let html = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Personnel Control</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Staff Registry</h1>
          </div>
        </header>

        <div class="glass-strong rounded-[40px] p-8 border border-white/5">
          <table class="w-full text-left">
            <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-white/10">
              <tr>
                <th class="pb-4">Personnel</th>
                <th class="pb-4">Roles</th>
                <th class="pb-4">Primary Role</th>
                <th class="pb-4">Status</th>
              </tr>
            </thead>
            <tbody class="text-sm">`;
      
      snap.forEach(doc => {
        const d = doc.data();
        html += `<tr class="border-b border-white/5">
          <td class="py-4 font-bold text-white uppercase text-xs">${d.name || 'Unknown'}</td>
          <td class="py-4 text-[10px] text-slate-400">${(d.roles || []).join(', ')}</td>
          <td class="py-4"><span class="px-3 py-1 rounded-full bg-gold/10 text-gold text-[8px] font-black uppercase">${d.primaryRole || 'Staff'}</span></td>
          <td class="py-4"><span class="px-3 py-1 rounded-full ${d.status === 'active' ? 'bg-green-500/10 text-green-400' : 'bg-white/10 text-white/40'} text-[8px] font-black uppercase">${d.status || 'active'}</span></td>
        </tr>`;
      });
      
      html += `</tbody></table></div>`;
      container.innerHTML = html;
    }

    window.renderAnnouncements = async function(container) {
      const snap = await getDocs(query(collection(db, 'announcements'), orderBy('timestamp', 'desc')));
      
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Global Broadcast</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Announcements</h1>
          </div>
          <button onclick="showNewAnnouncementModal()" class="bg-gold text-navy-950 px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white transition-all">
            <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i> New Announcement
          </button>
        </header>

        <div class="glass-strong rounded-[40px] p-8 border border-white/5 space-y-4">
          ${snap.empty ? '<p class="text-center text-white/40 py-12 italic">No announcements posted yet.</p>' : ''}
          ${snap.docs.map(doc => {
            const d = doc.data();
            return \`<div class="p-6 rounded-2xl bg-white/5 border border-white/5">
              <div class="flex justify-between items-start mb-4">
                <div>
                  <h3 class="font-black uppercase text-lg">\${d.title || 'Untitled'}</h3>
                  <p class="text-[10px] text-slate-500 uppercase tracking-widest">\${d.timestamp?.toDate().toLocaleString() || 'N/A'}</p>
                </div>
                <div class="flex gap-2">
                  <span class="px-3 py-1 rounded-full bg-gold/10 text-gold text-[8px] font-black uppercase">\${d.scope || 'global'}</span>
                  <button onclick="deleteAnnouncement('\${doc.id}')" class="p-2 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
              </div>
              <p class="text-sm text-slate-300">\${d.content || ''}</p>
            </div>\`;
          }).join('')}
        </div>

        <!-- New Announcement Modal -->
        <div id="announcement-modal" class="hidden fixed inset-0 z-[200] bg-navy/90 flex items-center justify-center p-6">
          <div class="glass-strong p-10 rounded-[40px] border border-white/10 max-w-xl w-full space-y-6">
            <div class="flex justify-between items-center">
              <h2 class="text-2xl font-black uppercase">New Announcement</h2>
              <button onclick="closeAnnouncementModal()" class="p-2 hover:text-red-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-4">
              <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Title</label>
                <input type="text" id="ann-title" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mt-2" placeholder="Announcement Title">
              </div>
              <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Content</label>
                <textarea id="ann-content" rows="4" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mt-2" placeholder="Announcement content..."></textarea>
              </div>
              <div>
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Scope</label>
                <select id="ann-scope" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mt-2">
                  <option value="global">Global (All Dashboards)</option>
                  <option value="trainees">Trainees Only</option>
                  <option value="staffs">Staff Only</option>
                  <option value="specialists">Specialists Only</option>
                </select>
              </div>
              <button onclick="postAnnouncement()" class="w-full py-4 bg-gold text-navy-950 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-white transition-all">
                Post Announcement
              </button>
            </div>
          </div>
        </div>
      `;
    }

    window.renderSeasons = async function(container) {
      const configSnap = await getDoc(doc(db, 'system', 'config'));
      const config = configSnap.exists() ? configSnap.data() : {};
      const currentSeason = config.activeSeason || '2026';
      
      const archivesSnap = await getDocs(collection(db, 'season_archives'));
      
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Lifecycle Management</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Season Management</h1>
          </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Current Season -->
            <div class="glass p-8 rounded-[40px] border border-gold/20">
              <div class="flex justify-between items-center mb-6">
                <div>

            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Audit Logs</h1>

    // Helper Functions
    window.showNewAnnouncementModal = function() {
      document.getElementById('announcement-modal').classList.remove('hidden');
    };

      document.getElementById('announcement-modal').classList.add('hidden');
    };
    
    window.postAnnouncement = async function() {
      const title = document.getElementById('ann-title').value;
      const content = document.getElementById('ann-content').value;
      const scope = document.getElementById('ann-scope').value;
      
      if (!title || !content) {
        alert('Please fill in all fields');
        return;
      }

      const btn = document.querySelector('button[onclick="postAnnouncement()"]');
      btn.disabled = true;
      btn.innerText = "Broadcasting...";

      try {
        // CEO Priority Check (Emmanuel Umoh or specific UID)
        const isCEO = auth.currentUser.uid === '32NOc1lUm2XEUZy4HJQBXlFngm13' || auth.currentUser.displayName?.includes('EMMANUEL');
        
        await addDoc(collection(db, 'announcements'), {
          title: title.toUpperCase(),
          content: content,
          scope: scope,
          author: auth.currentUser.displayName || window.staffCore.profile.name,
          authorUid: auth.currentUser.uid,
          priority: isCEO ? 100 : 1,
          timestamp: serverTimestamp()
        });
        
        await window.staffCore.logAnnouncementEdit('new', null, content, scope);
        alert("Announcement broadcasted successfully.");
        document.getElementById('ann-title').value = '';
        document.getElementById('ann-content').value = '';
        closeAnnouncementModal();
        window.showTab('announcements');
      } catch (e) {
        alert("Broadcast failed: " + e.message);
      } finally {
        btn.disabled = false;
        btn.innerText = "Post Announcement";
      }
    };
    
    window.deleteAnnouncement = async function(id) {
      if (!confirm('Delete this announcement?')) return;
      await deleteDoc(doc(db, 'announcements', id));
      window.showTab('announcements');
    };
    
    window.saveRegistrationDates = async function() {
      const start = document.getElementById('reg-start-input').value;
      const end = document.getElementById('reg-end-input').value;
      
      try {
        await setDoc(doc(db, 'system', 'config'), {
          reg_start: start,
          reg_end: end
        }, { merge: true });
        alert("Landing page dates updated successfully.");
      } catch (e) {
        alert("Failed to update dates: " + e.message);
      }
    };

    window.initializeNewSeason = function() {
      document.getElementById('season-warning-modal').classList.remove('hidden');
    };
    
    window.closeSeasonModal = function() {
      document.getElementById('season-warning-modal').classList.add('hidden');
    };
    
    window.confirmSeasonInit = async function() {
      const name = document.getElementById('new-season-name').value.trim();
      
      // Validate season name
      const validation = window.staffCore.validateSeasonName(name);
      if (!validation.valid) {
        alert(validation.error);
        return;
      }
      
      // Double confirmation
      if (!confirm(`Are you absolutely sure you want to initialize "${name}"? This will archive the current season and wipe all trainee registrations.`)) {
        return;
      }
      
      const configSnap = await getDoc(doc(db, 'system', 'config'));
      const currentSeason = configSnap.exists() ? configSnap.data().currentSeason : '2026';
      
      // Archive current trainees
      const traineesSnap = await getDocs(collection(db, 'trainees'));
      const traineeCount = traineesSnap.size;
      
      // Create archive
      await setDoc(doc(db, 'season_archives', currentSeason), {
        traineeCount,
        archivedAt: serverTimestamp(),
        archivedBy: window.staffCore.user.uid,
        trainees: traineesSnap.docs.map(d => ({ id: d.id, ...d.data() }))
      }, { merge: true });
      
      // Update system config
      await setDoc(doc(db, 'system', 'config'), {
        currentSeason: name,
        lastInitialized: serverTimestamp(),
        initializedBy: window.staffCore.user.uid
      }, { merge: true });
      
      // Delete all trainees (wipe)
      const batch = writeBatch(db);
      traineesSnap.forEach(doc => {
        batch.delete(doc.ref);
      });
      await batch.commit();
      
      // Clear counters
      await deleteDoc(doc(db, 'seasons', currentSeason, 'artifacts', 'trainees', 'counters', 'tracks'));
      
      await window.staffCore.logSeasonInit(name, currentSeason);
      
      alert(`Season "${name}" has been initialized. ${traineeCount} trainees archived.`);
      closeSeasonModal();
      window.showTab('seasons');
    };
    
    window.restoreSeason = async function(seasonName) {
      if (!confirm(`Restore all trainees from "${seasonName}"? This will replace current registrations.`)) return;
      
      const archiveSnap = await getDoc(doc(db, 'season_archives', seasonName));
      if (!archiveSnap.exists()) {
        alert('Archive not found!');
        return;
      }
      
      const data = archiveSnap.data();
      if (!data.trainees || data.trainees.length === 0) {
        alert('No trainees in this archive.');
        return;
      }
      
      // Restore trainees
      const batch = writeBatch(db);
      data.trainees.forEach(t => {
        const { id, ...rest } = t;
        batch.set(doc(db, 'trainees', id), rest, { merge: true });
      });
      await batch.commit();
      
      await window.staffCore.logDataRestoration(seasonName, data.trainees.length);
      
      alert(`${data.trainees.length} trainees restored from "${seasonName}".`);
      window.showTab('seasons');
    };
    
    window.generateRoleCode = async function() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'SFD-';
      for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      
      const roles = prompt('Enter roles for this code (comma-separated):\nDirector, HOD, Specialist, Digital Marketing, Support Staff');
      if (!roles) return;
      
      const roleList = roles.split(',').map(r => r.trim()).filter(r => r);
      
      await setDoc(doc(db, 'role_codes', code), {
        roles: roleList,
        used: false,
        createdBy: window.staffCore.user.uid,
        createdAt: serverTimestamp()
      });
      
      alert(`ROLE Code generated: ${code}\nRoles: ${roleList.join(', ')}`);
      loadRoleCodes();
    };

      const snap = await getDocs(collection(db, 'role_codes'));
      const container = document.getElementById('codes-list');

        container.innerHTML = '<p class="text-center text-white/40 py-8 italic">No role codes generated yet.</p>';

      container.innerHTML = snap.docs.map(doc => {

            <p class="font-mono font-black text-lg">${doc.id}</p>
            <p class="text-[10px] text-slate-500 mt-1">Roles: ${(d.roles || []).join(', ')}</p>

          <span class="px-3 py-1 rounded-full \${d.used ? 'bg-red-500/10 text-red-400' : 'bg-green-500/10 text-green-400'} text-[8px] font-black uppercase">
            \${d.used ? 'Used' : 'Available'}

    // Sundust Background
    class Sundust {
      constructor() {
        this.canvas = document.getElementById('sundust-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.initParticles();
        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,\${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
  </script>
