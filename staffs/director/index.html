<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director Command Hub — SkillForge Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#040810',
            gold: '#C9A84C',
            orange: '#E87722',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#040810; color:#f1f5f9; overflow-x:hidden; min-height: 100dvh; }
    #sundust-canvas { position:fixed; inset:0; width:100%; height:100dvh; z-index:0; pointer-events:none }
    .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    .glass-strong { background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); }
    @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slide-up { animation: slide-up 0.8s ease-out forwards; }
    .tab-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
  </style>
</head>
<body class="flex flex-col md:flex-row">
  <canvas id="sundust-canvas"></canvas>

  <!-- Sidebar -->
  <aside class="w-72 glass-strong border-r border-white/5 flex flex-col fixed inset-y-0 z-50 transition-all duration-500 md:translate-x-0 -translate-x-full" id="sidebar">
    <div class="p-8 flex-1 overflow-y-auto">
      <div class="flex items-center gap-3 mb-12">
        <div class="w-12 h-12 rounded-2xl bg-gold/10 flex items-center justify-center text-gold border border-gold/20">
          <i data-lucide="shield-check" class="w-6 h-6"></i>
        </div>
        <div class="flex flex-col leading-none">
          <span class="font-black text-sm tracking-tighter uppercase">SkillForge</span>
          <span class="text-[8px] text-gold font-bold tracking-[0.3em] uppercase">Director Forge</span>
        </div>
      </div>

      <nav class="space-y-1">
        <p class="text-[9px] font-black text-white/30 uppercase tracking-[0.4em] mb-4">Command Nodes</p>
        <button data-tab="overview" class="nav-btn active w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Global Overview
        </button>
        <button data-tab="trainees" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="users" class="w-4 h-4"></i> Trainee Registry
        </button>
        <button data-tab="design-studio" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="palette" class="w-4 h-4"></i> Design Studio
        </button>
        <button data-tab="staff" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="user-check" class="w-4 h-4"></i> Personnel Registry
        </button>
        <button data-tab="announcements" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="megaphone" class="w-4 h-4"></i> Announcements
        </button>
        <button data-tab="seasons" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="calendar" class="w-4 h-4"></i> Season Management
        </button>
        <button data-tab="codes" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="key" class="w-4 h-4"></i> Access Codes
        </button>
        <button data-tab="audit" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="scroll-text" class="w-4 h-4"></i> Audit Logs
        </button>
        <button data-tab="profile" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-white/50 hover:text-white transition-all">
          <i data-lucide="user-cog" class="w-4 h-4"></i> Personnel Profile
        </button>
      </nav>
    </div>

    <div class="p-8 border-t border-white/5">
        <div class="flex items-center gap-4 mb-6 p-4 rounded-2xl bg-white/5 border border-white/5">
            <div class="w-10 h-10 rounded-xl bg-gold/10 flex items-center justify-center text-gold font-black text-xs" id="user-initials">D</div>
            <div class="min-w-0">
                <p class="text-[10px] font-black text-white uppercase truncate" id="user-name">Loading...</p>
                <p class="text-[8px] text-gold font-bold uppercase tracking-widest truncate" id="user-role">Director Access</p>
            </div>
        </div>
        <button id="logout-btn" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest text-red-400/70 hover:text-red-400 hover:bg-red-400/10 transition-all">
            <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
        </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 md:ml-72 p-6 md:p-12 pt-24 md:pt-20">
    <div id="tab-content" class="max-w-6xl mx-auto space-y-12 animate-slide-up">
      <!-- Content loaded dynamically -->
    </div>
  </main>

  <script type="module">
    import { staffCommand } from '../../assets/staff-command.js';
    import { ROLES, PERMISSIONS } from '../../assets/rbac-config.js';
    import { db, auth } from '../../assets/firebase-config.js';
    import { 
        collection, query, getDocs, doc, getDoc, setDoc, addDoc, 
        deleteDoc, serverTimestamp, orderBy, onSnapshot, writeBatch, limit 
    } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';

    // Global state
    let currentTab = 'overview';

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '../../trainee-login/'; return; }
      
      const success = await staffCommand.init(user.uid);
      if (!success) {
          console.error("Staff authorization failed.");
          window.location.href = '../../trainee-login/?error=unauthorized';
          return;
      }

      // Sync user info
      document.getElementById('user-name').textContent = staffCommand.userData.name || 'DIRECTOR';
      document.getElementById('user-role').textContent = (staffCommand.userData.roles || []).join(' | ');
      document.getElementById('user-initials').textContent = (staffCommand.userData.name || 'D').charAt(0);
      
      showTab('overview');
    });

    // --- NAVIGATION ---
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.getAttribute('data-tab');
        window.showTab(tab);
      });
    });
    
    document.getElementById('logout-btn').addEventListener('click', async () => {
        await auth.signOut();
        window.location.href = '../../trainee-login/';
    });

    window.showTab = async function(tab) {
      currentTab = tab;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold'));
      const activeBtn = document.querySelector(`[data-tab="${tab}"]`);
      if (activeBtn) activeBtn.classList.add('active', 'text-gold', 'bg-gold/10', 'border-r-4', 'border-gold');
      
      const content = document.getElementById('tab-content');
      content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="w-10 h-10 border-4 border-gold/20 border-t-gold rounded-full animate-spin"></div></div>';
      
      try {
          switch(tab) {
            case 'overview': await renderOverview(content); break;
            case 'trainees': await renderTrainees(content); break;
            case 'staff': await renderStaff(content); break;
            case 'announcements': await renderAnnouncements(content); break;
            case 'seasons': await renderSeasons(content); break;
            case 'codes': await renderCodes(content); break;
            case 'audit': await renderAudit(content); break;
            case 'profile': await renderProfile(content); break;
            default: await renderOverview(content);
          }
      } catch (e) {
          content.innerHTML = `<div class="p-10 glass text-center text-red-400 font-bold uppercase tracking-widest">Neural Link Interrupted: ${e.message}</div>`;
      }
      
      if (window.lucide) window.lucide.createIcons();
    }

    window.renderProfile = async function(container) {
        const profile = staffCommand.userData;
        container.innerHTML = `
            <header class="animate-slide-up">
                <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Director Registry</p>
                <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Command Profile</h1>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-slide-up" style="animation-delay: 0.1s">
                <!-- ID Card -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass p-8 rounded-[40px] border border-white/10 text-center space-y-6">
                        <div class="w-24 h-24 rounded-3xl bg-gold/10 border border-gold/20 mx-auto flex items-center justify-center text-gold text-3xl font-black">
                            ${profile.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="text-xl font-black uppercase tracking-tight text-white">${profile.name}</h3>
                            <p class="text-[10px] text-gold font-bold uppercase tracking-widest mt-1">EXECUTIVE DIRECTOR</p>
                        </div>
                        <div class="p-4 rounded-2xl bg-white/5 border border-white/5">
                            <p class="text-[8px] font-black text-white/30 uppercase tracking-widest mb-1">Personnel ID</p>
                            <p class="text-lg font-black text-white tracking-[0.2em]">${profile.sfid || 'PENDING'}</p>
                        </div>
                    </div>
                </div>

                <!-- Social Matrix Management -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-strong p-10 rounded-[40px] border border-white/10 space-y-8">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="text-xl font-black text-white uppercase tracking-tight">Social Matrix</h2>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Manage your digital connections</p>
                            </div>
                            <button onclick="addSocialRow()" class="px-4 py-2 bg-gold/10 border border-gold/20 text-gold rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-gold hover:text-navy transition-all">
                                Add Handle
                            </button>
                        </div>

                        <form id="social-matrix-form" class="space-y-4">
                            <div id="social-handles-container" class="space-y-4">
                                ${(profile.socialMatrix || []).map((s, i) => `
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 social-row items-end">
                                        <div class="space-y-2">
                                            <label class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Platform</label>
                                            <select name="socialPlatform[]" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                                                <option value="Instagram" ${s.platform === 'Instagram' ? 'selected' : ''}>Instagram</option>
                                                <option value="Twitter" ${s.platform === 'Twitter' ? 'selected' : ''}>X (Twitter)</option>
                                                <option value="LinkedIn" ${s.platform === 'LinkedIn' ? 'selected' : ''}>LinkedIn</option>
                                                <option value="Facebook" ${s.platform === 'Facebook' ? 'selected' : ''}>Facebook</option>
                                                <option value="TikTok" ${s.platform === 'TikTok' ? 'selected' : ''}>TikTok</option>
                                                <option value="Discord" ${s.platform === 'Discord' ? 'selected' : ''}>Discord</option>
                                                <option value="Telegram" ${s.platform === 'Telegram' ? 'selected' : ''}>Telegram</option>
                                            </select>
                                        </div>
                                        <div class="relative space-y-2">
                                            <label class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Handle</label>
                                            <div class="flex gap-2">
                                                <input name="socialHandle[]" type="text" value="${s.handle}" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                                                <button type="button" onclick="this.closest('.social-row').remove()" class="p-4 text-red-400 hover:bg-red-400/10 rounded-2xl transition-all">
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                                ${(profile.socialMatrix || []).length === 0 ? '<p class="text-center text-white/20 italic py-8">No social handles linked yet.</p>' : ''}
                            </div>
                            <button type="submit" class="w-full py-5 bg-gold text-navy font-black rounded-2xl uppercase text-[10px] tracking-[0.2em] shadow-xl hover:bg-white transition-all mt-8">
                                Update Social Matrix
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('social-matrix-form').onsubmit = updateSocialMatrix;
        if (window.lucide) window.lucide.createIcons();
    }

    window.addSocialRow = () => {
        const container = document.getElementById('social-handles-container');
        const row = document.createElement('div');
        row.className = 'grid grid-cols-1 md:grid-cols-2 gap-4 social-row items-end animate-slide-up';
        row.innerHTML = `
            <div class="space-y-2">
                <label class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Platform</label>
                <select name="socialPlatform[]" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                    <option value="Instagram">Instagram</option>
                    <option value="Twitter">X (Twitter)</option>
                    <option value="LinkedIn">LinkedIn</option>
                    <option value="Facebook">Facebook</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Discord">Discord</option>
                    <option value="Telegram">Telegram</option>
                </select>
            </div>
            <div class="relative space-y-2">
                <label class="text-[8px] font-black text-slate-500 uppercase tracking-widest ml-1">Handle</label>
                <div class="flex gap-2">
                    <input name="socialHandle[]" type="text" placeholder="@username" class="w-full p-4 rounded-2xl text-sm bg-white/5 border border-white/10 text-white">
                    <button type="button" onclick="this.closest('.social-row').remove()" class="p-4 text-red-400 hover:bg-red-400/10 rounded-2xl transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        `;
        container.appendChild(row);
        if (window.lucide) window.lucide.createIcons();
    };

    async function updateSocialMatrix(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerText = 'Syncing...';

        const formData = new FormData(e.target);
        const platforms = formData.getAll('socialPlatform[]');
        const handles = formData.getAll('socialHandle[]');
        
        const matrix = platforms.map((p, i) => ({
            platform: p,
            handle: handles[i]
        })).filter(s => s.handle);

        try {
            const { updateDoc } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');
            await updateDoc(doc(db, 'staffs', auth.currentUser.uid), {
                socialMatrix: matrix
            });
            alert("Social Matrix Updated Successfully.");
            staffCommand.userData.socialMatrix = matrix;
            showTab('profile');
        } catch (err) {
            console.error(err);
            alert("Update Failed: Registry link interrupted.");
        } finally {
            btn.disabled = false;
            btn.innerText = 'Update Social Matrix';
        }
    }

    // --- RENDERERS ---

    window.renderOverview = async function(container) {
      const traineeSnap = await getDocs(collection(db, 'trainees'));
      const staffSnap = await getDocs(collection(db, 'staffs'));
      const configSnap = await getDoc(doc(db, 'system', 'config'));
      const config = configSnap.exists() ? configSnap.data() : {};
      const currentSeason = config.activeSeason || '2026';
      
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Director Forge Node</p>
            <h1 class="text-4xl md:text-6xl font-black mt-2 uppercase tracking-tighter">Global Hub</h1>
          </div>
          <div class="flex gap-4">
            <div class="glass px-6 py-3 rounded-2xl border border-white/5">
              <p class="text-[8px] font-black text-white/30 uppercase tracking-widest">Active Season</p>
              <p class="text-xl font-bold text-gold">${currentSeason}</p>
            </div>
          </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="glass p-8 rounded-[40px] border border-white/5">
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-4">Total Trainees</p>
            <p class="text-5xl font-black text-gold">${traineeSnap.size}</p>
          </div>
          <div class="glass p-8 rounded-[40px] border border-white/5">
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-4">Command Personnel</p>
            <p class="text-5xl font-black text-gold">${staffSnap.size}</p>
          </div>
          <div class="glass p-8 rounded-[40px] border border-white/5">
            <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-4">Registry Health</p>
            <p class="text-5xl font-black text-green-400">100%</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="glass-strong rounded-[40px] p-10 border border-white/5">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-white/40 mb-8">Quick Actions</h2>
            <div class="grid grid-cols-2 gap-4">
              <button onclick="showTab('announcements')" class="p-6 rounded-2xl bg-gold/10 border border-gold/20 text-left hover:bg-gold/20 transition-all group">
                <i data-lucide="megaphone" class="w-8 h-8 text-gold mb-4 group-hover:scale-110 transition-transform"></i>
                <p class="font-black uppercase text-xs">Broadcast</p>
              </button>
              <button onclick="showTab('seasons')" class="p-6 rounded-2xl bg-orange/10 border border-orange/20 text-left hover:bg-orange/20 transition-all group">
                <i data-lucide="calendar" class="w-8 h-8 text-orange mb-4 group-hover:scale-110 transition-transform"></i>
                <p class="font-black uppercase text-xs">Seasons</p>
              </button>
            </div>
          </div>

          <div class="glass-strong rounded-[40px] p-10 border border-gold/20">
            <h2 class="text-[11px] font-black uppercase tracking-[0.5em] text-gold/60 mb-8">System God Mode</h2>
            <div class="space-y-4">
              <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/5">
                <div>
                  <p class="text-[10px] font-black uppercase tracking-widest">Maintenance Lock</p>
                  <p class="text-[8px] text-white/40">Prevents all registrations</p>
                </div>
                <button onclick="toggleSystemFlag('maintenance')" class="w-12 h-6 rounded-full ${config.maintenance ? 'bg-gold' : 'bg-white/10'} relative transition-all">
                  <div class="absolute top-1 ${config.maintenance ? 'right-1' : 'left-1'} w-4 h-4 rounded-full bg-white transition-all shadow-lg"></div>
                </button>
              </div>
              <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/5">
                <div>
                  <p class="text-[10px] font-black uppercase tracking-widest">Global XP Boost</p>
                  <p class="text-[8px] text-white/40">2x Multiplier for all students</p>
                </div>
                <button onclick="toggleSystemFlag('xpBoost')" class="w-12 h-6 rounded-full ${config.xpBoost ? 'bg-gold' : 'bg-white/10'} relative transition-all">
                  <div class="absolute top-1 ${config.xpBoost ? 'right-1' : 'left-1'} w-4 h-4 rounded-full bg-white transition-all shadow-lg"></div>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    window.toggleSystemFlag = async function(flag) {
      const configRef = doc(db, 'system', 'config');
      const snap = await getDoc(configRef);
      const current = snap.exists() ? !!snap.data()[flag] : false;
      const res = await staffCommand.toggleSystemFlag(flag, !current);
      if (res.success) window.showTab('overview');
      else alert(res.error);
    };

    window.renderTrainees = async function(container) {
      const snap = await getDocs(query(collection(db, 'trainees'), orderBy('created_at', 'desc')));
      
      container.innerHTML = `
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-8 mb-8">
          <div>
            <p class="text-gold text-xs font-black tracking-[0.4em] uppercase">Registry Control</p>
            <h1 class="text-4xl md:text-5xl font-black mt-2 uppercase tracking-tighter">Trainee Registry</h1>
          </div>
        </header>

        <div class="glass-strong rounded-[40px] p-8 border border-white/5 overflow-x-auto">
          <table class="w-full text-left">
            <thead class="text-[10px] font-black uppercase text-slate-500 border-b border-white/10">
              <tr>
                <th class="pb-4">Profile</th>
                <th class="pb-4">SFID</th>
                <th class="pb-4">Track</th>
                <th class="pb-4">XP/Tier</th>
                <th class="pb-4">Actions</th>
              </tr>
            </thead>
            <tbody class="text-sm">
              ${snap.empty ? '<tr><td colspan="5" class="py-12 text-center text-white/40 italic">No trainees found.</td></tr>' : ''}
              ${snap.docs.map(doc => {
                const d = doc.data();
                return `<tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
                  <td class="py-4">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 overflow-hidden">
                        <img src="${d.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + doc.id}" class="w-full h-full object-cover">
                      </div>
                      <div>
                        <p class="font-black text-white uppercase text-xs">${d.name || 'Anonymous'}</p>
                        <p class="text-[8px] text-slate-500 uppercase">${d.email || 'NO_EMAIL'}</p>
                      </div>
                    </div>
                  </td>
                  <td class="py-4 font-mono text-[10px] text-gold">${d.sfid || 'PENDING'}</td>
                  <td class="py-4 uppercase text-[9px] font-black text-slate-300">${d.track || 'Unassigned'}</td>
                  <td class="py-4">
                    <p class="text-[10px] font-black">${d.xp || 0} XP</p>

      let code = 'SKF-';

      const rolesInput = prompt('Enter unit roles (comma-separated):\nDirector, HOD, Specialist, Digital Marketing, Support Team');
      if (!rolesInput) return;
      
      const roleList = rolesInput.split(',').map(r => r.trim()).filter(r => r);
      
      await setDoc(doc(db, 'role_codes', code), {
        roles: roleList,
        used: false,
        createdBy: staffCommand.userData.name,
        createdAt: serverTimestamp()
      });
      
      alert(`Authorization Key Generated: ${code}`);
      loadRoleCodes();

        this.animate();
      }
      resize(){ this.canvas.width=window.innerWidth; this.canvas.height=window.innerHeight }
      initParticles(){ for(let i=0;i<40;i++) this.particles.push(this.createParticle()) }
      createParticle(){ return { x:Math.random()*this.canvas.width,y:Math.random()*this.canvas.height,size:Math.random()*1.2+0.5,alpha:Math.random()*0.3+0.1,vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.15,p:Math.random()*Math.PI*2 } }
      animate(){
        this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
        this.particles.forEach(p=>{
          p.x+=p.vx; p.y+=p.vy; p.p+=0.01;
          if(p.x<0)p.x=this.canvas.width; if(p.x>this.canvas.width)p.x=0;
          if(p.y<0)p.y=this.canvas.height; if(p.y>this.canvas.height)p.y=0;
          this.ctx.fillStyle=`rgba(201,168,76,${p.alpha+Math.sin(p.p)*0.1})`;
          this.ctx.beginPath(); this.ctx.arc(p.x,p.y,p.size,0,Math.PI*2); this.ctx.fill();
        });
        requestAnimationFrame(()=>this.animate());
      }
    }
    new Sundust();
  </script>
</body>
</html>
